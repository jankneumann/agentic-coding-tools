name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read
  pull-requests: read

env:
  # Space-separated list of CVE/PYSEC IDs to ignore in pip-audit runs.
  # Each entry must have a written justification (disputed advisory, no fix
  # available, or scoped-to-environment-we-don't-use); add a comment when
  # appending. Reviewed periodically — when a fix lands upstream, drop the
  # entry rather than carrying it forward forever.
  #
  # - CVE-2026-3219: affects pip itself. GitHub Advisory Database lists no
  #   patched version as of 2026-05-04.
  # - PYSEC-2025-183: pyjwt "weak encryption" advisory, disputed by supplier
  #   (the key length is chosen by the calling application; library users
  #   benefit from a minimum value but it's not a library defect). No fix
  #   version. Added 2026-05-20 to unblock kanban-viz PR #178.
  PIP_AUDIT_IGNORED_VULNS: >-
    CVE-2026-3219
    PYSEC-2025-183

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Full history for gitleaks
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit-coordinator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-coordinator
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run pip-audit
        run: |
          uv pip install pip-audit
          # shellcheck disable=SC2086  # word-split is intentional — CVE IDs are alnum+hyphen
          IGNORE_ARGS=$(printf -- '--ignore-vuln %s ' $PIP_AUDIT_IGNORED_VULNS)
          uv run pip-audit --desc on $IGNORE_ARGS --format json --output pip-audit-results.json || true
          uv run pip-audit --desc on $IGNORE_ARGS

  dependency-audit-skills:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skills
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run pip-audit
        run: |
          uv pip install pip-audit
          # shellcheck disable=SC2086  # word-split is intentional — CVE IDs are alnum+hyphen
          IGNORE_ARGS=$(printf -- '--ignore-vuln %s ' $PIP_AUDIT_IGNORED_VULNS)
          uv run pip-audit --desc on $IGNORE_ARGS --format json --output pip-audit-results.json || true
          uv run pip-audit --desc on $IGNORE_ARGS
