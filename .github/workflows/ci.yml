name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-coordinator

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run ruff
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy src/

      - name: Run pytest
        run: uv run pytest -m "not e2e and not integration"

  test-infra-skills:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skills

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run infrastructure skill tests
        run: uv run pytest -v

  test-skills:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras
        working-directory: agent-coordinator

      - name: Run skills tests
        run: agent-coordinator/.venv/bin/python -m pytest skills/bug-scrub/tests/ skills/fix-scrub/tests/ -v

  validate-specs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install openspec
        run: npm install -g @fission-ai/openspec

      - name: Validate specs
        run: openspec validate --strict --all

  # Regenerate docs/decisions/ from architectural tags in session-logs and
  # fail if the result differs from what's committed. Catches missed
  # regenerations after new `architectural:` tags are added to a session-log.
  validate-decision-index:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install skills deps
        working-directory: skills
        run: uv sync --all-extras

      - name: Regenerate decision index (strict)
        run: |
          skills/.venv/bin/python skills/explore-feature/scripts/archive_index.py \
            --emit-decisions \
            --archive-root openspec/changes \
            --decisions-output-dir docs/decisions \
            --capabilities-root openspec/specs \
            --strict

      - name: Fail if decision index is stale
        run: |
          if ! git diff --exit-code docs/decisions/; then
            echo "::error::docs/decisions/ is stale. Run 'make decisions' locally and commit the result."
            exit 1
          fi

  # Static contract check: does every local package imported from src/
  # have a matching COPY statement in the Dockerfile runtime stage?
  # Catches the class of bug where a lazy import references a directory
  # that isn't COPY'd (e.g., `from gen_eval import ...` when
  # the gen-eval wheel isn't in .venv or evaluation/ isn't bundled).
  check-docker-imports:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-coordinator

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Verify Dockerfile COPY coverage for src/ imports
        run: |
          uv run python scripts/check_docker_imports.py \
            --data-dir cedar \
            --data-dir profiles \
            --verbose

  # Container smoke-import test: build the real Docker image and verify
  # that every module imported by src/coordination_api.py and
  # src/coordination_mcp.py loads without error inside the built container.
  # This catches runtime import failures that the static check might miss
  # (e.g., missing system libraries, PYTHONPATH issues, lazy imports from
  # third-party code).
  docker-smoke-import:
    runs-on: ubuntu-latest
    # Build context is now repo root (D8 Strategy A) so the Dockerfile can
    # COPY both agent-coordinator/ and packages/gen-eval/ in a single build.
    # No working-directory override — the build-push-action uses context: .

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build runtime image
        uses: docker/build-push-action@v7
        with:
          # context is repo root; file points at agent-coordinator/Dockerfile
          # (per D8 Strategy A — gen-eval is a sibling package, not a subdir)
          context: .
          file: agent-coordinator/Dockerfile
          load: true
          tags: coord-api-ci:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-import all modules inside the container
        run: |
          docker run --rm \
            -e POSTGRES_DSN="postgresql://localhost:1/nope" \
            coord-api-ci:smoke \
            /app/.venv/bin/python -c "
          import importlib, sys

          # Every top-level entry point we expect to work in the built image.
          # Keep this list aligned with what the MCP server and HTTP API load.
          # gen_eval.mcp_service — the canonical path since extract-gen-eval-package.
          modules = [
              'src.coordination_api',
              'src.coordination_mcp',
              'src.http_proxy',
              'src.config',
              'gen_eval.mcp_service',
          ]

          failures = []
          for name in modules:
              try:
                  importlib.import_module(name)
                  print(f'OK  {name}')
              except Exception as exc:
                  print(f'FAIL {name}: {type(exc).__name__}: {exc}')
                  failures.append((name, exc))

          # Verify we can actually construct the FastAPI app factory.
          try:
              from src.coordination_api import create_coordination_api
              app = create_coordination_api()
              route_count = len([r for r in app.routes if hasattr(r, 'path')])
              print(f'OK  FastAPI app factory constructed ({route_count} routes)')
          except Exception as exc:
              print(f'FAIL FastAPI app factory: {type(exc).__name__}: {exc}')
              failures.append(('app_factory', exc))

          if failures:
              print(f'\\n{len(failures)} import(s) failed inside the built container.')
              sys.exit(1)
          print('\\nAll module imports succeeded inside the built container.')
          "

  formal-coordination:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v7

      - name: Install Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Run TLA+ model checks (non-blocking)
        run: .github/scripts/run_tlc.sh

  test-integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: paradedb/paradedb:v0.22.2
        ports:
          - 54322:5432
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: cd agent-coordinator && uv sync --all-extras

      - name: Apply database migrations
        run: |
          sudo apt-get install -y postgresql-client
          for f in agent-coordinator/database/migrations/*.sql; do
            PGPASSWORD=postgres psql -h localhost -p 54322 -U postgres -d postgres -f "$f"
          done

      - name: Wait for DB readiness
        run: cd agent-coordinator && uv run python scripts/wait_for_db.py
        env:
          POSTGRES_DSN: postgresql://postgres:postgres@localhost:54322/postgres

      - name: Run integration and E2E tests (DirectPostgresClient)
        run: cd agent-coordinator && uv run pytest tests/integration/postgres/ tests/e2e/postgres/ -v
        env:
          DB_BACKEND: postgres
          POSTGRES_DSN: postgresql://postgres:postgres@localhost:54322/postgres
          AGENT_ID: ci-test-agent
          AGENT_TYPE: test_agent
          COORDINATOR_PROFILE: local

  gen-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: agent-coordinator

    services:
      postgres:
        image: paradedb/paradedb:v0.22.2
        ports:
          - 54322:5432
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Apply database migrations
        run: |
          sudo apt-get install -y postgresql-client
          for f in database/migrations/*.sql; do
            PGPASSWORD=postgres psql -h localhost -p 54322 -U postgres -d postgres -f "$f"
          done

      - name: Run gen-eval extraction contract tests
        # test_gen_eval_extraction.py asserts (a) gen_eval.mcp_service is
        # importable with the [mcp] extra, (b) /gen-eval/scenarios responds.
        # The gen-eval unit tests have been relocated to packages/gen-eval/tests/
        # (extract-gen-eval-package wp-package-tests); the gen-eval-tests job
        # below runs them against the package directly.
        run: uv run pytest tests/test_gen_eval_extraction.py -v --tb=short
        env:
          DB_BACKEND: postgres
          POSTGRES_DSN: postgresql://postgres:postgres@localhost:54322/postgres
          GEN_EVAL_DATA_DIR: evaluation

      - name: Start coordinator services
        run: |
          uv run python -m src.coordination_api &
          sleep 3
          curl -sf http://localhost:8081/health || echo "Coordinator not ready"
        env:
          DB_BACKEND: postgres
          POSTGRES_DSN: postgresql://postgres:postgres@localhost:54322/postgres
          AGENT_ID: ci-gen-eval
          AGENT_TYPE: test_agent
          COORDINATION_API_KEYS: test-key
          GEN_EVAL_DATA_DIR: evaluation

  gen-eval-tests:
    # Package-level unit tests for packages/gen-eval/ (task 3.4, D10).
    # Runs in parallel with other jobs; does NOT require a live DB.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: packages/gen-eval

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install gen-eval package with all extras
        run: uv sync --all-extras

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Type-check (mypy)
        run: uv run mypy src/gen_eval/ --strict --ignore-missing-imports
        continue-on-error: true

      - name: Run gen-eval unit tests
        run: uv run pytest -v -m "not e2e and not integration" --tb=short
        env:
          AGENT_ID: ci-gen-eval-pkg
