name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-coordinator

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run ruff
        run: uv run ruff check .

      - name: Run mypy
        run: uv run mypy src/

      - name: Run pytest
        run: uv run pytest -m "not e2e and not integration"

  test-scripts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run scripts tests
        run: uv run pytest -v

  test-skills:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras
        working-directory: agent-coordinator

      - name: Run skills tests
        run: agent-coordinator/.venv/bin/python -m pytest skills/bug-scrub/tests/ skills/fix-scrub/tests/ -v

  validate-specs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install openspec
        run: npm install -g @fission-ai/openspec

      - name: Validate specs
        run: openspec validate --strict --all

  formal-coordination:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Run TLA+ model checks (non-blocking)
        run: .github/scripts/run_tlc.sh

  test-integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: paradedb/paradedb:v0.22.2
        ports:
          - 54322:5432
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: cd agent-coordinator && uv sync --all-extras

      - name: Apply database migrations
        run: |
          sudo apt-get install -y postgresql-client
          for f in agent-coordinator/supabase/migrations/*.sql; do
            PGPASSWORD=postgres psql -h localhost -p 54322 -U postgres -d postgres -f "$f"
          done

      - name: Wait for DB readiness
        run: cd agent-coordinator && uv run python scripts/wait_for_db.py
        env:
          POSTGRES_DSN: postgresql://postgres:postgres@localhost:54322/postgres

      - name: Run integration and E2E tests
        run: cd agent-coordinator && uv run pytest -m "integration or e2e" -v
        env:
          DB_BACKEND: postgres
          POSTGRES_DSN: postgresql://postgres:postgres@localhost:54322/postgres
          AGENT_ID: ci-test-agent
          AGENT_TYPE: test_agent
          COORDINATOR_PROFILE: local
