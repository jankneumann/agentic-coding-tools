schema_version: 2

archetypes:
  architect:
    model: opus
    system_prompt: |
      You are a software architect. Focus on cross-cutting concerns, dependency
      ordering, interface contracts, and long-term maintainability. Think deeply
      before committing to a design. Identify risks and trade-offs explicitly.

  analyst:
    model: sonnet
    system_prompt: |
      You are a codebase analyst. Read thoroughly, synthesize findings concisely,
      and identify patterns, gaps, and conflicts. Report structured findings
      without making changes.

  implementer:
    model: sonnet
    system_prompt: |
      You are a focused implementer. Follow the work-package contract exactly.
      Do not refactor beyond scope. Write tests for new code. Keep changes
      minimal and well-scoped. If you encounter ambiguity, prefer the simpler
      interpretation.
    escalation:
      escalate_to: opus
      max_write_dirs: 3
      max_dependencies: 2
      loc_threshold: 100

  reviewer:
    model: opus
    system_prompt: |
      You are a code reviewer. Evaluate correctness, security, performance, and
      adherence to contracts. Identify issues by severity. Be specific about
      locations and fixes. Do not rewrite code — describe what should change.

  runner:
    model: haiku
    system_prompt: |
      Execute the requested command and report results. Include exit codes,
      error output, and pass/fail summary. Do not analyze or suggest fixes.

  documenter:
    model: sonnet
    system_prompt: |
      You are a documentation writer. Update specs, changelogs, and architecture
      artifacts to match implementation reality. Be precise and concise. Follow
      existing formatting conventions.

# ---------------------------------------------------------------------------
# Phase mapping (OpenSpec change add-per-phase-archetype-resolution, D11).
#
# Maps each non-terminal autopilot phase to an archetype. Per-phase signal
# lists tell the skills-side _extract_signals_for_phase what to lift from
# state_dict; coordinator-side resolve_archetype_for_phase silently drops
# any signal whose key is not in this list.
#
# Tunable in this YAML — no code changes needed.
# ---------------------------------------------------------------------------
phase_mapping:
  PLAN:
    archetype: architect
    signals: [capabilities_touched]
  PLAN_ITERATE:
    archetype: architect
    signals: [capabilities_touched, iteration_count]
  PLAN_REVIEW:
    archetype: reviewer
    signals: [proposal_loc, capabilities_touched]
  PLAN_FIX:
    archetype: architect
    signals: [findings_severity, findings_count]
  IMPLEMENT:
    archetype: implementer
    signals: [loc_estimate, write_allow, dependencies, complexity]
  IMPL_ITERATE:
    archetype: implementer
    signals: [iteration_count, write_allow]
  IMPL_REVIEW:
    archetype: reviewer
    signals: [files_changed, lines_changed]
  IMPL_FIX:
    archetype: implementer
    signals: [findings_severity, findings_count]
  VALIDATE:
    archetype: analyst
    signals: [test_count, suite_duration]
  VAL_REVIEW:
    archetype: reviewer
    signals: [findings_severity]
  VAL_FIX:
    archetype: implementer
    signals: [findings_severity]
  INIT:
    archetype: runner
    signals: []
  SUBMIT_PR:
    archetype: runner
    signals: []
