# gitleaks configuration — extends the default ruleset with an allowlist for
# files that intentionally contain fake secret-shaped strings as test fixtures.
#
# Convention: only files whose PURPOSE is secret-detection testing belong here.
# If a file ends up on this list, its contents should be 100% test inputs, so
# that an accidentally-committed real secret wouldn't have meaningful cover.

[extend]
useDefault = true

[[allowlists]]
description = "Files that contain fake secret-shaped fixtures for testing the sanitizer itself."
paths = [
    '''skills/session-log/scripts/test_sanitize_session_log\.py''',
    '''\.claude/skills/session-log/scripts/test_sanitize_session_log\.py''',
    '''\.agents/skills/session-log/scripts/test_sanitize_session_log\.py''',
]

[[allowlists]]
# Historical SSE-signing-key test fixture (entropy 3.92) that tripped the
# default generic-api-key rule in agent-coordinator/tests/test_kanban_viz_endpoints.py
# and its skills/tests/ mirror. Anonymized at HEAD by the kanban-viz PR
# (s/s3cr3t-32-byte-signing-key-abcdef/GITLEAKS_TEST_FIXTURE_NOT_A_REAL_KEY/)
# but the original value remains in commit history; squash-rewriting agent PRs
# to scrub history is heavier than allowlisting one well-known fake string.
# Listed by exact stopword (not file/path) so any FUTURE real secret in those
# same test files is still detected.
description = "Anonymized historical SSE-signing-key test fixture"
stopwords = [
    "s3cr3t-32-byte-signing-key-abcdef",
]
