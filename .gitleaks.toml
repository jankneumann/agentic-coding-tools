# gitleaks configuration — extends the default ruleset with an allowlist for
# files that intentionally contain fake secret-shaped strings as test fixtures.
#
# Convention: only files whose PURPOSE is secret-detection testing belong here.
# If a file ends up on this list, its contents should be 100% test inputs, so
# that an accidentally-committed real secret wouldn't have meaningful cover.

[extend]
useDefault = true

[[allowlists]]
description = "Files that contain fake secret-shaped fixtures for testing the sanitizer itself."
paths = [
    '''skills/session-log/scripts/test_sanitize_session_log\.py''',
    '''\.claude/skills/session-log/scripts/test_sanitize_session_log\.py''',
    '''\.agents/skills/session-log/scripts/test_sanitize_session_log\.py''',
]

[[allowlists]]
# Two historical commits that introduced a fake SSE-signing-key test fixture
# (entropy 3.92, tripped the default generic-api-key rule). Value was
# anonymized at HEAD via the kanban-viz PR, but the commits remain in PR
# history. Allowlisting by COMMIT SHA rather than by file/path so any future
# real secret in those test files (or any other file in those two commits'
# trees) would still be detected on subsequent scans — gitleaks only ignores
# findings whose introducing commit matches one of these SHAs.
description = "Anonymized historical SSE-signing-key test fixture (commit-scoped)"
commits = [
    "0491427e75d41e48c36183d09f1e81f532ae6c2a",
    "26e4e7448129853036997bdc3fc6aaabf5ccad3a",
]
