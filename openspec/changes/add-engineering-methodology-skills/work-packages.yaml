schema_version: 1

feature:
  id: add-engineering-methodology-skills
  title: "Add engineering methodology skills (10 new + 8 adapted + tail-block convention)"
  plan_revision: 1
  created_by: claude-opus-4-7
  created_at: "2026-05-01T00:00:00Z"

contracts:
  revision: 1
  openapi:
    primary: "contracts/README.md"
    files:
      - "contracts/README.md"

defaults:
  priority: 5
  lock_ttl_minutes: 120
  timeout_minutes: 60
  retry_budget: 1
  verification_tier_required: "B"
  min_trust_level: 2

packages:
  # ─────────────────────────────────────────────────────────────────────
  # Phase 0 — Scaffold the convention (sequential, gates everything else)
  # ─────────────────────────────────────────────────────────────────────

  - package_id: wp-scaffold
    title: "Scaffold: references library, install.sh extension, shared test framework"
    task_type: implement
    description: |
      Phase 0 ships the convention before any content lands. Outputs:
        - skills/references/ with 4 checklist files + skill-tail-template.md
        - install.sh extension for references/ rsync + related: validation
        - skills/tests/_shared/conftest.py with 5 invariant assertion helpers
        - skills/pyproject.toml testpaths updated for 18 new test dirs
        - docs/skills-workflow.md tail-block convention section
      Covers tasks 0.1–0.8.
      Spec scenarios: skill-workflow.references-installed-alongside-skills,
        references-not-auto-discovered, related-key-parsed,
        install-warns-on-unknown, related-optional, frontmatter-parse-failure-caught,
        missing-tail-block-caught, reference-cross-link-rot-caught,
        test-paths-registered, user-invocable-skill-ships-tail-block,
        tail-block-template-available
      Design decisions: D2, D3, D4
    role: python-engineer
    priority: 1
    depends_on: []
    timeout_minutes: 90
    retry_budget: 1
    min_trust_level: 2
    locks:
      files:
        - "skills/install.sh"
        - "skills/pyproject.toml"
        - "skills/tests/_shared/conftest.py"
        - "skills/tests/_shared/__init__.py"
        - "skills/tests/install_sh/test_references_rsync.py"
        - "skills/tests/install_sh/test_related_validation.py"
        - "skills/tests/_shared/test_conftest_helpers.py"
        - "skills/references/security-checklist.md"
        - "skills/references/performance-checklist.md"
        - "skills/references/accessibility-checklist.md"
        - "skills/references/testing-patterns.md"
        - "skills/references/skill-tail-template.md"
        - "docs/skills-workflow.md"
      keys:
        - "feature:add-engineering-methodology-skills:scaffold"
        - "feature:add-engineering-methodology-skills:references"
        - "feature:add-engineering-methodology-skills:installsh"
      ttl_minutes: 120
      reason: "Phase 0 scaffold: install.sh extension, references library, shared test framework. All subsequent packages depend on these."
    scope:
      write_allow:
        - "skills/install.sh"
        - "skills/pyproject.toml"
        - "skills/references/**"
        - "skills/tests/_shared/**"
        - "skills/tests/install_sh/**"
        - "docs/skills-workflow.md"
      read_allow:
        - "skills/**"
        - "docs/**"
        - "openspec/changes/add-engineering-methodology-skills/**"
      deny:
        - "skills/test-driven-development/**"
        - "skills/debugging-and-error-recovery/**"
        - "skills/context-engineering/**"
        - "skills/source-driven-development/**"
        - "skills/performance-optimization/**"
        - "skills/frontend-ui-engineering/**"
        - "skills/api-and-interface-design/**"
        - "skills/browser-testing-with-devtools/**"
        - "skills/deprecation-and-migration/**"
        - "skills/documentation-and-adrs/**"
    worktree:
      name: wp-scaffold
      mode: isolated
    verification:
      tier_required: "A"
      steps:
        - name: "install.sh dry-run with references"
          kind: command
          command: "bash skills/install.sh --mode rsync --deps none --python-tools none --target /tmp/wp-scaffold-target"
          evidence:
            artifacts:
              - "skills/references/security-checklist.md"
              - "skills/references/skill-tail-template.md"
            result_keys:
              - "install_sh_exit_code"
              - "references_synced_count"
        - name: "shared invariant helpers test"
          kind: command
          command: "skills/.venv/bin/python -m pytest skills/tests/_shared/ -v"
          evidence:
            artifacts:
              - "skills/tests/_shared/conftest.py"
              - "skills/tests/_shared/test_conftest_helpers.py"
            result_keys:
              - "pytest_exit_code"
              - "tests_passed"
        - name: "install.sh integration tests"
          kind: command
          command: "skills/.venv/bin/python -m pytest skills/tests/install_sh/ -v"
          evidence:
            artifacts:
              - "skills/tests/install_sh/test_references_rsync.py"
              - "skills/tests/install_sh/test_related_validation.py"
            result_keys:
              - "pytest_exit_code"
              - "tests_passed"
    outputs:
      result_keys:
        - "install_sh_exit_code"
        - "references_synced_count"
        - "pytest_exit_code"
        - "tests_passed"

