  - package_id: wp-integration
    title: "Integration: related: cross-refs, install.sh dry-run, full pytest, openspec validate, docs"
    task_type: implement
    description: |
      Final integration. After all skills are written and adapted, this package:
        - Populates related: cross-references across all 21 affected skills.
        - Runs full skills/install.sh dry-run with rsync mode.
        - Runs full skills/.venv/bin/python -m pytest.
        - Runs openspec validate add-engineering-methodology-skills --strict.
        - Updates docs/lessons-learned.md and README.md.
        - Smoke-tests orchestrator integration points.
      Covers tasks 3.1–3.7.
    role: backend-implementer
    priority: 4
    depends_on:
      - wp-skills-testing-quality
      - wp-skills-knowledge
      - wp-skills-engineering
      - wp-skills-governance
      - wp-adapt-lifecycle
      - wp-adapt-review
      - wp-adapt-sync
    timeout_minutes: 90
    retry_budget: 1
    min_trust_level: 2
    locks:
      files:
        - "docs/lessons-learned.md"
        - "README.md"
      keys:
        - "feature:add-engineering-methodology-skills:integration"
      ttl_minutes: 120
      reason: "Final integration: cross-refs, validation, docs."
    scope:
      write_allow:
        - "skills/*/SKILL.md"
        - "docs/lessons-learned.md"
        - "README.md"
      read_allow:
