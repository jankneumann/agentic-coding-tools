schema_version: 1

feature:
  id: roadmap-openspec-orchestration
  title: "Roadmap-Oriented OpenSpec Planning and Execution"
  plan_revision: 2
  created_by: codex
  created_at: "2026-04-13T00:00:00Z"

contracts:
  revision: 1
  openapi:
    primary: openspec/changes/roadmap-openspec-orchestration/contracts/README.md
    files:
      - openspec/changes/roadmap-openspec-orchestration/contracts/README.md

defaults:
  priority: 5
  timeout_minutes: 120
  retry_budget: 1

packages:
  - package_id: wp-runtime
    name: "Roadmap runtime artifacts and checkpointing"
    description: "Shared schemas, parser, validation, and resume/checkpoint primitives used by both roadmap skills."
    tasks: ["1.1", "1.2", "1.3", "1.4"]
    priority: 1
    depends_on: []
    scope:
      write_allow:
        - "skills/plan-roadmap/scripts/runtime/**"
        - "skills/autopilot-roadmap/scripts/runtime/**"
        - "skills/plan-roadmap/tests/runtime/**"
        - "skills/autopilot-roadmap/tests/runtime/**"
      read_allow:
        - "skills/**"
        - "openspec/**"

  - package_id: wp-plan-roadmap
    name: "Plan-roadmap decomposition workflow"
    description: "Build roadmap decomposition and approved-candidate scaffold generation."
    tasks: ["2.1", "2.2", "2.3"]
    priority: 2
    depends_on: ["wp-runtime"]
    scope:
      write_allow:
        - "skills/plan-roadmap/**"
      read_allow:
        - "skills/**"
        - "openspec/**"

  - package_id: wp-autopilot-roadmap
    name: "Autopilot-roadmap orchestration workflow"
    description: "Implement policy-aware routing, execution loop, and learning feedback for roadmap items."
    tasks: ["3.1", "3.2", "3.3", "3.4"]
    priority: 2
    depends_on: ["wp-runtime"]
    scope:
      write_allow:
        - "skills/autopilot-roadmap/**"
      read_allow:
        - "skills/**"
        - "openspec/**"

  - package_id: wp-integration
    name: "Roadmap integration and docs"
    description: "End-to-end verification, docs updates, and final strict validation."
    tasks: ["4.1", "4.2", "4.3"]
    priority: 3
    depends_on: ["wp-plan-roadmap", "wp-autopilot-roadmap"]
    scope:
      write_allow:
        - "docs/skills-workflow.md"
        - "docs/parallel-agentic-development.md"
        - "skills/plan-roadmap/tests/integration/**"
        - "skills/autopilot-roadmap/tests/integration/**"
      read_allow:
        - "skills/**"
        - "openspec/**"
        - "docs/**"
