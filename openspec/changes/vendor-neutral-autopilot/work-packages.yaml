schema_version: 1

feature:
  id: vendor-neutral-autopilot
  title: "Vendor-neutral autopilot dispatch across Claude Code, Codex, Gemini/Jules"
  plan_revision: 1
  created_by: codex
  created_at: "2026-05-15T00:00:00Z"

contracts:
  revision: 1
  openapi:
    primary: "openspec/changes/vendor-neutral-autopilot/contracts/README.md"
    files:
      - "openspec/changes/vendor-neutral-autopilot/contracts/README.md"
      - "openspec/changes/vendor-neutral-autopilot/contracts/phase-dispatch-contract.md"
