    archetype: architect
    priority: 1
    depends_on: []
    timeout_minutes: 60
    retry_budget: 1
    min_trust_level: 2
    locks:
      files:
        - "openspec/changes/vendor-neutral-autopilot/contracts/README.md"
        - "openspec/changes/vendor-neutral-autopilot/contracts/phase-dispatch-contract.md"
        - "openspec/changes/vendor-neutral-autopilot/contracts/provider-model-map.schema.json"
      keys:
        - "contract:vendor-neutral-autopilot:phase-dispatch"
        - "contract:vendor-neutral-autopilot:provider-model-map"
      ttl_minutes: 60
      reason: "Author and validate runtime contracts"
    scope:
      write_allow:
        - "openspec/changes/vendor-neutral-autopilot/contracts/**"
        - "skills/tests/vendor-neutral-autopilot/test_contracts.py"
      read_allow:
        - "openspec/changes/vendor-neutral-autopilot/**"
        - "openspec/schemas/**"
        - "skills/**"
    worktree:
      name: "wp-contracts"
      mode: "isolated"
    verification:
      tier_required: "B"
      steps:
        - name: "contract-tests"
          kind: "command"
          command: "skills/.venv/bin/python -m pytest skills/tests/vendor-neutral-autopilot/test_contracts.py -v"
          cwd: "."
          expect_exit_code: 0
          evidence:
            artifacts: []
            result_keys:
              - "contract_tests_passed"
        - name: "openspec-validate"
          kind: "command"
          command: "openspec validate vendor-neutral-autopilot --strict"
          cwd: "."
          expect_exit_code: 0
          evidence:
            artifacts: []
            result_keys:
              - "openspec_validate_passed"
    metadata:
      loc_estimate: 120
      package_kind: config
      complexity: medium
    outputs:
      result_keys:
        - "runtime_contracts_validated"
      artifacts:
        - "openspec/changes/vendor-neutral-autopilot/contracts/"

