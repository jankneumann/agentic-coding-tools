          cwd: "."
          expect_exit_code: 0
          evidence:
            artifacts: []
            result_keys:
              - "model_resolution_tests_passed"
    metadata:
      loc_estimate: 350
      package_kind: config
      complexity: medium
    outputs:
      result_keys:
        - "provider_model_mapping_implemented"
      artifacts:
        - "agent-coordinator/src/agents_config.py"

