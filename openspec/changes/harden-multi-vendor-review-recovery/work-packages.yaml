schema_version: 1

feature:
  id: harden-multi-vendor-review-recovery
  title: "Harden Multi-Vendor Review Recovery"
  plan_revision: 1
  created_by: claude-opus-4-7
  created_at: "2026-05-07T00:00:00Z"

contracts:
  revision: 1
  openapi:
    # No HTTP API. README stub documents which sub-types were evaluated.
    # The actual contracted artifacts are JSON Schemas for the on-disk
    # checkpoint layout (review-cache-layout.schema.json, finding.schema.json).
    primary: "contracts/README.md"
    files:
      - "contracts/README.md"
      - "contracts/review-cache-layout.schema.json"
      - "contracts/finding.schema.json"

packages:
  # ──────────────────────────────────────────────────────
  # wp-contracts
  #   Phase 0 of tasks.md. Root package — every other package depends on
  #   the JSON Schemas defining the on-disk checkpoint layout.
  # ──────────────────────────────────────────────────────

  - package_id: wp-contracts
    task_type: implement
    description: "JSON Schemas for review-cache manifest and per-vendor findings file, plus contracts README."
    role: contracts
    priority: 1
    timeout_minutes: 30
    retry_budget: 1
    min_trust_level: 1
    depends_on: []
    scope:
      write_allow:
        - "openspec/changes/harden-multi-vendor-review-recovery/contracts/**"
      read_allow:
        - "openspec/changes/harden-multi-vendor-review-recovery/**"
        - "skills/parallel-infrastructure/scripts/consensus_synthesizer.py"
        - "skills/parallel-infrastructure/scripts/review_dispatcher.py"
      deny: []
    worktree:
      name: wp-contracts
      mode: isolated
    locks:
      files:
        - "openspec/changes/harden-multi-vendor-review-recovery/contracts/review-cache-layout.schema.json"
        - "openspec/changes/harden-multi-vendor-review-recovery/contracts/finding.schema.json"
      keys:
        - "contract:review-cache-layout.v1"
        - "contract:finding.v1"
    verification:
      tier_required: B
      steps:
        - name: "JSON Schema syntax validation"
          kind: command
          command: "skills/.venv/bin/python -c 'import json; from pathlib import Path; [json.loads(p.read_text()) for p in Path(\"openspec/changes/harden-multi-vendor-review-recovery/contracts\").glob(\"*.schema.json\")]'"
          evidence:
            artifacts:
              - "openspec/changes/harden-multi-vendor-review-recovery/contracts/review-cache-layout.schema.json"
              - "openspec/changes/harden-multi-vendor-review-recovery/contracts/finding.schema.json"
            result_keys: ["schemas_parse"]
    outputs:
      result_keys: ["schemas_parse"]
      artifacts:
        - "openspec/changes/harden-multi-vendor-review-recovery/contracts/README.md"
        - "openspec/changes/harden-multi-vendor-review-recovery/contracts/review-cache-layout.schema.json"
        - "openspec/changes/harden-multi-vendor-review-recovery/contracts/finding.schema.json"
    metadata:
      loc_estimate: 80
      package_kind: data_model

  # ──────────────────────────────────────────────────────
  # wp-checkpoint-helper
  #   Phase 0 of tasks.md (the helper module itself, paired with contracts).
  #   Lives under skills/autopilot/scripts/. Independent write scope from
  #   the parallel-infrastructure refactor and the converge() changes,
  #   so it can run in parallel with wp-cli-refactor once contracts land.
  # ──────────────────────────────────────────────────────

  - package_id: wp-checkpoint-helper
    task_type: implement
    description: "Implement skills/autopilot/scripts/checkpoint_findings.py — write_vendor_findings, read_vendor_findings, write_manifest, read_manifest. Includes round-trip and edge-case tests."
    role: infrastructure
    priority: 2
    timeout_minutes: 60
    retry_budget: 1
    min_trust_level: 2
    depends_on: ["wp-contracts"]
    scope:
      write_allow:
        - "skills/autopilot/scripts/checkpoint_findings.py"
        - "skills/tests/autopilot/test_checkpoint_findings.py"
      read_allow:
        - "skills/autopilot/**"
        - "skills/parallel-infrastructure/scripts/consensus_synthesizer.py"
        - "skills/parallel-infrastructure/scripts/review_dispatcher.py"
        - "openspec/changes/harden-multi-vendor-review-recovery/**"
      deny:
        - "skills/autopilot/scripts/convergence_loop.py"
        - "skills/parallel-infrastructure/**"
    worktree:
      name: wp-checkpoint-helper
      mode: isolated
    locks:
      files:
        - "skills/autopilot/scripts/checkpoint_findings.py"
      keys:
        - "feature:autopilot:checkpoint"
    verification:
      tier_required: B
      steps:
        - name: "Round-trip + edge-case tests"
          kind: command
          command: "skills/.venv/bin/python -m pytest skills/tests/autopilot/test_checkpoint_findings.py -v"
          evidence:
            artifacts:
              - "skills/autopilot/scripts/checkpoint_findings.py"
            result_keys: ["checkpoint_tests_passed"]
    outputs:
      result_keys: ["checkpoint_tests_passed"]
      artifacts:
        - "skills/autopilot/scripts/checkpoint_findings.py"
        - "skills/tests/autopilot/test_checkpoint_findings.py"
    metadata:
      loc_estimate: 200
      package_kind: algorithm

  # ──────────────────────────────────────────────────────
  # wp-cli-refactor
  #   Phase 1 + Phase 2 of tasks.md. Refactors review_dispatcher.py to use
  #   the shared helper and extracts load_findings_from_dir() in
  #   consensus_synthesizer.py. CLI behavior unchanged. Runs in parallel
  #   with wp-checkpoint-helper consumers but depends on the helper itself.
  # ──────────────────────────────────────────────────────

  - package_id: wp-cli-refactor
    task_type: implement
    description: "Replace inlined finding/manifest writes in review_dispatcher.py with checkpoint_findings calls. Extract load_findings_from_dir() helper from consensus_synthesizer.py. CLI behavior unchanged; tests assert byte-identical artifacts."
    role: infrastructure
    priority: 3
    timeout_minutes: 75
    retry_budget: 1
    min_trust_level: 2
    depends_on: ["wp-checkpoint-helper"]
    scope:
      write_allow:
        - "skills/parallel-infrastructure/scripts/review_dispatcher.py"
        - "skills/parallel-infrastructure/scripts/consensus_synthesizer.py"
        - "skills/tests/parallel-infrastructure/**"
      read_allow:
        - "skills/parallel-infrastructure/**"
        - "skills/autopilot/scripts/checkpoint_findings.py"
        - "openspec/changes/harden-multi-vendor-review-recovery/**"
      deny:
        - "skills/autopilot/scripts/convergence_loop.py"
        - "skills/autopilot/scripts/checkpoint_findings.py"
    worktree:
      name: wp-cli-refactor
      mode: isolated
    locks:
      files:
        - "skills/parallel-infrastructure/scripts/review_dispatcher.py"
        - "skills/parallel-infrastructure/scripts/consensus_synthesizer.py"
      keys:
        - "feature:parallel-infrastructure:refactor"
        - "feature:harness-engineering-features:cli"
    verification:
      tier_required: B
      steps:
        - name: "CLI byte-equivalence + extraction tests"
          kind: command
          command: "skills/.venv/bin/python -m pytest skills/tests/parallel-infrastructure/ -v"
          evidence:
            artifacts:
              - "skills/parallel-infrastructure/scripts/review_dispatcher.py"
              - "skills/parallel-infrastructure/scripts/consensus_synthesizer.py"
            result_keys: ["cli_tests_passed"]
    outputs:
      result_keys: ["cli_tests_passed"]
      artifacts:
        - "skills/parallel-infrastructure/scripts/review_dispatcher.py"
        - "skills/parallel-infrastructure/scripts/consensus_synthesizer.py"
    metadata:
      loc_estimate: 180
      package_kind: config

  # ──────────────────────────────────────────────────────
  # wp-converge-recovery
  #   Phases 3 + 4 + 5 + 6 of tasks.md. Heart of the proposal.
  #   - Adds ConvergenceResult observability fields
  #   - Adds in-process checkpointing in converge()
  #   - Adds CLI subprocess fallback
  #   - Adds audit log emission
  #   These four changes are tightly coupled (all touch convergence_loop.py
  #   and ConvergenceResult) and ship in one package to avoid mid-feature
  #   states where checkpointing exists but recovery doesn't yet read it.
  # ──────────────────────────────────────────────────────

  - package_id: wp-converge-recovery
    task_type: implement
    description: "Add ConvergenceResult.recovered_via_fallback + .fallback_diagnostics fields, in-process checkpoint write, CLI subprocess fallback, and audit event emission to converge()."
    role: infrastructure
    priority: 4
    timeout_minutes: 180
    retry_budget: 1
    min_trust_level: 2
    depends_on: ["wp-checkpoint-helper", "wp-cli-refactor"]
    scope:
      write_allow:
        - "skills/autopilot/scripts/convergence_loop.py"
        - "skills/tests/autopilot/test_convergence_recovery.py"
        - "skills/tests/autopilot/test_convergence_result_shape.py"
      read_allow:
        - "skills/autopilot/**"
        - "skills/parallel-infrastructure/scripts/consensus_synthesizer.py"
        - "skills/coordination-bridge/**"
        - "openspec/changes/harden-multi-vendor-review-recovery/**"
      deny:
        - "skills/autopilot/scripts/checkpoint_findings.py"
        - "skills/parallel-infrastructure/**"
    worktree:
      name: wp-converge-recovery
      mode: isolated
    locks:
      files:
        - "skills/autopilot/scripts/convergence_loop.py"
      keys:
        - "feature:autopilot:recovery"
        - "feature:harness-engineering-features:converge"
    verification:
      tier_required: A
      steps:
        - name: "Convergence recovery test suite"
          kind: command
          command: "skills/.venv/bin/python -m pytest skills/tests/autopilot/test_convergence_recovery.py skills/tests/autopilot/test_convergence_result_shape.py -v"
          evidence:
            artifacts:
              - "skills/autopilot/scripts/convergence_loop.py"
            result_keys: ["recovery_tests_passed"]
        - name: "Existing autopilot test suite (regression check)"
          kind: command
          command: "skills/.venv/bin/python -m pytest skills/tests/autopilot/ -v --ignore=skills/tests/autopilot/test_convergence_recovery.py --ignore=skills/tests/autopilot/test_convergence_result_shape.py --ignore=skills/tests/autopilot/test_checkpoint_findings.py"
          evidence:
            artifacts:
              - "skills/autopilot/scripts/convergence_loop.py"
            result_keys: ["regression_tests_passed"]
    outputs:
      result_keys: ["recovery_tests_passed", "regression_tests_passed"]
      artifacts:
        - "skills/autopilot/scripts/convergence_loop.py"
        - "skills/tests/autopilot/test_convergence_recovery.py"
        - "skills/tests/autopilot/test_convergence_result_shape.py"
    metadata:
      loc_estimate: 350
      package_kind: algorithm

  # ──────────────────────────────────────────────────────
  # wp-integration
  #   Phase 7 + Phase 8.1 + 8.2 of tasks.md. End-to-end integration test
  #   reproducing the original failure shape, plus documentation updates.
  #   Final package — depends on all upstream packages.
  #   Phase 8.3 (file follow-up bug fix proposal) is performed during
  #   /cleanup-feature, not here.
  # ──────────────────────────────────────────────────────

  - package_id: wp-integration
    task_type: implement
    description: "End-to-end integration test of fallback recovery using a real (non-mocked) line_range shape mismatch. Update docs/parallel-agentic-development.md and skills/autopilot/SKILL.md with the recovery contract."
    role: integration
    priority: 5
    timeout_minutes: 90
    retry_budget: 1
    min_trust_level: 2
    depends_on: ["wp-converge-recovery"]
    scope:
      write_allow:
        - "skills/tests/autopilot/test_convergence_recovery_integration.py"
        - "docs/parallel-agentic-development.md"
        - "skills/autopilot/SKILL.md"
      read_allow:
        - "skills/**"
        - "openspec/changes/harden-multi-vendor-review-recovery/**"
        - "docs/**"
      deny:
        - "skills/autopilot/scripts/**"
        - "skills/parallel-infrastructure/**"
    worktree:
      name: wp-integration
      mode: isolated
    locks:
      files:
        - "skills/tests/autopilot/test_convergence_recovery_integration.py"
        - "docs/parallel-agentic-development.md"
      keys:
        - "feature:autopilot:integration"
    verification:
      tier_required: A
      steps:
        - name: "Integration test"
          kind: command
          command: "skills/.venv/bin/python -m pytest skills/tests/autopilot/test_convergence_recovery_integration.py -v"
          evidence:
            artifacts:
              - "skills/tests/autopilot/test_convergence_recovery_integration.py"
            result_keys: ["integration_test_passed"]
        - name: "Doc lint"
          kind: command
          command: "skills/.venv/bin/python -c 'from pathlib import Path; assert \"recovered_via_fallback\" in Path(\"docs/parallel-agentic-development.md\").read_text()'"
          evidence:
            artifacts:
              - "docs/parallel-agentic-development.md"
            result_keys: ["docs_updated"]
    outputs:
      result_keys: ["integration_test_passed", "docs_updated"]
      artifacts:
        - "skills/tests/autopilot/test_convergence_recovery_integration.py"
        - "docs/parallel-agentic-development.md"
        - "skills/autopilot/SKILL.md"
    metadata:
      loc_estimate: 200
      package_kind: integration
