    role: backend-implementer
    priority: 3
    depends_on:
      - wp-autopilot-layer-1
    locks:
      files:
        - "skills/autopilot/scripts/phase_agent.py"
        - "skills/autopilot/scripts/autopilot.py"
      keys:
