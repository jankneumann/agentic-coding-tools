packages:
  # ─────────────────────────────────────────────────────────────────
  # wp-contracts: schemas + fixtures (root, no deps) — tasks 1.1-1.4
  # ─────────────────────────────────────────────────────────────────
  - package_id: wp-contracts
    title: "PhaseRecord JSON Schemas + Fixtures"
    task_type: contract
    description: "Tasks 1.1-1.4. Define JSON Schema contracts for PhaseRecord and the handoff local-file fallback envelope. Validate against fixture payloads to lock the contract before downstream packages consume it."
    role: backend-implementer
    priority: 1
    depends_on: []
    locks:
      files:
        - "openspec/changes/phase-record-compaction/contracts/schemas/phase-record.schema.json"
        - "openspec/changes/phase-record-compaction/contracts/schemas/handoff-local-fallback.schema.json"
        - "openspec/changes/phase-record-compaction/contracts/README.md"
      keys:
        - "feature:phase-record-compaction:contracts"
        - "contract:phase-record-schema"
        - "contract:handoff-local-fallback-schema"
      ttl_minutes: 60
      reason: "PhaseRecord schema definition — root contract package"
    scope:
      write_allow:
        - "openspec/changes/phase-record-compaction/contracts/**"
        - "skills/tests/phase-record-compaction/test_schema_fixtures.py"
        - "skills/tests/phase-record-compaction/fixtures/**"
      read_allow:
        - "**"
      deny:
        - "skills/session-log/**"
        - "skills/autopilot/**"
        - "agent-coordinator/**"
    worktree:
      name: phase-record-compaction
      mode: isolated
    timeout_minutes: 30
    retry_budget: 1
    min_trust_level: 2
    verification:
      tier_required: B
      steps:
        - name: "Validate JSON Schemas are well-formed"
          kind: command
          command: "skills/.venv/bin/python -c 'import json,jsonschema; [jsonschema.Draft202012Validator.check_schema(json.load(open(p))) for p in [\"openspec/changes/phase-record-compaction/contracts/schemas/phase-record.schema.json\", \"openspec/changes/phase-record-compaction/contracts/schemas/handoff-local-fallback.schema.json\"]]'"
          cwd: "."
          expect_exit_code: 0
          evidence:
            artifacts: []
            result_keys:
              - "schemas_valid"
        - name: "Run fixture-validation tests"
          kind: command
          command: "skills/.venv/bin/python -m pytest skills/tests/phase-record-compaction/test_schema_fixtures.py -v"
          cwd: "."
          expect_exit_code: 0
          evidence:
            artifacts: []
            result_keys:
              - "fixture_tests_passed"
    inputs: {}
    outputs:
      result_keys:
        - "schemas_valid"
        - "fixture_tests_passed"
      artifacts:
        - "openspec/changes/phase-record-compaction/contracts/schemas/phase-record.schema.json"
        - "openspec/changes/phase-record-compaction/contracts/schemas/handoff-local-fallback.schema.json"
        - "openspec/changes/phase-record-compaction/contracts/README.md"
    metadata:
      loc_estimate: 200
      package_kind: config

  # ─────────────────────────────────────────────────────────────────
  # wp-phase-record-model: PhaseRecord dataclass + write_both — tasks 2.1-2.11
  # ─────────────────────────────────────────────────────────────────
  - package_id: wp-phase-record-model
    title: "PhaseRecord Data Model + write_both Pipeline"
    task_type: feature
    description: "Tasks 2.1-2.11. Implement the PhaseRecord dataclass family (PhaseRecord, Decision, Alternative, TradeOff, FileRef), markdown render+parse with architectural-tag round-trip preservation, handoff payload (de)serialization, and the three-step write_both() pipeline (append → sanitize → coordinator-or-local-fallback). Extend the session-log template in place. Re-implement append_phase_entry as a deprecation-warned shim."
    role: backend-implementer
    priority: 1
    depends_on:
      - wp-contracts
    locks:
      files:
        - "skills/session-log/scripts/phase_record.py"
        - "skills/session-log/scripts/extract_session_log.py"
        - "skills/session-log/SKILL.md"
        - "openspec/schemas/feature-workflow/templates/session-log.md"
      keys:
        - "feature:phase-record-compaction:model"
      ttl_minutes: 120
      reason: "PhaseRecord data model and session-log skill integration"
    scope:
      write_allow:
        - "skills/session-log/**"
        - "openspec/schemas/feature-workflow/templates/session-log.md"
        - "skills/tests/phase-record-compaction/test_phase_record_*.py"
        - "skills/tests/session-log/test_extract_session_log.py"
      read_allow:
        - "**"
      deny:
        - "skills/autopilot/**"
        - "skills/plan-feature/**"
        - "skills/iterate-on-plan/**"
        - "skills/implement-feature/**"
        - "skills/iterate-on-implementation/**"
        - "skills/validate-feature/**"
        - "skills/cleanup-feature/**"
    worktree:
      name: phase-record-compaction
      mode: isolated
    timeout_minutes: 90
    retry_budget: 1
    min_trust_level: 2
    verification:
      tier_required: A
      steps:
        - name: "PhaseRecord unit tests"
          kind: command
          command: "skills/.venv/bin/python -m pytest skills/tests/phase-record-compaction/test_phase_record_model.py skills/tests/phase-record-compaction/test_phase_record_markdown.py skills/tests/phase-record-compaction/test_phase_record_handoff.py skills/tests/phase-record-compaction/test_phase_record_write_both.py -v"
          cwd: "."
          expect_exit_code: 0
          evidence:
            artifacts: []
            result_keys:
              - "phase_record_tests_passed"
        - name: "Existing session-log tests still pass (shim compat)"
          kind: command
          command: "skills/.venv/bin/python -m pytest skills/session-log/scripts/test_extract_session_log.py skills/session-log/scripts/test_sanitize_session_log.py skills/tests/session-log/ -v"
          cwd: "."
          expect_exit_code: 0
          evidence:
            artifacts: []
            result_keys:
              - "session_log_existing_tests_passed"
        - name: "mypy strict on phase_record.py"
          kind: command
          command: "skills/.venv/bin/python -m mypy --strict skills/session-log/scripts/phase_record.py"
          cwd: "."
          expect_exit_code: 0
          evidence:
            artifacts: []
            result_keys:
              - "mypy_phase_record_clean"
    inputs:
      depends_on_artifacts:
        - "openspec/changes/phase-record-compaction/contracts/schemas/phase-record.schema.json"
        - "openspec/changes/phase-record-compaction/contracts/schemas/handoff-local-fallback.schema.json"
    outputs:
      result_keys:
        - "phase_record_tests_passed"
        - "session_log_existing_tests_passed"
        - "mypy_phase_record_clean"
        - "phase_record_module_implemented"
        - "session_log_template_extended"
        - "append_phase_entry_shim_added"
      artifacts:
        - "skills/session-log/scripts/phase_record.py"
        - "skills/session-log/scripts/extract_session_log.py"
        - "skills/session-log/SKILL.md"
        - "openspec/schemas/feature-workflow/templates/session-log.md"
    metadata:
      loc_estimate: 700
      package_kind: data_model

  # ─────────────────────────────────────────────────────────────────
  # wp-skills-retrofit: 6 SKILL.md updates — tasks 3.1-3.7
  # ─────────────────────────────────────────────────────────────────
  - package_id: wp-skills-retrofit
    title: "Phase-Boundary Skill Retrofits (6 SKILL.md files)"
    task_type: refactor
    description: "Tasks 3.1-3.7. Replace `append_phase_entry(...)` calls with `PhaseRecord(...).write_both()` in the six phase-boundary skills: plan-feature, iterate-on-plan, implement-feature, iterate-on-implementation, validate-feature, cleanup-feature. Each skill's 'Append Session Log' step is updated to construct a PhaseRecord with the appropriate phase_name and structured fields. Add an integration test asserting matching session-log + handoff content."
    role: backend-implementer
    priority: 2
    depends_on:
      - wp-phase-record-model
    locks:
      files:
        - "skills/plan-feature/SKILL.md"
        - "skills/iterate-on-plan/SKILL.md"
        - "skills/implement-feature/SKILL.md"
        - "skills/iterate-on-implementation/SKILL.md"
        - "skills/validate-feature/SKILL.md"
        - "skills/cleanup-feature/SKILL.md"
      keys:
        - "feature:phase-record-compaction:retrofit"
      ttl_minutes: 120
      reason: "Coordinated retrofit of six phase-boundary skill SKILL.md files to use PhaseRecord API"
    scope:
      write_allow:
        - "skills/plan-feature/SKILL.md"
        - "skills/iterate-on-plan/SKILL.md"
        - "skills/implement-feature/SKILL.md"
        - "skills/iterate-on-implementation/SKILL.md"
        - "skills/validate-feature/SKILL.md"
        - "skills/cleanup-feature/SKILL.md"
        - "skills/tests/phase-record-compaction/test_skills_integration.py"
      read_allow:
        - "**"
      deny:
        - "skills/session-log/scripts/**"
        - "skills/autopilot/**"
        - "agent-coordinator/**"
    worktree:
      name: phase-record-compaction
      mode: isolated
    timeout_minutes: 60
    retry_budget: 1
    min_trust_level: 2
    verification:
      tier_required: B
      steps:
        - name: "All six skill SKILL.md files reference PhaseRecord.write_both"
          kind: command
          command: "for f in skills/plan-feature/SKILL.md skills/iterate-on-plan/SKILL.md skills/implement-feature/SKILL.md skills/iterate-on-implementation/SKILL.md skills/validate-feature/SKILL.md skills/cleanup-feature/SKILL.md; do grep -q 'PhaseRecord.*write_both' \"$f\" || { echo \"MISSING in $f\"; exit 1; }; done"
          cwd: "."
          expect_exit_code: 0
          evidence:
            artifacts: []
            result_keys:
              - "all_skills_retrofitted"
        - name: "Skills integration test (matching session-log + handoff content)"
          kind: command
          command: "skills/.venv/bin/python -m pytest skills/tests/phase-record-compaction/test_skills_integration.py -v"
          cwd: "."
          expect_exit_code: 0
          evidence:
            artifacts: []
            result_keys:
              - "skills_integration_passed"
    inputs:
      depends_on_artifacts:
        - "skills/session-log/scripts/phase_record.py"
    outputs:
      result_keys:
        - "all_skills_retrofitted"
        - "skills_integration_passed"
      artifacts:
        - "skills/plan-feature/SKILL.md"
        - "skills/iterate-on-plan/SKILL.md"
        - "skills/implement-feature/SKILL.md"
        - "skills/iterate-on-implementation/SKILL.md"
        - "skills/validate-feature/SKILL.md"
        - "skills/cleanup-feature/SKILL.md"
    metadata:
      loc_estimate: 500
      package_kind: config

  # ─────────────────────────────────────────────────────────────────
