schema_version: 1

feature:
  id: phase-record-compaction
  title: "Phase-Record Compaction — Unified PhaseRecord + Autopilot Sub-Agent Isolation"
  plan_revision: 1
  created_by: claude-opus-4-7
  created_at: "2026-04-25T00:00:00Z"

contracts:
  revision: 1
  openapi:
    primary: "openspec/changes/phase-record-compaction/contracts/README.md"
    files:
      - "openspec/changes/phase-record-compaction/contracts/README.md"
      - "openspec/changes/phase-record-compaction/contracts/schemas/phase-record.schema.json"
      - "openspec/changes/phase-record-compaction/contracts/schemas/handoff-local-fallback.schema.json"

defaults:
  priority: 5
  lock_ttl_minutes: 120
  timeout_minutes: 60
  retry_budget: 1
