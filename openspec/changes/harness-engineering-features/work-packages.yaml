        - "agent-coordinator/src/memory.py"
        - "openspec/schemas/**"
      deny:
        - "agent-coordinator/src/**"
        - "agent-coordinator/database/**"
    worktree:
      name: harness-engineering-features
      mode: isolated
    timeout_minutes: 90
    retry_budget: 2
    min_trust_level: 2
    verification:
      tier_required: B
