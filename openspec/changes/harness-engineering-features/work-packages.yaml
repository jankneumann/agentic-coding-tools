schema_version: 1

feature:
  id: harness-engineering-features
  title: "Harness Engineering Features — 9 Features: Context, Review Loops, Linters, Capability Gaps, Evaluator, Scope, Metrics, Transcripts, Multi-Source Pipeline"
  plan_revision: 2
  created_by: claude-code

contracts:
  revision: 1
  openapi:
    primary: "openspec/changes/harness-engineering-features/contracts/README.md"
    files:
      - "openspec/changes/harness-engineering-features/contracts/README.md"

defaults:
  priority: 5
  lock_ttl_minutes: 120
  timeout_minutes: 60
  retry_budget: 2
  verification_tier_required: B
  min_trust_level: 2

packages:
  - package_id: wp-context-architecture
    title: "Progressive Context Architecture + Shared Tag Schema + Session-Log Capability Gaps"
    task_type: refactor
    description: "Restructure CLAUDE.md into a ~100 line table-of-contents that points to topic-specific docs under docs/guides/, extend memory tag conventions with failure_type/capability_gap/affected_skill/severity/source prefixes (D4), and extend the session-log PhaseRecord with a Capability Gaps Observed section (D10) that mirrors entries to memory with source:session-log."
    role: backend-implementer
    priority: 1
    depends_on: []
    locks:
      files:
        - "CLAUDE.md"
        - "skills/session-log/scripts/phase_record.py"
      keys:
        - "feature:claude-md"
        - "feature:docs-guides"
        - "feature:session-log-capability-gaps"
      ttl_minutes: 120
      reason: "CLAUDE.md restructuring, memory convention docs, session-log Capability Gaps section"
    scope:
      write_allow:
        - "CLAUDE.md"
        - "docs/guides/**"
        - "agent-coordinator/src/memory.py"
        - "skills/session-log/scripts/phase_record.py"
        - "skills/session-log/scripts/extract_session_log.py"
        - "skills/session-log/SKILL.md"
        - "skills/session-log/tests/**"
      read_allow:
        - "**"
      deny:
        - "agent-coordinator/database/**"
    worktree:
      name: harness-engineering-features
      mode: isolated
    timeout_minutes: 90
    retry_budget: 2
    min_trust_level: 2
    verification:
      tier_required: B
      steps:
        - name: "Memory module unit tests"
          kind: command
          command: "agent-coordinator/.venv/bin/python -m pytest agent-coordinator/tests/test_memory.py -v"
          cwd: "."
          expect_exit_code: 0
          evidence:
            artifacts: []
            result_keys:
              - "memory_tests_passed"
        - name: "CLAUDE.md line count enforcement"
          kind: command
          command: "test $(wc -l < CLAUDE.md) -le 120"
          cwd: "."
          expect_exit_code: 0
          evidence:
            artifacts: []
            result_keys:
              - "claude_md_length_ok"
        - name: "Session-log Capability Gaps round-trip and emission tests"
          kind: command
          command: "skills/.venv/bin/python -m pytest skills/session-log/tests/ -v"
          cwd: "."
          expect_exit_code: 0
          evidence:
            artifacts: []
            result_keys:
              - "session_log_capability_gaps_tests_passed"
    metadata:
      loc_estimate: 600
      package_kind: config
    inputs: {}
    outputs:
      result_keys:
        - "claude_md_restructured"
        - "topic_docs_written"
        - "memory_tags_extended"
      artifacts:
        - "CLAUDE.md"
        - "docs/guides/"

  - package_id: wp-coordinator-extensions
    title: "Coordinator Extensions — Profiles, Scope Enforcement, Capability-Gap Auto-Emission"
    task_type: implementation
    description: "Add the evaluator agent profile, extend check_guardrails with optional session_scope parameter, enforce scope locks on work_queue task claims, AND extend audit.AuditService.log_operation with a ring-buffer push (hot path, no LLM) feeding a background audit-triage LLM classifier (see agent-coordinator/src/audit_triage.py) that auto-emits capability-gap memory entries with source:coordinator-emitted + prompt_version:N (D9). The classifier resolves its model via agents_config.resolve_model(archetype, package_metadata={}, provider=…) — default archetype `analyst`, default provider `claude_code` — and composes its prompt via agents_config.compose_prompt(archetype, task_prompt). Output is strict-schema-enforced; invalid responses are dropped with a warning. Regex/threshold pattern matching is explicitly OUT of scope — see D9 rationale on discovering unnamed struggle patterns. NOTE: write_allow includes agent-coordinator/src/memory.py which overlaps with wp-context-architecture — safe because this package depends_on wp-context-architecture (sequential execution)."
    role: backend-implementer
    priority: 2
    depends_on:
      - wp-context-architecture
    locks:
      files:
        - "agent-coordinator/src/guardrails.py"
        - "agent-coordinator/src/profiles.py"
        - "agent-coordinator/src/work_queue.py"
        - "agent-coordinator/src/session_grants.py"
        - "agent-coordinator/src/audit.py"
      keys:
        - "db:schema:agent_profiles"
        - "api:guardrails"
        - "api:work_queue"
        - "api:audit:capability-gap-emitter"
      ttl_minutes: 150
      reason: "Evaluator profile migration, guardrail scope enforcement, audit-side capability-gap LLM classifier (D9)"
    scope:
      write_allow:
        - "agent-coordinator/src/profiles.py"
        - "agent-coordinator/src/work_queue.py"
        - "agent-coordinator/src/guardrails.py"
        - "agent-coordinator/src/session_grants.py"
        - "agent-coordinator/src/audit.py"
        - "agent-coordinator/src/memory.py"
        - "agent-coordinator/config.yaml.example"
        - "agent-coordinator/database/migrations/**"
        - "agent-coordinator/tests/**"
      read_allow:
        - "agent-coordinator/**"
        - "openspec/schemas/**"
      deny:
        - "skills/**"
    worktree:
      name: harness-engineering-features
      mode: isolated
    timeout_minutes: 120
    retry_budget: 2
    min_trust_level: 2
    verification:
      tier_required: B
      steps:
        - name: "Guardrails and work_queue unit tests"
          kind: command
          command: "agent-coordinator/.venv/bin/python -m pytest agent-coordinator/tests/test_guardrails.py agent-coordinator/tests/test_work_queue.py agent-coordinator/tests/test_profiles.py -v"
          cwd: "."
          expect_exit_code: 0
          evidence:
            artifacts: []
            result_keys:
              - "coordinator_tests_passed"
        - name: "Audit capability-gap auto-emitter tests"
          kind: command
          command: "agent-coordinator/.venv/bin/python -m pytest agent-coordinator/tests/test_audit_capability_gaps.py -v"
          cwd: "."
          expect_exit_code: 0
          evidence:
            artifacts: []
            result_keys:
              - "audit_capability_gap_tests_passed"
    metadata:
      loc_estimate: 900
      package_kind: integration
    inputs: {}
    outputs:
      result_keys:
        - "evaluator_profile_seeded"
        - "session_scope_enforced"
      artifacts:
        - "agent-coordinator/src/profiles.py"
        - "agent-coordinator/src/guardrails.py"
        - "agent-coordinator/src/session_grants.py"

  - package_id: wp-review-loops
    title: "Review Loop Convergence Enhancement"
    task_type: implementation
    description: "Extend convergence_loop with iteration control (default max 3), auto-escalation when unresolved fix/escalate findings remain at iteration limit, and metrics recording to episodic memory."
    role: backend-implementer
    priority: 3
    depends_on:
      - wp-context-architecture
    locks:
      files:
        - "skills/autopilot/scripts/convergence_loop.py"
        - "skills/parallel-infrastructure/scripts/consensus_synthesizer.py"
      keys:
        - "feature:autopilot"
        - "feature:parallel-infrastructure-consensus"
      ttl_minutes: 120
      reason: "Convergence loop iteration control and metrics"
    scope:
      write_allow:
