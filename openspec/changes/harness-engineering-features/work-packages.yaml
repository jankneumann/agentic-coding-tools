            artifacts: []
            result_keys:
              - "convergence_tests_passed"
    metadata:
      loc_estimate: 700
      package_kind: algorithm
    inputs: {}
    outputs:
      result_keys:
        - "iteration_control_added"
        - "escalation_logic_implemented"
        - "metrics_recording_enabled"
      artifacts:
        - "skills/autopilot/scripts/convergence_loop.py"

  - package_id: wp-architecture-linters
