  - package_id: wp-new-skills
    title: "New Skills — improve-harness (multi-source) & agent-metrics"
    task_type: implementation
    description: "Create /improve-harness and /agent-metrics skills. /improve-harness reads from ALL capability-gap sources (memory entries with any source:* tag plus session-log files for the Capability Gaps Observed section), deduplicates on (capability_gap, affected_skill, session_id), and emits reports with per-finding source attribution and a cross-source agreement summary."
