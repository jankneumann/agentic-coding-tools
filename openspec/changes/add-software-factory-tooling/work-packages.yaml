      mode: isolated
    timeout_minutes: 90
    retry_budget: 1
    min_trust_level: 2
    verification:
      tier_required: B
      steps:
        - name: "archive intelligence tests"
          kind: command
          command: "skills/.venv/bin/python -m pytest skills/explore-feature/tests/ -v"
          cwd: "."
          expect_exit_code: 0
          evidence:
            artifacts: []
            result_keys:
              - "archive_tests_passed"
    outputs:
      result_keys:
        - "archive_index_supported"
        - "exemplar_registry_supported"
      artifacts:
        - "docs/factory-intelligence/archive-index.json"

  - package_id: wp-dogfood
    title: "Dogfood Software Factory Tooling"
    task_type: implementation
    description: >
      Apply the new tooling to this repository: classify scenario packs, add DTU-lite
      fixtures, run dogfood validation, and document lessons learned. Covers tasks 5.1-5.3.
    depends_on:
      - wp-scenario-packs
      - wp-dtu-scaffold
      - wp-workflow-rework
      - wp-archive-intelligence
    priority: 5
    role: backend
    metadata:
      loc_estimate: 220
      package_kind: integration
    locks:
      files:
        - "agent-coordinator/evaluation/gen_eval/scenarios/"
        - "agent-coordinator/evaluation/gen_eval/descriptors/agent-coordinator.yaml"
        - "docs/lessons-learned.md"
      keys:
        - "feature:add-software-factory-tooling:dogfood"
      ttl_minutes: 120
      reason: "Dogfood pack classification and DTU fixtures"
    scope:
      write_allow:
        - "agent-coordinator/evaluation/gen_eval/**"
        - "docs/lessons-learned.md"
        - "docs/factory-intelligence/**"
        - "openspec/changes/add-software-factory-tooling/**"
      read_allow:
        - "openspec/**"
        - "docs/**"
        - "skills/**"
      deny:
        - "skills/validate-feature/scripts/**"
    worktree:
      name: wp-dogfood
      mode: isolated
    timeout_minutes: 90
    retry_budget: 1
    min_trust_level: 2
    verification:
      tier_required: B
      steps:
        - name: "dogfood gen-eval validation"
          kind: command
          command: "make gen-eval"
          cwd: "."
          expect_exit_code: 0
          evidence:
            artifacts: []
            result_keys:
              - "dogfood_gen_eval_passed"
    outputs:
      result_keys:
        - "dogfood_public_holdout_supported"
        - "dogfood_dtu_supported"
      artifacts:
        - "docs/lessons-learned.md"

  - package_id: wp-integration
    title: "Integration And Documentation"
    task_type: integration
    description: >
      Run end-to-end validation across scenario packs, DTUs, workflow gates, archive
      mining, and dogfood assets. Finalize docs and evidence. Covers task 6.1.
    depends_on:
      - wp-dogfood
    priority: 5
    role: integrator
    metadata:
      loc_estimate: 150
      package_kind: integration
    locks:
      files:
        - "docs/software-factory-tooling.md"
        - "openspec/changes/add-software-factory-tooling/validation-report.md"
      keys:
        - "feature:add-software-factory-tooling:integration"
      ttl_minutes: 120
      reason: "Final integration validation and documentation"
    scope:
      write_allow:
        - "docs/software-factory-tooling.md"
        - "docs/factory-intelligence/**"
        - "openspec/changes/add-software-factory-tooling/**"
      read_allow:
        - "**"
    worktree:
      name: wp-integration
      mode: isolated
    timeout_minutes: 90
    retry_budget: 1
    min_trust_level: 2
    verification:
      tier_required: B
      steps:
        - name: "openspec validate"
          kind: command
