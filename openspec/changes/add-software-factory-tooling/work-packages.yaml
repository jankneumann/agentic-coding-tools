          cwd: "."
          expect_exit_code: 0
          evidence:
            artifacts: []
            result_keys:
              - "openspec_valid"
    outputs:
      result_keys:
        - "integration_complete"
      artifacts:
        - "docs/software-factory-tooling.md"
