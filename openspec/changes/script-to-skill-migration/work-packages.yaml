schema_version: 1

feature:
  id: script-to-skill-migration
  title: "Migrate shared scripts to infrastructure skills for cross-repo portability"
  plan_revision: 1
  created_by: claude-code
  created_at: "2026-03-25T13:20:00Z"

contracts:
  revision: 1
  openapi:
    primary: openspec/changes/script-to-skill-migration/contracts/infra-skill-schema.yaml
    files:
      - openspec/changes/script-to-skill-migration/contracts/infra-skill-schema.yaml

packages:
  # ─── Root: Create infrastructure skill scaffolds ───
  - package_id: wp-infra-skills
    title: "Create infrastructure skill directories and SKILL.md files"
    task_type: scaffolding
    description: |
      Create 4 new infrastructure skill directories under skills/:
      - skills/worktree/ (worktree.py + merge_worktrees.py)
      - skills/coordination-bridge/ (coordination_bridge.py)
      - skills/validate-packages/ (validate_work_packages.py + parallel_zones.py + validate_work_result.py)
      - skills/validate-flows/ (validate_flows.py)
      Each gets a SKILL.md (user_invocable: false) documenting the script API,
      and a scripts/ subdirectory with copies of the source scripts.
    role: infrastructure
    priority: 1
    depends_on: []
    locks:
      files:
        - skills/worktree/SKILL.md
        - skills/coordination-bridge/SKILL.md
        - skills/validate-packages/SKILL.md
        - skills/validate-flows/SKILL.md
      keys:
        - "feature:script-to-skill-migration:scaffold"
      ttl_minutes: 120
      reason: "Creating new infrastructure skill directories"
    scope:
      write_allow:
        - "skills/worktree/**"
        - "skills/coordination-bridge/**"
        - "skills/validate-packages/**"
        - "skills/validate-flows/**"
      read_allow:
        - "scripts/**"
        - "skills/**"
      deny:
        - "skills/linear-*/**"
        - "skills/parallel-*/**"
    worktree:
      name: wp-infra-skills
    timeout_minutes: 60
    retry_budget: 1
    min_trust_level: 2
    verification:
      tier_required: A
      steps:
        - name: validate-skill-md
          kind: command
          command: "for d in worktree coordination-bridge validate-packages validate-flows; do test -f skills/$d/SKILL.md || exit 1; done"
          evidence:
            artifacts: []
            result_keys: ["skill_md_present"]
        - name: validate-scripts-present
          kind: command
          command: "test -f skills/worktree/scripts/worktree.py && test -f skills/coordination-bridge/scripts/coordination_bridge.py && test -f skills/validate-packages/scripts/validate_work_packages.py && test -f skills/validate-flows/scripts/validate_flows.py"
          evidence:
            artifacts: []
            result_keys: ["scripts_present"]
    outputs:
      result_keys: ["infra_skills_created"]
      artifacts:
        - skills/worktree/SKILL.md
        - skills/coordination-bridge/SKILL.md
        - skills/validate-packages/SKILL.md
        - skills/validate-flows/SKILL.md

  # ─── Parallel: Update linear skill path references ───
  - package_id: wp-linear-skill-refs
    title: "Update path references in linear workflow skills"
    task_type: refactoring
    description: |
      Update all SKILL.md files in linear workflow skills to use sibling-relative
      paths instead of repo-root paths:
      - scripts/worktree.py → <skill-base-dir>/../worktree/scripts/worktree.py
      - scripts/coordination_bridge.py → <skill-base-dir>/../coordination-bridge/scripts/coordination_bridge.py
      - scripts/validate_flows.py → <skill-base-dir>/../validate-flows/scripts/validate_flows.py
      Affects: linear-plan-feature, linear-implement-feature, linear-iterate-on-implementation,
      linear-validate-feature, linear-cleanup-feature, linear-iterate-on-plan
    role: refactoring
    priority: 2
    depends_on:
      - wp-infra-skills
    locks:
      files:
        - skills/linear-plan-feature/SKILL.md
        - skills/linear-implement-feature/SKILL.md
        - skills/linear-iterate-on-implementation/SKILL.md
        - skills/linear-validate-feature/SKILL.md
        - skills/linear-cleanup-feature/SKILL.md
        - skills/linear-iterate-on-plan/SKILL.md
      keys:
        - "feature:script-to-skill-migration:linear"
      ttl_minutes: 120
      reason: "Updating path references in linear skills"
    scope:
      write_allow:
        - "skills/linear-*/SKILL.md"
      read_allow:
        - "skills/**"
      deny:
        - "skills/parallel-*/**"
        - "scripts/**"
    worktree:
      name: wp-linear-skill-refs
    timeout_minutes: 60
    retry_budget: 1
    min_trust_level: 2
    verification:
      tier_required: C
      steps:
        - name: no-repo-root-refs
          kind: command
          command: "! grep -r 'scripts/worktree\\.py\\|scripts/coordination_bridge\\.py\\|scripts/validate_flows\\.py' skills/linear-*/SKILL.md"
          evidence:
            artifacts: []
            result_keys: ["no_repo_root_refs"]
    outputs:
      result_keys: ["linear_refs_updated"]
      artifacts:
        - skills/linear-plan-feature/SKILL.md
        - skills/linear-implement-feature/SKILL.md

  # ─── Parallel: Update parallel skill path references ───
  - package_id: wp-parallel-skill-refs
    title: "Update path references in parallel workflow skills"
    task_type: refactoring
    description: |
      Update all SKILL.md files in parallel workflow skills to use sibling-relative paths:
      - scripts/worktree.py → <skill-base-dir>/../worktree/scripts/worktree.py
      - scripts/validate_work_packages.py → <skill-base-dir>/../validate-packages/scripts/validate_work_packages.py
      - scripts/parallel_zones.py → <skill-base-dir>/../validate-packages/scripts/parallel_zones.py
      - scripts/validate_work_result.py → <skill-base-dir>/../validate-packages/scripts/validate_work_result.py
      - scripts/merge_worktrees.py → <skill-base-dir>/../worktree/scripts/merge_worktrees.py
      Also update sys.path imports in parallel-implement-feature/scripts/dag_scheduler.py
      and scope_checker.py.
      Affects: parallel-plan-feature, parallel-implement-feature, parallel-validate-feature,
      parallel-cleanup-feature
    role: refactoring
    priority: 2
    depends_on:
      - wp-infra-skills
    locks:
      files:
        - skills/parallel-plan-feature/SKILL.md
        - skills/parallel-implement-feature/SKILL.md
        - skills/parallel-validate-feature/SKILL.md
        - skills/parallel-cleanup-feature/SKILL.md
        - skills/parallel-implement-feature/scripts/dag_scheduler.py
        - skills/parallel-implement-feature/scripts/scope_checker.py
      keys:
        - "feature:script-to-skill-migration:parallel"
      ttl_minutes: 120
      reason: "Updating path references in parallel skills"
    scope:
      write_allow:
        - "skills/parallel-*/SKILL.md"
        - "skills/parallel-implement-feature/scripts/**"
      read_allow:
        - "skills/**"
      deny:
        - "skills/linear-*/**"
        - "scripts/**"
    worktree:
      name: wp-parallel-skill-refs
    timeout_minutes: 60
    retry_budget: 1
    min_trust_level: 2
    verification:
      tier_required: C
      steps:
        - name: no-repo-root-refs
          kind: command
          command: "! grep -r 'scripts/worktree\\.py\\|scripts/validate_work_packages\\.py\\|scripts/parallel_zones\\.py\\|scripts/merge_worktrees\\.py\\|scripts/validate_work_result\\.py' skills/parallel-*/SKILL.md"
          evidence:
            artifacts: []
            result_keys: ["no_repo_root_refs"]
    outputs:
      result_keys: ["parallel_refs_updated"]
      artifacts:
        - skills/parallel-plan-feature/SKILL.md
        - skills/parallel-implement-feature/scripts/dag_scheduler.py

  # ─── Parallel: Update alias and utility skill path references ───
  - package_id: wp-alias-skill-refs
    title: "Update path references in alias and utility skills"
    task_type: refactoring
    description: |
      Update SKILL.md path references in alias skills (plan-feature, implement-feature,
      iterate-on-implementation, validate-feature, cleanup-feature, explore-feature,
      iterate-on-plan) and utility skills (fix-scrub, openspec-beads-worktree,
      merge-pull-requests) to use sibling-relative paths.
    role: refactoring
    priority: 2
    depends_on:
      - wp-infra-skills
    locks:
      files:
        - skills/plan-feature/SKILL.md
        - skills/implement-feature/SKILL.md
        - skills/iterate-on-implementation/SKILL.md
        - skills/validate-feature/SKILL.md
        - skills/cleanup-feature/SKILL.md
        - skills/fix-scrub/SKILL.md
        - skills/openspec-beads-worktree/SKILL.md
      keys:
        - "feature:script-to-skill-migration:alias"
      ttl_minutes: 120
      reason: "Updating path references in alias and utility skills"
    scope:
      write_allow:
        - "skills/plan-feature/SKILL.md"
        - "skills/implement-feature/SKILL.md"
        - "skills/iterate-on-implementation/SKILL.md"
        - "skills/validate-feature/SKILL.md"
        - "skills/cleanup-feature/SKILL.md"
        - "skills/explore-feature/SKILL.md"
        - "skills/iterate-on-plan/SKILL.md"
        - "skills/fix-scrub/SKILL.md"
        - "skills/openspec-beads-worktree/SKILL.md"
        - "skills/merge-pull-requests/SKILL.md"
      read_allow:
        - "skills/**"
      deny:
        - "skills/linear-*/**"
        - "skills/parallel-*/**"
        - "scripts/**"
    worktree:
      name: wp-alias-skill-refs
    timeout_minutes: 60
    retry_budget: 1
    min_trust_level: 2
    verification:
      tier_required: C
      steps:
        - name: no-repo-root-refs
          kind: command
          command: "! grep -r 'scripts/worktree\\.py\\|scripts/coordination_bridge\\.py' skills/plan-feature/SKILL.md skills/implement-feature/SKILL.md skills/fix-scrub/SKILL.md"
          evidence:
            artifacts: []
            result_keys: ["no_repo_root_refs"]
    outputs:
      result_keys: ["alias_refs_updated"]
      artifacts:
        - skills/plan-feature/SKILL.md
        - skills/fix-scrub/SKILL.md

  # ─── Sequential: Update install.sh ───
  - package_id: wp-install-sh
    title: "Add source-to-infra-skill script sync step to install.sh"
    task_type: enhancement
    description: |
      Add a pre-sync step to install.sh that copies source scripts from scripts/
      into infrastructure skill directories before syncing to agent runtimes.
      Define the mapping: worktree→worktree.py+merge_worktrees.py,
      coordination-bridge→coordination_bridge.py, etc.
      Ensure rsync preserves existing skill-local files.
    role: infrastructure
    priority: 3
    depends_on:
      - wp-infra-skills
    locks:
      files:
        - skills/install.sh
      keys:
        - "feature:script-to-skill-migration:install"
      ttl_minutes: 60
      reason: "Enhancing install.sh with infra skill sync"
    scope:
      write_allow:
        - "skills/install.sh"
      read_allow:
        - "skills/**"
        - "scripts/**"
    worktree:
      name: wp-install-sh
    timeout_minutes: 45
    retry_budget: 1
    min_trust_level: 2
    verification:
      tier_required: A
      steps:
        - name: install-sh-dry-run
          kind: command
          command: "bash skills/install.sh --mode rsync --force --deps none --python-tools none 2>&1 | grep -c 'sync.*worktree'"
          evidence:
            artifacts: []
            result_keys: ["install_syncs_infra"]
    outputs:
      result_keys: ["install_sh_updated"]
      artifacts:
        - skills/install.sh

  # ─── Sequential: Documentation ───
  - package_id: wp-docs
    title: "Update documentation with infrastructure skill conventions"
    task_type: documentation
    description: |
      - Add docs/script-skill-dependencies.md (already drafted)
      - Update CLAUDE.md with infrastructure skill conventions
      - Update docs/skills-workflow.md with infrastructure skill section
    role: documentation
    priority: 4
    depends_on:
      - wp-infra-skills
    locks:
      files:
        - docs/script-skill-dependencies.md
        - docs/skills-workflow.md
      keys:
        - "feature:script-to-skill-migration:docs"
      ttl_minutes: 60
      reason: "Documenting infrastructure skill conventions"
    scope:
      write_allow:
        - "docs/**"
        - "CLAUDE.md"
      read_allow:
        - "skills/**"
        - "docs/**"
      deny:
        - "scripts/**"
    worktree:
      name: wp-docs
    timeout_minutes: 30
    retry_budget: 0
    min_trust_level: 1
    verification:
      tier_required: C
      steps:
        - name: docs-exist
          kind: command
          command: "test -f docs/script-skill-dependencies.md && test -f docs/skills-workflow.md"
          evidence:
            artifacts:
              - docs/script-skill-dependencies.md
            result_keys: ["docs_present"]
    outputs:
      result_keys: ["docs_updated"]
      artifacts:
        - docs/script-skill-dependencies.md
        - docs/skills-workflow.md

  # ─── Integration: Final merge and validation ───
  - package_id: wp-integration
    title: "Merge all packages and run full validation"
    task_type: integration
    description: |
      Merge all package branches into the feature branch.
      Run full validation suite:
      - openspec validate
      - install.sh sync to temp dir and verify infra skills present
      - Existing scripts/tests/ pass
      - Skill tests (bug-scrub, fix-scrub) pass
      - Verify a skill can resolve worktree.py from synced location
    role: integration
    priority: 5
    depends_on:
      - wp-linear-skill-refs
      - wp-parallel-skill-refs
      - wp-alias-skill-refs
      - wp-install-sh
      - wp-docs
    locks:
      files: []
      keys:
        - "feature:script-to-skill-migration:integration"
      ttl_minutes: 60
      reason: "Integration merge and validation"
    scope:
      write_allow:
        - "**"
      read_allow:
        - "**"
    worktree:
      name: wp-integration
    timeout_minutes: 90
    retry_budget: 2
    min_trust_level: 2
    verification:
      tier_required: A
      steps:
        - name: openspec-validate
          kind: command
          command: "openspec validate script-to-skill-migration --strict"
          evidence:
            artifacts: []
            result_keys: ["openspec_valid"]
        - name: scripts-tests
          kind: command
          command: "scripts/.venv/bin/python -m pytest scripts/tests/ -m 'not e2e and not integration' --tb=short"
          evidence:
            artifacts: []
            result_keys: ["scripts_tests_pass"]
        - name: install-sync-test
          kind: command
          command: "bash skills/install.sh --mode rsync --force --deps none --python-tools none && test -f .claude/skills/worktree/scripts/worktree.py"
          evidence:
            artifacts: []
            result_keys: ["install_syncs_infra_skills"]
    outputs:
      result_keys: ["integration_complete"]
      artifacts: []
