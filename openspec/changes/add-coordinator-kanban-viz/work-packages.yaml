schema_version: 1

feature:
  id: add-coordinator-kanban-viz
  title: "Coordinator Kanban visualization MVP — three columns + vendor swimlanes + sync-point banner"
  plan_revision: 1
  created_by: claude-opus-4-7
  created_at: "2026-05-15T12:00:00Z"

contracts:
  revision: 1
  openapi:
    primary: "contracts/README.md"
    files:
      - "contracts/README.md"
      - "contracts/schemas/events/transition.json"
      - "contracts/schemas/events/audit.json"
      - "contracts/schemas/events/snapshot.json"
      - "contracts/schemas/saved-view.json"
      - "contracts/schemas/audit-event.json"

# NOTE: cross-change dependency on `add-coordinator-task-status-renderer`
# is documented in proposal.md and contracts/README.md (Related coordinator
# surface). The work-packages schema is single-change-scoped and does not
# model inter-change references — implementations re-pin generated types
# against the renderer's contracts/README.md as it lands.

defaults:
  priority: 5
  lock_ttl_minutes: 120
  timeout_minutes: 60
  retry_budget: 1
  verification_tier_required: "B"
  min_trust_level: 2

packages:

  # ───────────────────────────────────────────────────────────────────
  # Phase 1 — Contracts (gates everything else)
  # ───────────────────────────────────────────────────────────────────

  - package_id: wp-contracts
    title: "Author HTTP/SSE/file-format contracts and FalkorDB reservation"
    task_type: contracts
    description: |
      Author contracts/README.md and the JSON schema files documenting:
        - GET /sync-points/status response
        - GET /worktrees/active response
        - GET /events/work SSE protocol + event payload schemas
        - Saved-view JSON file format with mandatory artifact header
        - Audit-event JSON file format with mandatory artifact header
        - Frontend ↔ coordinator type generation pipeline
        - FalkorDB schema reservation (no implementation in this change)
      Covers tasks 1.1–1.6.
      Spec scenarios: all "New Coordinator Endpoint" requirements,
                       "Saved Views with Mandatory Artifact Header",
                       "Reversibility-Classified UI Actions" (audit format)
      Design decisions: D2 (SSE), D5 (sync-point reuse), D6 (FalkorDB
                        reservation), D7 (saved-view), D8 (reversibility table)
    role: python-engineer
    priority: 1
    depends_on: []
    timeout_minutes: 60
    retry_budget: 1
    min_trust_level: 2
    locks:
      files:
        - "openspec/changes/add-coordinator-kanban-viz/contracts/README.md"
        - "openspec/changes/add-coordinator-kanban-viz/contracts/schemas/**"
        - "docs/kanban-viz/falkordb-reservation.md"
      keys:
        - "feature:add-coordinator-kanban-viz:contracts"
      ttl_minutes: 90
      reason: "Authoring contracts and FalkorDB reservation"
    scope:
      write_allow:
        - "openspec/changes/add-coordinator-kanban-viz/contracts/**"
        - "docs/kanban-viz/falkordb-reservation.md"
      read_allow:
        - "openspec/**"
        - "agent-coordinator/src/coordination_api.py"
        - "agent-coordinator/src/issue_service.py"
        - "agent-coordinator/src/audit.py"
        - "agent-coordinator/src/work_queue.py"
        - "skills/shared/active_agents.py"
        - "skills/coordination-bridge/scripts/coordination_bridge.py"
        - "openspec/roadmaps/codeviz/proposal.md"
    worktree:
      name: "wp-contracts"
      mode: "isolated"
    verification:
      tier_required: "C"
      steps:
        - name: "validate-openspec"
          kind: "command"
          command: "openspec validate add-coordinator-kanban-viz --strict"
          expect_exit_code: 0
          evidence:
            artifacts: []
            result_keys:
              - "openspec_validate_exit_code"
        - name: "validate-json-schemas"
          kind: "command"
          # Verify every schema under contracts/schemas/** is itself a valid
          # JSON Schema (Draft 2020-12). check_schema raises on a malformed
          # schema. Fails fast if no schemas were authored. No `|| true`.
          command: >
            skills/.venv/bin/python -c "import json, pathlib, sys;
            from jsonschema import Draft202012Validator;
            root = pathlib.Path('openspec/changes/add-coordinator-kanban-viz/contracts/schemas');
            schemas = sorted(root.rglob('*.json'));
            assert schemas, f'no schemas authored under {root}';
            [Draft202012Validator.check_schema(json.loads(p.read_text(encoding='utf-8'))) for p in schemas];
            print(f'validated {len(schemas)} schema(s)')"
          expect_exit_code: 0
          evidence:
            artifacts: []
            result_keys:
              - "json_schemas_well_formed"
    outputs:
      result_keys:
        - "contracts_revision"

  # ───────────────────────────────────────────────────────────────────
  # Phase 2 — Coordinator endpoints (parallel after wp-contracts)
  # ───────────────────────────────────────────────────────────────────

  - package_id: wp-coord-endpoints
    title: "Implement coordinator endpoints (read + write + file-write), event bus channel, NOTIFY trigger migration, CORS, and SSE fail-closed"
    task_type: implement
    description: |
      Adds nine new endpoints to agent-coordinator/src/coordination_api.py:
        - GET /sync-points/status (reuses skills.shared.active_agents.check_no_active_agents)
        - GET /worktrees/active (projects .git-worktrees/.registry.json)
        - POST /events/auth (mints short-lived single-use JWT for SSE,
          fails closed when COORDINATOR_SSE_SIGNING_KEY is unset)
        - GET /events/work (SSE; sse-starlette; registers callbacks on
          existing EventBusService via on_event() for coordinator_task
          and the new coordinator_audit channel — do NOT open a parallel
          Postgres LISTEN; validates JWT from query string, redacts token=
          from access logs)
        - PATCH /issues/{id}/labels (drag-to-Ready label mutation; wraps
          IssueService.update)
        - DELETE /locks/{file_path:path} (force-release lock; service-layer
          path executes a direct parameterized DELETE FROM file_locks when
          force=True, bypassing the holder-only release_lock SQL function)
        - POST /agents/{agent_id}/kick (clears the agent's entry from
          .git-worktrees/.registry.json via the worktree teardown helper
          AND updates agent_sessions.status='disconnected' and
          last_heartbeat=epoch; returns {registry_cleared,
          agent_sessions_updated, held_locks}; emits audit. There is no
          agent_discovery table — earlier drafts that referenced it were
          wrong; check_no_active_agents() reads the on-disk registry)
        - PUT /kanban-viz/saved-views/{slug} (coordinator-owned file write
          for browser persistence; slug validated against
          ^[a-z0-9][a-z0-9-]{0,63}$; resolved under WORKDIR_ROOT;
          server-stamps mandatory artifact header; atomic write)
        - POST /kanban-viz/audit (coordinator-owned file write for UI
          audit events; same validation/header-stamping/atomic-write rules;
          date subdirectory derived server-side from generated_at)
      Adds the FastAPI CORSMiddleware with the D12 allow-list
      (http://localhost:5173 plus COORDINATOR_CORS_ALLOWED_ORIGINS CSV).
      Extends agent-coordinator/src/event_bus.py CHANNELS with a new
      coordinator_audit channel, installs the matching Postgres trigger on
      audit_log via a small additive SQL migration (next sequential number
      under agent-coordinator/database/migrations/), and wires
      AuditService.append (which lives in audit.py, not audit_service.py)
      to emit through the bus — NOT a parallel NOTIFY pathway. Adds
      backpressure coalescing to SSE handler.
      Vendor swimlane data source: extracted from agent_id suffix
      (canonical) with agent_sessions.agent_type as secondary cross-check
      per D4. The previous design's per-agent agent_profiles.metadata.vendor
      column does not exist; no back-fill or column write is needed.
      Tests under skills/tests/agent-coordinator/.
      Covers tasks 2.0a, 2.1–2.15 (incl. 2.7c–j, 2.13a–h).
      Spec scenarios: "New Coordinator Endpoint — Sync-Point Status" (all),
                       "...Worktree Active Projection" (all),
                       "...Work Event Stream (SSE)" (all),
                       "New Coordinator Write Endpoints for UI Actions" (all),
                       "New Coordinator File-Write Endpoints for UI Persistence" (all),
                       "Authentication Posture for Kanban UI" (fail-closed),
                       "CORS Allow-List for Kanban Origins" (all),
                       "Backpressure coalesces excessive events"
      Design decisions: D2 (SSE via event_bus.on_event), D5 (sync-point
                        reuse), D4 (vendor source-of-truth correction),
                        D9 (write endpoints), D10 (file-write endpoints),
                        D11 (auth), D12 (CORS)
    role: python-engineer
    priority: 2
    depends_on:
      - wp-contracts
    timeout_minutes: 240
    retry_budget: 1
    min_trust_level: 2
    locks:
      files:
        - "agent-coordinator/src/coordination_api.py"
        - "agent-coordinator/src/issue_service.py"
        - "agent-coordinator/src/audit.py"
        - "agent-coordinator/src/event_bus.py"
        - "agent-coordinator/src/locks.py"
        - "agent-coordinator/src/discovery.py"
        - "agent-coordinator/src/sync_points.py"
      keys:
        - "feature:add-coordinator-kanban-viz:endpoints"
      ttl_minutes: 300
      reason: "Implementing new coordinator endpoints + event_bus channel extension"
    scope:
      write_allow:
        - "agent-coordinator/src/coordination_api.py"
        - "agent-coordinator/src/issue_service.py"
        - "agent-coordinator/src/audit.py"
        - "agent-coordinator/src/event_bus.py"
        - "agent-coordinator/src/locks.py"
        - "agent-coordinator/src/discovery.py"
        - "agent-coordinator/src/sync_points.py"
        - "agent-coordinator/src/worktrees_view.py"
        - "agent-coordinator/src/event_stream.py"
        - "agent-coordinator/src/kanban_viz_files.py"
        - "agent-coordinator/database/migrations/**"
        - "agent-coordinator/pyproject.toml"
        - "skills/tests/agent-coordinator/**"
      read_allow:
        - "agent-coordinator/**"
        - "openspec/changes/add-coordinator-kanban-viz/**"
        - "skills/shared/active_agents.py"
        - "skills/worktree/scripts/worktree.py"
    worktree:
      name: "wp-coord-endpoints"
      mode: "isolated"
    verification:
      tier_required: "B"
      steps:
        - name: "run-unit-tests"
          kind: "command"
          command: "agent-coordinator/.venv/bin/python -m pytest skills/tests/agent-coordinator/ -v -k 'sync_points or worktrees_active or events_work or events_auth or coordinator_audit or kick_agent or release_lock or patch_labels or vendor_source or saved_views or kanban_viz_audit or cors or sse_fail_closed or audit_notify_trigger'"
          expect_exit_code: 0
          evidence:
            artifacts: []
            result_keys:
              - "coord_endpoint_tests_passed"
    outputs:
      result_keys:
        - "coord_endpoint_tests_passed"

  # ───────────────────────────────────────────────────────────────────
  # Phase 3 — Frontend skeleton (parallel after wp-contracts)
  # ───────────────────────────────────────────────────────────────────

  - package_id: wp-frontend-skeleton
    title: "Scaffold apps/kanban-viz Vite+React+TS, board components, useCoordinator hook"
    task_type: implement
    description: |
      Scaffolds apps/kanban-viz/ (Vite + React + TS), wires TS type
      generation from coordinator Pydantic models, implements Board /
      Column / Card components, useCoordinator hook with SSE + polling
      fallback, and gitignore. Tests with vitest under
      apps/kanban-viz/src/__tests__/.
      Covers tasks 3.1–3.11.
      Spec scenarios: "Three-Column Kanban Board" (all),
                       "Live Update via SSE with Polling Fallback" (transition,
                       polling fallback, snapshot)
      Design decisions: D1 (apps/ location), D2 (SSE), D3 (no JSON sidecar)
    role: frontend-engineer
    priority: 3
    depends_on:
      - wp-contracts
    timeout_minutes: 300
    retry_budget: 1
    min_trust_level: 2
    locks:
      files:
        - "apps/kanban-viz/package.json"
        - "apps/kanban-viz/.gitignore"
        - "apps/kanban-viz/.nvmrc"
        - "apps/kanban-viz/tsconfig.json"
        - "apps/kanban-viz/vite.config.ts"
      keys:
        - "feature:add-coordinator-kanban-viz:skeleton"
      ttl_minutes: 360
      reason: "Scaffolding frontend"
    scope:
      write_allow:
        - "apps/kanban-viz/package.json"
        - "apps/kanban-viz/.gitignore"
        - "apps/kanban-viz/.nvmrc"
        - "apps/kanban-viz/tsconfig.json"
        - "apps/kanban-viz/vite.config.ts"
        - "apps/kanban-viz/index.html"
        - "apps/kanban-viz/public/**"
        - "apps/kanban-viz/src/main.tsx"
        - "apps/kanban-viz/src/App.tsx"
        - "apps/kanban-viz/src/components/Board.tsx"
        - "apps/kanban-viz/src/components/Column.tsx"
        - "apps/kanban-viz/src/components/Card.tsx"
        - "apps/kanban-viz/src/components/EmptyState.tsx"
        - "apps/kanban-viz/src/hooks/useCoordinator.ts"
        - "apps/kanban-viz/src/lib/event-stream.ts"
        - "apps/kanban-viz/src/lib/coordinator-client.ts"
        - "apps/kanban-viz/src/generated/coordinator-types.ts"
        - "apps/kanban-viz/src/styles/**"
        - "apps/kanban-viz/scripts/generate-types.ts"
        - "apps/kanban-viz/src/__tests__/board/**"
      read_allow:
        - "openspec/changes/add-coordinator-kanban-viz/**"
        - "agent-coordinator/src/coordination_api.py"
        - "agent-coordinator/src/issue_service.py"
        - "agent-coordinator/src/audit.py"
        - "openspec/changes/add-coordinator-task-status-renderer/contracts/README.md"
    worktree:
      name: "wp-frontend-skeleton"
      mode: "isolated"
    verification:
      tier_required: "B"
      steps:
        - name: "frontend-typecheck"
          kind: "command"
          command: "cd apps/kanban-viz && npm install && npm run typecheck"
          expect_exit_code: 0
          evidence:
            artifacts: []
            result_keys:
              - "frontend_typecheck_passed"
        - name: "frontend-tests"
          kind: "command"
          command: "cd apps/kanban-viz && npm test -- --run"
          expect_exit_code: 0
          evidence:
            artifacts: []
            result_keys:
              - "frontend_skeleton_tests_passed"
    outputs:
      result_keys:
        - "frontend_typecheck_passed"
        - "frontend_skeleton_tests_passed"

  # ───────────────────────────────────────────────────────────────────
  # Phase 4 — Vendor swimlanes (after wp-frontend-skeleton)
  # ───────────────────────────────────────────────────────────────────

  - package_id: wp-frontend-swimlanes
    title: "Implement vendor swimlanes on In-Flight cards with consensus collapse"
    task_type: implement
    description: |
      Adds VendorSwimlanes component extracting per-child vendor from the
      agent_id suffix after `--` (canonical per design D4 — the previous
      agent_profiles.metadata.vendor source-of-truth was based on a
      non-existent per-agent column) and the most-recent audit_log row per
      vendor. Implements consensus collapse on completed work-package using
      parallel-infrastructure consensus synthesizer output. Lane updates
      route through useCoordinator's audit event stream.
      Covers tasks 4.1–4.8.
      Spec scenarios: "Vendor Swimlanes on In-Flight Cards" (all)
      Design decisions: D4
    role: frontend-engineer
    priority: 4
    depends_on:
      - wp-frontend-skeleton
      - wp-coord-endpoints
    timeout_minutes: 180
    retry_budget: 1
    min_trust_level: 2
    locks:
      files:
        - "apps/kanban-viz/src/components/VendorSwimlanes.tsx"
      keys:
        - "feature:add-coordinator-kanban-viz:swimlanes"
      ttl_minutes: 240
      reason: "Implementing swimlanes UI"
    scope:
      write_allow:
        - "apps/kanban-viz/src/components/VendorSwimlanes.tsx"
        - "apps/kanban-viz/src/components/ConsensusIndicator.tsx"
        - "apps/kanban-viz/src/hooks/useSwimlaneData.ts"
        - "apps/kanban-viz/src/lib/vendor-colors.ts"
        - "apps/kanban-viz/src/__tests__/swimlanes/**"
      read_allow:
        - "apps/kanban-viz/**"
        - "agent-coordinator/src/audit.py"
        - "agent-coordinator/src/profiles.py"
        - "skills/parallel-infrastructure/**"
    worktree:
      name: "wp-frontend-swimlanes"
      mode: "isolated"
    verification:
      tier_required: "B"
      steps:
        - name: "swimlane-tests"
          kind: "command"
          command: "cd apps/kanban-viz && npm test -- --run swimlane"
          expect_exit_code: 0
          evidence:
            artifacts: []
            result_keys:
              - "swimlane_tests_passed"
    outputs:
      result_keys:
        - "swimlane_tests_passed"

  # ───────────────────────────────────────────────────────────────────
  # Phase 5 — Sync-point gate banner (after wp-frontend-skeleton)
  # ───────────────────────────────────────────────────────────────────

  - package_id: wp-frontend-sync-banner
    title: "Implement sync-point gate banner with consent-prompt component"
    task_type: implement
    description: |
      Adds SyncPointBanner pinned to top of board, polling
      /sync-points/status every 5s and updating on relevant SSE events.
      Adds ConsentPrompt component for destructive-write confirmation.
      Wires kick-agent action with audit emission on both confirm and
      decline paths.
      Covers tasks 5.1–5.8.
      Spec scenarios: "Sync-Point Gate Banner" (all)
      Design decisions: D5, D8
    role: frontend-engineer
    priority: 5
    depends_on:
      - wp-frontend-skeleton
      - wp-coord-endpoints
    timeout_minutes: 120
    retry_budget: 1
    min_trust_level: 2
    locks:
      files:
        - "apps/kanban-viz/src/components/SyncPointBanner.tsx"
        - "apps/kanban-viz/src/components/ConsentPrompt.tsx"
      keys:
        - "feature:add-coordinator-kanban-viz:banner"
      ttl_minutes: 180
      reason: "Implementing sync-point banner UI"
    scope:
      write_allow:
        - "apps/kanban-viz/src/components/SyncPointBanner.tsx"
        - "apps/kanban-viz/src/components/ConsentPrompt.tsx"
        - "apps/kanban-viz/src/hooks/useSyncPointStatus.ts"
        - "apps/kanban-viz/src/__tests__/banner/**"
      read_allow:
        - "apps/kanban-viz/**"
        - "agent-coordinator/src/coordination_api.py"
    worktree:
      name: "wp-frontend-sync-banner"
      mode: "isolated"
    verification:
      tier_required: "B"
      steps:
        - name: "sync-banner-tests"
          kind: "command"
          command: "cd apps/kanban-viz && npm test -- --run sync-banner"
          expect_exit_code: 0
          evidence:
            artifacts: []
            result_keys:
              - "sync_banner_tests_passed"
    outputs:
      result_keys:
        - "sync_banner_tests_passed"

  # ───────────────────────────────────────────────────────────────────
  # Phase 6 — Saved views + audit emission (after wp-frontend-skeleton)
  # ───────────────────────────────────────────────────────────────────

  - package_id: wp-saved-views
    title: "Implement saved views, audit emission, and reversibility classifier"
    task_type: implement
    description: |
      Adds saveView() that POSTs to PUT /kanban-viz/saved-views/{slug} on
      the browser path (coordinator owns the on-disk write per D10) and
      falls back to Tauri fs.writeTextFile on the Tauri path. The
      coordinator stamps the mandatory artifact header server-side; the
      frontend ships only the operator-authored payload. Adds
      SavedViewsDrawer UI for list/save/load. Implements drag-to-Ready
      interaction emitting reversible-write audit events via
      POST /kanban-viz/audit (browser) / Tauri fs (Tauri). Adds
      reversibility classifier (apps/kanban-viz/src/lib/reversibility.ts)
      per design D8 with comment pointing to the codeviz reservation in
      skills/shared/op_reversibility.py.
      Covers tasks 6.1–6.10.
      Spec scenarios: "Saved Views with Mandatory Artifact Header" (all),
                       "Reversibility-Classified UI Actions" (all),
                       "Tauri frontend bypasses coordinator file-write endpoints"
      Design decisions: D7, D8, D10
    role: frontend-engineer
    priority: 6
    depends_on:
      - wp-frontend-skeleton
    timeout_minutes: 180
    retry_budget: 1
    min_trust_level: 2
    locks:
      files:
        - "apps/kanban-viz/src/lib/saved-views.ts"
        - "apps/kanban-viz/src/lib/audit-emit.ts"
        - "apps/kanban-viz/src/lib/reversibility.ts"
        - "apps/kanban-viz/src/components/SavedViewsDrawer.tsx"
      keys:
        - "feature:add-coordinator-kanban-viz:views"
      ttl_minutes: 240
      reason: "Implementing saved-views and audit emission"
    scope:
      write_allow:
        - "apps/kanban-viz/src/lib/saved-views.ts"
        - "apps/kanban-viz/src/lib/audit-emit.ts"
        - "apps/kanban-viz/src/lib/reversibility.ts"
        - "apps/kanban-viz/src/lib/artifact-header.ts"
        - "apps/kanban-viz/src/components/SavedViewsDrawer.tsx"
        - "apps/kanban-viz/src/components/DragToReady.tsx"
        - "apps/kanban-viz/src/hooks/useSavedViews.ts"
        - "apps/kanban-viz/src/__tests__/views/**"
      read_allow:
        - "apps/kanban-viz/**"
        - "openspec/changes/add-coordinator-kanban-viz/**"
        - "openspec/roadmaps/codeviz/proposal.md"
    worktree:
      name: "wp-saved-views"
      mode: "isolated"
    verification:
      tier_required: "B"
      steps:
        - name: "saved-views-tests"
          kind: "command"
          command: "cd apps/kanban-viz && npm test -- --run saved-views"
          expect_exit_code: 0
          evidence:
            artifacts: []
            result_keys:
              - "saved_views_tests_passed"
    outputs:
      result_keys:
        - "saved_views_tests_passed"

  # ───────────────────────────────────────────────────────────────────
  # Phase 7 — Tauri scaffold (parallel after wp-frontend-skeleton)
  # ───────────────────────────────────────────────────────────────────

  - package_id: wp-tauri-scaffold
    title: "Scaffold Tauri 2.x src-tauri/ with cargo-check verification (no production build)"
    task_type: implement
    description: |
      Adds apps/kanban-viz/src-tauri/ with:
        - Cargo.toml (Tauri 2.x deps pinned)
        - tauri.conf.json (allowlist http.request only, deny all else)
        - src/main.rs (minimal builder)
        - .gitignore for target/
      Adds runtime feature-detect for Tauri APIs in
      apps/kanban-viz/src/lib/runtime.ts. Adds tests asserting browser
      paths function without @tauri-apps/api evaluated at module-load.
      No production build is wired into CI.
      Covers tasks 7.1–7.5.
      Spec scenarios: "Frontend Packaging" (Tauri scaffold),
                       "Tauri scaffold passes cargo check",
                       "Browser code paths run without Tauri APIs"
      Design decisions: design.md "Tauri-readiness checklist"
    role: frontend-engineer
    priority: 7
    depends_on:
      - wp-frontend-skeleton
    timeout_minutes: 90
    retry_budget: 1
    min_trust_level: 2
    locks:
      files:
        - "apps/kanban-viz/src-tauri/Cargo.toml"
        - "apps/kanban-viz/src-tauri/tauri.conf.json"
        - "apps/kanban-viz/src-tauri/src/main.rs"
        - "apps/kanban-viz/src-tauri/.gitignore"
        - "apps/kanban-viz/src/lib/runtime.ts"
      keys:
        - "feature:add-coordinator-kanban-viz:scaffold"
      ttl_minutes: 120
      reason: "Scaffolding Tauri shell"
    scope:
      write_allow:
        - "apps/kanban-viz/src-tauri/**"
        - "apps/kanban-viz/src/lib/runtime.ts"
        - "apps/kanban-viz/src/__tests__/runtime/**"
      read_allow:
        - "apps/kanban-viz/**"
    worktree:
      name: "wp-tauri-scaffold"
      mode: "isolated"
    verification:
      tier_required: "B"
      steps:
        - name: "tauri-cargo-check"
          kind: "command"
          command: "cd apps/kanban-viz/src-tauri && cargo check"
          expect_exit_code: 0
