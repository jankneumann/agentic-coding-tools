# Internal API Contract: Git Adapter
# Protocol interface for git operations used by the merge train service.

create_speculative_ref:
  description: |
    Create a speculative git reference by merging a feature branch onto a base ref.
    The base ref is either 'main' (for position 1) or the preceding entry's
    speculative ref (for position N > 1).

    Internally this runs `git merge-tree --write-tree --messages <base> <branch>`
    (requires git >= 2.38), which produces a tree OID on success or a conflict
    report on failure. On success, the adapter creates a git ref pointing to a
    new commit built from that tree (with base as parent). The tree_oid is
    surfaced to callers so they can cache intermediate merge results across
    train positions.
  input:
    base_ref:
      type: string
      required: true
      description: Git ref to merge onto (main or preceding speculative ref)
    feature_branch:
      type: string
      required: true
      description: Branch name of the feature/package to merge
    ref_name:
      type: string
      required: true
      description: "Name for the speculative ref (e.g., refs/speculative/train-abc/pos-1)"
  output:
    success:
      type: boolean
      description: True if merge-tree succeeded and ref was created
    tree_oid:
      type: string
      nullable: true
      description: Git tree OID produced by merge-tree; null on conflict or error
    commit_sha:
      type: string
      nullable: true
      description: SHA of the new commit pointed to by ref_name; null on conflict or error
    conflict_files:
      type: array
      items: string
      description: Files with conflict markers; empty on success
    error:
      type: string
      nullable: true
      description: Error message for non-conflict failures (network, disk, invalid input); null on success or conflict

delete_speculative_refs:
  description: |
    Delete all speculative refs for a given train.
  input:
    train_id:
      type: string
      required: true
      description: Train ID — all refs under refs/speculative/train-{id}/ are deleted
  output:
    deleted_count: integer

fast_forward_main:
  description: |
    Fast-forward main to the final speculative ref of a completed partition.
    This is the actual merge-to-main operation.
  input:
    speculative_ref:
      type: string
      required: true
      description: The speculative ref to fast-forward main to
  output:
    success: boolean
    new_main_sha: string | null
    error: string | null

get_changed_files:
  description: |
    Get the list of files changed by a feature branch relative to its base.
  input:
    base_ref:
      type: string
      required: true
    feature_branch:
      type: string
      required: true
  output:
    changed_files: array[string]
    added_files: array[string]
    deleted_files: array[string]
