schema_version: 1

feature:
  id: extract-gen-eval-package
  title: "Extract gen-eval into a reusable package"
  plan_revision: 1
  created_by: claude
  created_at: "2026-05-23T00:00:00Z"

contracts:
  revision: 1
  openapi:
    primary: "openspec/changes/extract-gen-eval-package/contracts/README.md"
    files:
      - "openspec/changes/extract-gen-eval-package/contracts/README.md"

defaults:
  priority: 5
  lock_ttl_minutes: 120
  timeout_minutes: 90
  retry_budget: 1
  verification_tier_required: "B"
  min_trust_level: 2

packages:
  - package_id: wp-package-scaffold
    title: "Create packages/gen-eval/ skeleton and pyproject"
    task_type: implement
    description: |
      Create the new packages/gen-eval/ directory with src/-layout pyproject.toml,
      empty src/gen_eval/__init__.py, README.md stub, tests/__init__.py, and
      examples/ placeholder. Configure the four optional extras (mcp, sdk, db, all)
      and the gen-eval console script per design D2. Includes the empty-package
      smoke test (task 1.1) and the scaffold itself (tasks 1.2-1.3).
    role: python-engineer
    priority: 1
    depends_on: []
    timeout_minutes: 45
    retry_budget: 1
    min_trust_level: 2
    locks:
      files:
        - "packages/gen-eval/pyproject.toml"
        - "packages/gen-eval/README.md"
        - "packages/gen-eval/src/gen_eval/__init__.py"
        - "packages/gen-eval/tests/__init__.py"
        - "packages/gen-eval/tests/test_smoke.py"
      keys:
        - "feature:extract-gen-eval-package:scaffold"
      ttl_minutes: 60
      reason: "Initial package scaffold and pyproject configuration."
    scope:
      write_allow:
        - "packages/gen-eval/**"
      read_allow:
        - "openspec/changes/extract-gen-eval-package/**"
        - "agent-coordinator/evaluation/gen_eval/**"
        - "agent-coordinator/pyproject.toml"
    worktree:
      name: wp-package-scaffold
      mode: isolated
    verification:
      tier_required: "B"
      steps:
        - name: "package smoke test"
          kind: command
          command: "cd packages/gen-eval && uv sync && uv run pytest tests/test_smoke.py -v"
          evidence:
            artifacts:
              - "packages/gen-eval/pyproject.toml"
              - "packages/gen-eval/src/gen_eval/__init__.py"
            result_keys:
              - "pytest_exit_code"
              - "uv_sync_success"
    metadata:
      loc_estimate: 80
      complexity: low
      package_kind: config
    outputs:
      result_keys:
        - "pytest_exit_code"
        - "uv_sync_success"

  - package_id: wp-framework-move
    title: "Move framework code and surgically extract GenEvalMetrics"
    task_type: implement
    description: |
      Move all 23 .py files from agent-coordinator/evaluation/gen_eval/ to
      packages/gen-eval/src/gen_eval/ (mcp_service.py and clients/mcp_client.py
      land here too with try/except wrappers per design D4). Move mcp_service.py
      and clients/mcp_client.py with try/except wrappers per design D4.
      SURGICAL EXTRACTION (per refined D3): cut ONLY the `GenEvalMetrics`
      dataclass out of agent-coordinator/evaluation/metrics.py and paste it
      into packages/gen-eval/src/gen_eval/metrics.py. The other 10 classes
      (TimingMetric, TokenUsage, CorrectnessMetrics, CoordinationMetrics,
      SafetyMetrics, ParallelizationMetrics, TaskMetrics, AggregatedMetrics,
      TrialMetrics, MetricsCollector) and compute_effect_size STAY in the
      coordinator file — they are consumed by evaluation/ablation.py,
      evaluation/reports/generator.py, and coordinator tests. Update
      gen_eval/reports.py to import from gen_eval.metrics. Move
      package-shipped data (schemas/, dtu/ templates, sample descriptor).
      Update gen_eval/__init__.py with the public API re-exports. Add the
      surface test asserting gen_eval.metrics exposes exactly GenEvalMetrics
      (task 2.4.1). Covers tasks 2.1-2.5. L-sized but mechanical — splitting
      would break import consistency mid-move.
    role: python-engineer
    priority: 2
    depends_on: [wp-package-scaffold]
    timeout_minutes: 180
    retry_budget: 1
    min_trust_level: 2
    locks:
      files:
        - "packages/gen-eval/src/gen_eval"
        - "agent-coordinator/evaluation/gen_eval"
        - "agent-coordinator/evaluation/metrics.py"
      keys:
        - "feature:extract-gen-eval-package:framework"
      ttl_minutes: 180
      reason: "Atomic move of framework code; cannot be split without breaking imports."
    scope:
      write_allow:
        - "packages/gen-eval/src/**"
        - "packages/gen-eval/tests/fixtures/**"
        - "agent-coordinator/evaluation/gen_eval/**"
        - "agent-coordinator/evaluation/metrics.py"
      read_allow:
        - "agent-coordinator/**"
        - "openspec/changes/extract-gen-eval-package/**"
        - "evaluation/gen_eval/**"
    worktree:
      name: wp-framework-move
      mode: isolated
    verification:
      tier_required: "B"
      steps:
        - name: "framework parity test"
          kind: command
          command: "cd packages/gen-eval && uv sync --all-extras && uv run pytest tests/ -v"
          evidence:
            artifacts:
              - "packages/gen-eval/src/gen_eval/evaluator.py"
              - "packages/gen-eval/src/gen_eval/orchestrator.py"
              - "packages/gen-eval/src/gen_eval/metrics.py"
            result_keys:
              - "pytest_exit_code"
              - "files_moved"
        - name: "no coordinator imports in package"
          kind: command
          command: "! grep -rE 'from (agent_coordinator|src\\.coordination_)' packages/gen-eval/src/"
          evidence:
            artifacts: []
            result_keys:
              - "static_import_check"
        - name: "gen_eval.metrics surface is exactly GenEvalMetrics"
          kind: command
          command: "cd packages/gen-eval && uv run python -c \"import gen_eval.metrics; assert {n for n in dir(gen_eval.metrics) if not n.startswith('_')} == {'GenEvalMetrics'}, sorted(n for n in dir(gen_eval.metrics) if not n.startswith('_'))\""
          evidence:
            artifacts: []
            result_keys:
              - "metrics_surface_check"
        - name: "coordinator metrics consumers still resolve"
          kind: command
          command: "cd agent-coordinator && uv run python -c \"from evaluation.metrics import TimingMetric, TokenUsage, CorrectnessMetrics, CoordinationMetrics, SafetyMetrics, ParallelizationMetrics, TaskMetrics, AggregatedMetrics, TrialMetrics, MetricsCollector, compute_effect_size; print('ok')\""
          evidence:
            artifacts: []
            result_keys:
              - "coordinator_metrics_resolve_check"
    metadata:
      loc_estimate: 6500
      complexity: medium
      package_kind: migration
    outputs:
      result_keys:
        - "pytest_exit_code"
        - "files_moved"
        - "static_import_check"
        - "metrics_surface_check"
        - "coordinator_metrics_resolve_check"

  - package_id: wp-package-tests
    title: "Relocate gen-eval tests and add CI job"
    task_type: implement
    description: |
      Relocate gen-eval's 29 unit-test files from
      agent-coordinator/tests/test_evaluation/test_gen_eval/ (note the
      test_ prefix on every segment — the original task text had the wrong
      path) to packages/gen-eval/tests/ with import path updates
      (evaluation.gen_eval.* -> gen_eval.*, evaluation.metrics import
      GenEvalMetrics -> gen_eval.metrics import GenEvalMetrics). Delete
      the now-empty test_evaluation/test_gen_eval/ directory in the
      coordinator. Add tests for the optional [mcp] extra ImportError
      contract and the sdist-content contract. Add the gen-eval-tests CI
      job to .github/workflows/ci.yml per design D10. Per D8 Strategy A
      (repo-root build context), this package does NOT touch the
      coordinator docker-build CI step — wp-coordinator-migrate owns that
      under task 4.5(b). No wheel prebuild step is needed (the package
      lives inside the build context once context = repo root). Covers
      tasks 3.1-3.4. Runs in parallel with the coordinator migration,
      skill updates, and examples doc.
    role: python-engineer
    priority: 3
    depends_on: [wp-framework-move]
    timeout_minutes: 120
    retry_budget: 1
    min_trust_level: 2
    locks:
      files:
        - "packages/gen-eval/tests"
        - ".github/workflows/ci.yml"
        - "agent-coordinator/tests/test_evaluation/test_gen_eval"
      keys:
        - "feature:extract-gen-eval-package:tests"
      ttl_minutes: 120
      reason: "Package tests, CI matrix addition, and source-test deletion after relocation."
    scope:
      write_allow:
        - "packages/gen-eval/tests/**"
        - ".github/workflows/ci.yml"
        - "agent-coordinator/tests/test_evaluation/test_gen_eval/**"
      read_allow:
        - "packages/gen-eval/**"
        - "agent-coordinator/tests/**"
        - ".github/workflows/**"
        - "openspec/changes/extract-gen-eval-package/**"
    worktree:
      name: wp-package-tests
      mode: isolated
    verification:
      tier_required: "B"
      steps:
        - name: "full package test suite"
          kind: command
          command: "cd packages/gen-eval && uv run pytest -v -m 'not e2e and not integration'"
          evidence:
            artifacts:
              - "packages/gen-eval/tests/"
              - ".github/workflows/ci.yml"
            result_keys:
              - "pytest_exit_code"
              - "tests_passed"
              - "ci_job_added"
    metadata:
      loc_estimate: 600
      complexity: low
      package_kind: integration
    outputs:
      result_keys:
        - "pytest_exit_code"
        - "tests_passed"
        - "ci_job_added"

  - package_id: wp-coordinator-migrate
    title: "Migrate agent-coordinator to consume gen-eval package"
    task_type: implement
    description: |
      Update agent-coordinator/pyproject.toml to depend on gen-eval[mcp] via uv
      path source per design D5. Rewrite all from evaluation.gen_eval imports in
      agent-coordinator/src/ to from gen_eval per D6, AND remove the
      `gen_eval` entry from evaluation/__init__.py's __all__ list along
      with the now-dangling import. ALSO update the two literal string
      fixtures in agent-coordinator/tests/test_check_docker_imports.py
      (lines 54 and 210) and the reference in agent-coordinator/CLAUDE.md
      line 122. Relocate per-project data (descriptors/, manifests/, scenarios/)
      one level up out of the deleted gen_eval/ directory per D7. Update the
      agent-coordinator/Dockerfile per design D8 STRATEGY A (repo-root
      build context): prefix every COPY source with `agent-coordinator/`,
      add `COPY packages/gen-eval/` before `uv sync` so the path-dep
      resolves in-image, and move `COPY agent-coordinator/evaluation/`
      after `uv sync` for layer-cache hygiene. **Note**: the
      .github/workflows/ci.yml coordinator docker-build step repoint is
      NOT in this package's scope — it's owned by wp-integration (task
      7.6) so the CI change lands after the Dockerfile + docker-compose
      updates here are in place. Update
      docker-compose.yml coordinator service: context=`..`,
      dockerfile=`agent-coordinator/Dockerfile`. Update railway.toml with
      `dockerfilePath = "agent-coordinator/Dockerfile"` and a comment
      block documenting the required Railway dashboard change (Source >
      Root Directory: agent-coordinator -> /). Update README.md with a
      Deployment section documenting the dashboard change. Do NOT add a
      Makefile build-image target, do NOT add dist/ to .gitignore, do NOT
      add `--no-sources` or UV_FIND_LINKS — these were Option B artifacts
      Strategy A obsoletes. Run full coordinator test suite. Covers tasks
      4.1-4.6.
    role: python-engineer
    priority: 3
    depends_on: [wp-framework-move]
    timeout_minutes: 180
    retry_budget: 1
    min_trust_level: 2
    locks:
      files:
        - "agent-coordinator/pyproject.toml"
        - "agent-coordinator/Dockerfile"
        - "agent-coordinator/docker-compose.yml"
        - "agent-coordinator/README.md"
        - "agent-coordinator/railway.toml"
        - "agent-coordinator/src/coordination_api.py"
        - "agent-coordinator/src/coordination_mcp.py"
        - "agent-coordinator/CLAUDE.md"
        - "agent-coordinator/evaluation/__init__.py"
        - "agent-coordinator/evaluation/metrics.py"
        - "agent-coordinator/tests/test_check_docker_imports.py"
        - "agent-coordinator/tests/test_gen_eval_extraction.py"
      keys:
        - "feature:extract-gen-eval-package:coordinator"
      ttl_minutes: 180
      reason: "Coordinator dependency, imports, Dockerfile + docker-compose repointed to repo-root build context per D8 Strategy A, railway.toml dashboard-change documentation, data relocation, and leftover test-fixture string updates. CI-workflow ci.yml step repoint is owned by wp-integration to avoid scope overlap with wp-package-tests."
    scope:
      write_allow:
        - "agent-coordinator/pyproject.toml"
        - "agent-coordinator/uv.lock"
        - "agent-coordinator/Dockerfile"
        - "agent-coordinator/docker-compose.yml"
        - "agent-coordinator/README.md"
        - "agent-coordinator/railway.toml"
        - "agent-coordinator/CLAUDE.md"
        - "agent-coordinator/src/**"
        - "agent-coordinator/evaluation/**"
        - "agent-coordinator/tests/test_check_docker_imports.py"
        - "agent-coordinator/tests/test_gen_eval_extraction.py"
      read_allow:
        - "agent-coordinator/**"
        - "packages/gen-eval/**"
        - "openspec/changes/extract-gen-eval-package/**"
        - ".github/workflows/**"
      # Note: no `deny:` block here. Task 4.4 requires this package to read AND
      # mutate (relocate, then delete) files under
      # `agent-coordinator/evaluation/gen_eval/` (descriptors/, manifests/,
      # scenarios/ moving one level up, then the directory itself being removed).
      # An earlier draft denied that subtree which would block the relocation —
      # the write_allow on `agent-coordinator/evaluation/**` is the authoritative
      # scope for that work.
      # Tests-scope tightening (post-Strategy-A): explicit file paths instead of
      # `agent-coordinator/tests/**` to avoid overlap with wp-package-tests'
      # `agent-coordinator/tests/test_evaluation/test_gen_eval/**` (which deletes
      # the relocated test source dir). Task 4.1 pins the new test file name
      # `test_gen_eval_extraction.py`; task 4.3 modifies the existing
      # `test_check_docker_imports.py`.
      # CI workflow ownership: `.github/workflows/ci.yml` is NOT in this
      # package's scope. wp-package-tests owns the additive gen-eval-tests
      # matrix job (D10). wp-integration owns the existing coordinator
      # docker-build step repoint (D8 Strategy A) so the change lands after
      # the Dockerfile and docker-compose updates here are in place.
    worktree:
      name: wp-coordinator-migrate
      mode: isolated
    verification:
      tier_required: "B"
      steps:
        - name: "coordinator test suite"
          kind: command
          command: "cd agent-coordinator && uv sync --all-extras && uv run pytest -v -m 'not e2e and not integration'"
          evidence:
            artifacts:
              - "agent-coordinator/pyproject.toml"
              - "agent-coordinator/Dockerfile"
            result_keys:
              - "pytest_exit_code"
              - "tests_passed"
        - name: "no legacy import paths remain"
          kind: command
          command: "! grep -r 'from evaluation.gen_eval' agent-coordinator/"
          evidence:
            artifacts: []
            result_keys:
              - "static_import_check"
        - name: "in-tree gen_eval directory removed"
          kind: command
          command: "test ! -d agent-coordinator/evaluation/gen_eval"
          evidence:
            artifacts: []
            result_keys:
              - "directory_removed"
    metadata:
      loc_estimate: 400
      complexity: medium
      package_kind: migration
    outputs:
      result_keys:
        - "pytest_exit_code"
        - "tests_passed"
        - "static_import_check"
        - "directory_removed"

  - package_id: wp-skills-update
    title: "Update skill invocations to use new module path"
    task_type: implement
    description: |
      Update python -m evaluation.gen_eval invocations in skills/gen-eval/SKILL.md
      and skills/validate-feature/SKILL.md to python -m gen_eval. Update
      skills/playwright-validator/scripts/cli.py:141 (the actual Python import,
      not the SKILL.md) — change from evaluation.gen_eval to gen_eval and
      drop the sys.path.insert(0, agent-coordinator/) workaround (no longer
      needed once gen-eval is a real installed package). Retain the
      _minimal_parse fallback. Update the docstring reference in
      skills/playwright-validator/scripts/findings.py:112. Update the
      embedded Python validation snippet in skills/gen-eval-scenario/SKILL.md
      line 172 (`from evaluation.gen_eval.models import Scenario` ->
      `from gen_eval.models import Scenario`). Regenerate runtime mirrors via
      install.sh. Verify no evaluation.gen_eval strings remain in any skill
      copy. Covers tasks 5.1-5.4. Parallel-safe with coordinator migrate,
      package tests, examples doc.
    role: python-engineer
    priority: 3
    depends_on: [wp-framework-move]
    timeout_minutes: 60
    retry_budget: 1
    min_trust_level: 2
    locks:
      files:
        - "skills/gen-eval/SKILL.md"
        - "skills/validate-feature/SKILL.md"
        - "skills/playwright-validator/SKILL.md"
        - "skills/playwright-validator/scripts/cli.py"
        - "skills/playwright-validator/scripts/findings.py"
        - "skills/gen-eval-scenario/SKILL.md"
      keys:
        - "feature:extract-gen-eval-package:skills"
      ttl_minutes: 60
      reason: "Skill invocation string updates (SKILL.md + Python scripts) and runtime mirror regeneration."
    scope:
      write_allow:
        - "skills/gen-eval/**"
        - "skills/validate-feature/**"
        - "skills/playwright-validator/**"
        - "skills/gen-eval-scenario/**"
        - ".claude/skills/**"
        - ".agents/skills/**"
      read_allow:
        - "skills/**"
        - ".claude/skills/**"
        - ".agents/skills/**"
        - "openspec/changes/extract-gen-eval-package/**"
    worktree:
      name: wp-skills-update
      mode: isolated
    verification:
      tier_required: "B"
      steps:
        - name: "no legacy invocation strings remain (dotted)"
          kind: command
          command: "! grep -r 'evaluation\\.gen_eval' skills/ .claude/skills/ .agents/skills/"
          evidence:
            artifacts:
              - "skills/gen-eval/SKILL.md"
              - "skills/validate-feature/SKILL.md"
              - "skills/playwright-validator/SKILL.md"
            result_keys:
              - "static_string_check_dotted"
        - name: "no legacy invocation strings remain (slash)"
          kind: command
          # Required to catch slash-path references like
          # validate-feature's descriptor-discovery glob
          # (`*/evaluation/gen_eval/descriptors/*.yaml`) that the dotted
          # grep silently misses. Mirrors checkpoint 5.C and matches
          # round-2 / round-3 reviewer guidance.
          command: "! grep -r 'evaluation/gen_eval' skills/ .claude/skills/ .agents/skills/"
          evidence:
            artifacts:
              - "skills/validate-feature/SKILL.md"
            result_keys:
              - "static_string_check_slash"
              - "mirrors_regenerated"
    metadata:
      loc_estimate: 60
      complexity: low
      package_kind: config
    outputs:
      result_keys:
        - "static_string_check_dotted"
        - "static_string_check_slash"
        - "mirrors_regenerated"

  - package_id: wp-examples-doc
    title: "Write quickstart, descriptor template, README, and ADR"
    task_type: implement
    description: |
      Write packages/gen-eval/examples/agentic-assistant-quickstart.md per spec
      requirement (complete adoption walkthrough). Write annotated
      examples/descriptor-template.yaml. Write packages/gen-eval/README.md with
      public API summary, two install profiles, and pointer to quickstart.
      Write ADR in docs/decisions/ documenting the packages/ convention and the
      gen-eval extraction. Covers tasks 6.1-6.4. Parallel-safe with coordinator
      migrate, package tests, skills update.
    role: technical-writer
    priority: 3
    depends_on: [wp-framework-move]
    timeout_minutes: 90
    retry_budget: 1
    min_trust_level: 2
    locks:
      files:
        - "packages/gen-eval/README.md"
        - "packages/gen-eval/examples/agentic-assistant-quickstart.md"
        - "packages/gen-eval/examples/descriptor-template.yaml"
      keys:
        - "feature:extract-gen-eval-package:docs"
      ttl_minutes: 90
      reason: "Documentation and ADR."
    scope:
      write_allow:
        - "packages/gen-eval/README.md"
        - "packages/gen-eval/examples/**"
        - "docs/decisions/**"
      read_allow:
        - "packages/gen-eval/**"
        - "openspec/changes/extract-gen-eval-package/**"
        - "docs/decisions/**"
        - "openspec/specs/gen-eval-framework/**"
    worktree:
      name: wp-examples-doc
      mode: isolated
    verification:
      tier_required: "C"
      steps:
        - name: "documentation files exist and are non-empty"
          kind: command
          command: "test -s packages/gen-eval/README.md && test -s packages/gen-eval/examples/agentic-assistant-quickstart.md && test -s packages/gen-eval/examples/descriptor-template.yaml"
          evidence:
            artifacts:
              - "packages/gen-eval/README.md"
              - "packages/gen-eval/examples/agentic-assistant-quickstart.md"
              - "packages/gen-eval/examples/descriptor-template.yaml"
            result_keys:
              - "docs_present"
    metadata:
      loc_estimate: 400
      complexity: low
      package_kind: config
    outputs:
      result_keys:
        - "docs_present"

  - package_id: wp-integration
    title: "Full validation, CI docker-build repoint, Docker smoke, repo-wide stale-reference sweep"
    task_type: validate
    description: |
      Run openspec validate extract-gen-eval-package --strict. Refresh
      docs/architecture-analysis/ via make architecture (gen-eval's component
      now lives under packages/, not agent-coordinator/). Run
      /validate-feature extract-gen-eval-package (full validation pass).
      Update the existing coordinator docker-build step in
      .github/workflows/ci.yml per task 7.6: (a) context `.`, file
      `agent-coordinator/Dockerfile` (per D8 Strategy A — owned here, not
      in wp-coordinator-migrate, to avoid scope overlap with the
      gen-eval-tests matrix job that wp-package-tests adds to the same
      file); (b) rewrite the smoke-import line in the same step from
      `import evaluation.gen_eval.mcp_service` (or any variant) to
      `import gen_eval.mcp_service` (legacy module is removed by task
      4.3). Manually verify docker build with new repo-root context
      (task 7.4), run the in-container `import gen_eval` smoke (task
      7.4.1, catches the runtime-stage non-editable path-dep
      reachability), and run one end-to-end gen-eval scenario inside
      the built container (task 7.5).
      **Repo-wide stale-reference sweep (task 5.5)** is also owned here
      because the targets (`CLAUDE.md` at repo root, top-level
      `README.md`, `docs/**`, `apps/**`, `.github/**` non-CI files like
      ISSUE_TEMPLATE/PULL_REQUEST_TEMPLATE) span repo-root prose that
      no other package has scope for. Run both greps at the repo root
      and rewrite every match: `grep -rn 'evaluation\\.gen_eval' CLAUDE.md README.md docs/ .github/ apps/`
      and `grep -rn 'evaluation/gen_eval' CLAUDE.md README.md docs/ .github/ apps/`.
      Covers tasks 5.5, 7.1-7.6.
    role: integration-engineer
    priority: 4
    depends_on: [wp-package-tests, wp-coordinator-migrate, wp-skills-update, wp-examples-doc]
    timeout_minutes: 120
    retry_budget: 1
    min_trust_level: 2
    locks:
      files:
        - "docs/architecture-analysis"
        - ".github/workflows/ci.yml"
        - "CLAUDE.md"
        - "README.md"
      keys:
        - "feature:extract-gen-eval-package:integration"
      ttl_minutes: 60
      reason: "Architecture artifact refresh, CI docker-build step repoint + smoke-import rewrite (D8 Strategy A + D9), full validation pass, and repo-wide stale-reference sweep (task 5.5) across repo-root prose targets that no other package owns."
    scope:
      write_allow:
        - "docs/architecture-analysis/**"
        - ".github/workflows/ci.yml"
        - "CLAUDE.md"
        - "README.md"
        - "docs/**"
        - "apps/**"
        - ".github/**"
      read_allow:
        - "**"
      # Scope expansion rationale (Strategy A + task 5.5 ownership):
      # `CLAUDE.md` (repo root, NOT agent-coordinator/CLAUDE.md — that's
      # owned by wp-coordinator-migrate), top-level `README.md`,
      # `docs/**`, `apps/**`, and `.github/**` are all repo-root prose
      # surfaces where stale `evaluation.gen_eval` / `evaluation/gen_eval`
      # references may live. Codex round-3 finding #3 + Gemini round-3
      # finding #1 both flagged that task 5.5 was previously unassigned;
      # this package now owns the sweep. Other write_allow scopes already
      # cover the CI matrix (wp-package-tests), the in-coordinator
      # rewrites (wp-coordinator-migrate), and the skill mirrors
      # (wp-skills-update), so there is no scope overlap.
    worktree:
      name: wp-integration
      mode: isolated
    verification:
      tier_required: "A"
      steps:
        - name: "openspec strict validation"
          kind: command
          command: "openspec validate extract-gen-eval-package --strict"
          evidence:
            artifacts: []
            result_keys:
              - "openspec_validate_exit_code"
        - name: "architecture refresh"
          kind: command
          command: "make architecture"
          evidence:
            artifacts:
              - "docs/architecture-analysis/architecture.summary.json"
            result_keys:
              - "architecture_refreshed"
        - name: "validate-feature full pass"
          kind: command
          command: "echo 'invoke /validate-feature extract-gen-eval-package interactively'"
          evidence:
            artifacts: []
            result_keys:
              - "validate_feature_passed"
        - name: "docker smoke"
          kind: command
          # Strategy A: build context is repo root, file is agent-coordinator/Dockerfile.
          # No prebuild step — packages/gen-eval/ is in-context via the COPY
          # directives in the Dockerfile.
          command: "docker build -f agent-coordinator/Dockerfile -t agent-coordinator:gen-eval-test ."
          evidence:
            artifacts: []
            result_keys:
              - "docker_build_exit_code"
        - name: "ci step matches Strategy A"
          kind: command
          # Confirms the coordinator docker-build step in ci.yml has been
          # repointed to repo-root context. Grep for the new pattern; fail
          # if the old `context: agent-coordinator` is still present
          # alongside a Dockerfile that expects repo-root paths.
          command: "grep -q 'context: \\.' .github/workflows/ci.yml && ! grep -q 'context: agent-coordinator' .github/workflows/ci.yml"
          evidence:
            artifacts:
              - ".github/workflows/ci.yml"
            result_keys:
              - "ci_step_repointed"
        - name: "ci smoke-import uses new module path"
          kind: command
          # Pairs with task 7.6(b). The legacy module is removed by task
          # 4.3, so the smoke-import line in the coordinator docker-build
          # step MUST reference `gen_eval.mcp_service`, not
          # `evaluation.gen_eval.mcp_service`. Without this verification,
          # the CI step would build green and fail at import-time.
          command: "! grep -E 'evaluation\\.gen_eval|evaluation/gen_eval' .github/workflows/ci.yml"
          evidence:
            artifacts:
              - ".github/workflows/ci.yml"
            result_keys:
              - "ci_smoke_import_updated"
        - name: "in-container import smoke (task 7.4.1)"
          kind: command
          # Catches the multi-stage / non-editable interaction Codex
          # round-3 flagged: docker build can exit 0 with a dangling
          # editable .pth, only failing at runtime on `import gen_eval`.
          command: "docker run --rm --entrypoint python agent-coordinator:gen-eval-test -c 'import gen_eval; import gen_eval.mcp_service; print(gen_eval.__file__)' | grep -q '/app/.venv/lib/python.*/site-packages/gen_eval/'"
          evidence:
            artifacts: []
            result_keys:
              - "in_container_import_smoke"
        - name: "repo-wide stale-reference sweep (task 5.5)"
          kind: command
          # Pairs with task 5.5. Both forms (dotted + slash) must return
          # zero matches across the repo-root prose surfaces this package
          # owns. wp-skills-update covers skills/ separately; wp-coordinator-migrate
          # covers agent-coordinator/; wp-package-tests covers the CI
          # matrix job. This sweep covers everything else.
          command: "! grep -rn -E 'evaluation\\.gen_eval|evaluation/gen_eval' CLAUDE.md README.md docs/ .github/ apps/ 2>/dev/null"
          evidence:
            artifacts:
              - "CLAUDE.md"
              - "README.md"
            result_keys:
              - "repo_wide_sweep_clean"
    metadata:
      loc_estimate: 160
      complexity: medium
      package_kind: integration
    outputs:
      result_keys:
        - "openspec_validate_exit_code"
        - "architecture_refreshed"
        - "validate_feature_passed"
        - "docker_build_exit_code"
        - "ci_step_repointed"
        - "ci_smoke_import_updated"
        - "in_container_import_smoke"
        - "repo_wide_sweep_clean"
