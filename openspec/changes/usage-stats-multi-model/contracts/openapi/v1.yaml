openapi: 3.1.0
info:
  title: Coordinator Usage API
  version: "1.0.0"
  description: >
    Usage-statistics endpoints added to the coordinator FastAPI surface
    (agent-coordinator/src/coordination_api.py). All endpoints require the
    existing Authorization: Bearer <api-key> scheme.
servers:
  - url: http://localhost:8081
security:
  - bearerAuth: []
paths:
  /usage/ingest:
    post:
      summary: Idempotently persist a batch of usage records.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestBatch"
            example:
              records:
                - ts: "2026-05-31T12:00:00Z"
                  vendor: claude
                  model: claude-opus-4-8
                  input_tokens: 1200
                  output_tokens: 340
                  cache_creation_tokens: 0
                  cache_read_tokens: 800
                  cost_usd: 0.0421
                  session_id: 7f3a-...-9c
                  project: /home/user/agentic-coding-tools
                  principal: jankneumann
                  agent_id: claude-local
                  host: dev-box
                  record_hash: 9b1f...e2
      responses:
        "200":
          description: Batch accepted (inserted count may be < submitted due to dedupe).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResult"
              example: { submitted: 1, inserted: 1, duplicates: 0 }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /usage/summary:
    get:
      summary: Fleet totals across the filtered record set.
      parameters:
        - { $ref: "#/components/parameters/vendor" }
        - { $ref: "#/components/parameters/model" }
        - { $ref: "#/components/parameters/principal" }
        - { $ref: "#/components/parameters/since" }
        - { $ref: "#/components/parameters/until" }
      responses:
        "200":
          description: Totals.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UsageSummary" }
              example:
                input_tokens: 1200000
                output_tokens: 350000
                cache_creation_tokens: 10000
                cache_read_tokens: 800000
                cost_usd: 42.10
                cost_is_estimate: true
        "401": { $ref: "#/components/responses/Unauthorized" }
  /usage/daily:
    get:
      summary: Per-UTC-day buckets with per-vendor subtotals.
      parameters:
        - { $ref: "#/components/parameters/vendor" }
        - { $ref: "#/components/parameters/since" }
        - { $ref: "#/components/parameters/until" }
      responses:
        "200":
          description: Daily buckets.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DailyBucket" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /usage/by-model:
    get:
      summary: Token/cost totals grouped by model.
      parameters:
        - { $ref: "#/components/parameters/vendor" }
        - { $ref: "#/components/parameters/since" }
        - { $ref: "#/components/parameters/until" }
      responses:
        "200":
          description: Grouped by model.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/GroupTotal" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /usage/by-vendor:
    get:
      summary: Token/cost totals grouped by vendor.
      parameters:
        - { $ref: "#/components/parameters/since" }
        - { $ref: "#/components/parameters/until" }
      responses:
        "200":
          description: Grouped by vendor.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/GroupTotal" }
        "401": { $ref: "#/components/responses/Unauthorized" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    vendor:   { name: vendor,    in: query, required: false, schema: { type: string } }
    model:    { name: model,     in: query, required: false, schema: { type: string } }
    principal:{ name: principal, in: query, required: false, schema: { type: string } }
    since:    { name: since,     in: query, required: false, schema: { type: string, format: date-time } }
    until:    { name: until,     in: query, required: false, schema: { type: string, format: date-time } }
  responses:
    Unauthorized:
      description: Missing or invalid Bearer key (RFC 7807).
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
          example: { type: "about:blank", title: "Unauthorized", status: 401 }
  schemas:
    UsageRecord:
      type: object
      required: [ts, vendor, model, input_tokens, output_tokens, session_id, record_hash]
      properties:
        ts:                    { type: string, format: date-time }
        vendor:                { type: string }
        model:                 { type: string }
        input_tokens:          { type: integer }
        output_tokens:         { type: integer }
        cache_creation_tokens: { type: integer }
        cache_read_tokens:     { type: integer }
        cost_usd:              { type: [number, "null"] }
        session_id:            { type: string }
        project:               { type: [string, "null"] }
        principal:             { type: [string, "null"] }
        agent_id:              { type: [string, "null"] }
        host:                  { type: [string, "null"] }
        record_hash:           { type: string }
    IngestBatch:
      type: object
      required: [records]
      properties:
        records:
          type: array
          items: { $ref: "#/components/schemas/UsageRecord" }
    IngestResult:
      type: object
      required: [submitted, inserted, duplicates]
      properties:
        submitted:  { type: integer }
        inserted:   { type: integer }
        duplicates: { type: integer }
    UsageSummary:
      type: object
      properties:
        input_tokens:          { type: integer }
        output_tokens:         { type: integer }
        cache_creation_tokens: { type: integer }
        cache_read_tokens:     { type: integer }
        cost_usd:              { type: [number, "null"] }
        cost_is_estimate:      { type: boolean }
    DailyBucket:
      type: object
      properties:
        day:    { type: string, format: date }
        vendor: { type: string }
        input_tokens:  { type: integer }
        output_tokens: { type: integer }
        cost_usd:      { type: [number, "null"] }
    GroupTotal:
      type: object
      properties:
        key:           { type: string, description: "vendor or model identifier" }
        input_tokens:  { type: integer }
        output_tokens: { type: integer }
        cost_usd:      { type: [number, "null"] }
        cost_is_estimate: { type: boolean }
    Problem:
      type: object
      properties:
        type:   { type: string }
        title:  { type: string }
        status: { type: integer }
        detail: { type: string }
