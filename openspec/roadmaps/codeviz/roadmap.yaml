- item_id: diff-graph-artifact
  title: Diff-graph artifact generator
  status: candidate
  priority: 2
  effort: S
  depends_on:
  - artifact-header-schema
  description: 'A script that diffs two `architecture.graph.json` snapshots (by commit SHA) and emits
    `diff-graph.json` containing `nodes_added`, `nodes_removed`, `nodes_modified`, `edges_added`, `edges_removed`,
    `parallel_zones_touched`, `blast_radius_summary`. Invoked by `make architecture-diff` (already partially
    exists) and by a Git hook on push. Output is committed under `docs/architecture-analysis/diffs/<commit-sha>.json`.


    Acceptance outcomes:

    - Diff between two snapshots of the current repo MUST complet'
  acceptance_outcomes:
  - Diff between two snapshots of the current repo MUST complete in under 5 seconds.
  - Output JSON MUST conform to a checked-in schema.
  - Blast-radius summary MUST report transitive callers up to depth 3.
  - A no-op commit (no graph change) MUST emit an empty-but-valid diff.
  - Every changed node and edge MUST carry a change_kind tag from {refactoring, micro-change,
    contract-change, test-impact, runtime-risk, ordinary}; entries that match no specific
    class fall back to ordinary.
  - A fixture commit that renames a private function MUST be classified as refactoring,
    not contract-change.
