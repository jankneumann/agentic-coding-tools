schema_version: 1
roadmap_id: codeviz
source_proposal: docs/proposals/codebase-visualization-tool.md
status: planning
policy:
  default_action: wait_if_budget_exceeded
  max_switch_attempts_per_item: 2
items:
- item_id: artifact-header-schema
  title: Mandatory artifact header schema
  status: candidate
  priority: 1
  effort: S
  depends_on: []
  description: Define and enforce a mandatory header schema (schema_version, generated_at, git_sha, generator,
    plus run_id/event_kind for event artifacts) on every generated machine artifact. Provide a Python
    helper at skills/shared/artifact_header.py and a CI lint that fails on missing or malformed headers
    in artifacts touched by a PR.
  acceptance_outcomes:
  - All current snapshot artifacts MUST be backfilled with the header on first refresh.
  - A CI lint MUST flag any newly-introduced artifact lacking the header.
  - The helper MUST be reused by at least three existing skills (`refresh-architecture`, `validate-feature`,
    `security-review`).
  - Header schema MUST be documented at `docs/codeviz/artifact-header.md`.
- item_id: artifact-classification
  title: Artifact classification and retention policy
  status: candidate
  priority: 2
  effort: M
  depends_on:
  - artifact-header-schema
  description: Document and enforce three artifact classes (snapshot, event, linkage), migrate currently-clobbered
    event artifacts to dated paths (<dir>/<YYYY-MM-DD>/<run-id>.json), and ship a codeviz-artifact-inventory
    CLI that scans the repo and reports each artifact directory's class.
  acceptance_outcomes:
  - A classification table MUST be present in `docs/architecture-artifacts.md` listing every generated
    artifact and its class.
  - All event artifacts MUST be written under `<dir>/<YYYY-MM-DD>/<run-id>.json`.
  - A migration script MUST move existing event artifacts into dated paths idempotently.
  - '`codeviz-artifact-inventory` MUST output JSON conforming to a checked-in schema.'
- item_id: falkordb-container
  title: FalkorDB local container + bootstrap
  status: candidate
  priority: 1
  effort: S
  depends_on:
  - substrate-evaluation
  description: Package FalkorDB as a docker-compose service pinned to a known version with host-mounted
    persistence, exposed via make codeviz-up / codeviz-down / codeviz-reset targets. Reuses the same compose
    pattern as the coordinator Postgres container.
  acceptance_outcomes:
  - '`make codeviz-up` MUST start a healthy FalkorDB instance reachable on a configurable port within
    10 seconds.'
  - '`make codeviz-down` MUST stop the container cleanly without data loss.'
  - '`make codeviz-reset` MUST wipe persisted state and reinitialize.'
  - Compose file MUST be checked in under `docker/codeviz/` and referenced from `docs/codeviz/setup.md`.
- item_id: graph-schema-migrations
  title: Temporal graph schema and Cypher migrations
  status: candidate
  priority: 2
  effort: M
  depends_on:
  - falkordb-container
  description: Define the FalkorDB schema as a set of versioned Cypher migration files. Node labels include
    `Repo`, `Service`, `Module`, `File`, `Symbol` (function/class/method), `Test`, `Endpoint`, `Table`,
    `Proposal`, `Finding`, `Commit`. Edge types include `CONTAINS`, `CALLS`, `IMPORTS`, `WRITES_TO`, `READS_FROM`,
    `TESTS`, `IMPLEMENTS_PROPOSAL`, `FLAGS`, `INTRODUCED_IN`, `REMOVED_IN`. Every node and edge carries
    a `repo_id` namespace property and bi-temporal validity (`valid_from_commit`, `valid_to_commit`)
  acceptance_outcomes:
  - Schema MUST be expressed as numbered Cypher migration files under `codeviz/schema/`.
  - A migration runner MUST apply migrations idempotently and record applied versions.
  - All node and edge types MUST be documented in `docs/codeviz/schema.md` with examples.
  - Bi-temporal validity columns MUST be present on every edge.
  - Every node and edge MUST carry the provenance metadata block (extractor, extractor_version, evidence_kind,
    confidence, last_verified_at, source_span); the schema MUST reject inserts lacking these fields.
  - 'Symbol/File nodes MUST carry a stable_id property whose continuity is probabilistic: preserved across
    snapshots only when the rename detector emits a RENAMED_FROM edge with confidence above a configurable
    threshold. Hard uniqueness MUST be enforced only within a single snapshot, not across snapshots.'
  - A RENAMED_FROM edge MUST carry both confidence and evidence_sources (e.g. [scip-rename, git-follow,
    ast-similarity:0.92]) so the UI can show why the rename was inferred.
  - A read-only query path (GRAPH.RO_QUERY on FalkorDB or equivalent on the chosen substrate) MUST be
    exposed for all read endpoints; mutations MUST NOT be reachable through the read path even with crafted
    queries.
- item_id: ingestion-pipeline
  title: 'Ingestion pipeline: JSON snapshots to FalkorDB'
  status: candidate
  priority: 3
  effort: M
  depends_on:
  - graph-schema-migrations
  - artifact-header-schema
  description: Idempotent Python ingestion script that reads docs/architecture-analysis/*.json snapshots
    into FalkorDB under a given --repo-id, stamps nodes with valid_from_commit from the snapshot's git_sha,
    and detects renames across snapshots via multi-source probabilistic continuity. Supports --snapshot-dir,
    --commit-sha, --full-rebuild. Depends on the schema migration capability.
  acceptance_outcomes:
  - Full ingestion of the current `docs/architecture-analysis/` snapshot MUST complete in under 60 seconds
    on a developer laptop.
  - Re-ingesting the same snapshot MUST be a no-op (idempotent).
  - A second ingestion with a different `--commit-sha` MUST preserve prior temporal validity and only
    update edges that changed.
  - Ingestion logs MUST report node/edge counts created, updated, deprecated per type.
  - Every node and edge written by the pipeline MUST carry the full provenance metadata block. Missing
    provenance MUST cause the pipeline to fail with a descriptive error pointing to the source artifact.
  - 'Rename detection MUST combine at least three independent evidence sources (git log --follow, AST
    structural similarity, signature similarity, caller/callee neighborhood overlap, SCIP/LSIF identity
    where available, codeviz.rename-map.yaml override) and MUST emit RENAMED_FROM with confidence and
    evidence_sources. A fixture test MUST verify rename detection on at least three scenarios: simple
    rename in same file, function moved across files, extracted helper from larger function.'
  - Renames below the confidence threshold MUST emit a removed+added pair with explanatory provenance
    (evidence_kind=static-heuristic, confidence below threshold) rather than a phantom RENAMED_FROM edge.
- item_id: http-api-server
  title: HTTP API server (FastAPI) over FalkorDB
  status: candidate
  priority: 4
  effort: M
  depends_on:
  - ingestion-pipeline
  description: FastAPI service exposing read endpoints (/repos, /repos/{id}/graph, /repos/{id}/symbols/{id},
    /repos/{id}/symbols/{id}/dependents, /repos/{id}/subgraph, /repos/{id}/at/{commit_sha}/subgraph) plus
    a streaming /ai/query endpoint. /cypher gated by env flag. Every endpoint declares operation_kind
    via the shared op_reversibility classifier. Reuses FastAPI patterns from agent-coordinator/.
  acceptance_outcomes:
  - Subgraph queries with `hops <= 3` MUST return in under 100 ms at p95 on a 2k-node graph.
  - The `/dependents` endpoint MUST support `transitive=true|false` and a `depth` parameter, and MUST
    return a flat list with hop-distance per entry.
  - OpenAPI schema MUST be auto-generated and committed.
  - '`/cypher` MUST be disabled by default and require an explicit env flag.'
  - Server MUST refuse cross-repo queries unless `repo_id` is explicitly specified.
  - Every endpoint MUST declare an operation_kind in {read, reversible-write, destructive-write} via the
    shared op_reversibility classifier; the OpenAPI schema MUST expose this tag.
  - The /cypher endpoint MUST run an AST-level classifier on every submitted query before execution; queries
    that contain DELETE, DETACH DELETE, REMOVE, or property-overwriting SET MUST be classified destructive
    and refused unless an explicit consent token is presented.
  - Reversible-write endpoints MUST emit an audit-event artifact; destructive-write endpoints MUST emit
    an audit event AND require a consent token, regardless of whether the caller is human or agent.
- item_id: spa-scaffold-render
  title: SPA render scaffold (rendering choice via prototype phase)
  status: candidate
  priority: 5
  effort: M
  depends_on:
  - http-api-server
  description: A TypeScript + Vite SPA. The primary canvas implementation is selected via the /prototype-feature
    skill, which produces competing working skeletons across four candidate render layers — Cytoscape.js
    2D (fcose), Sigma.js + graphology (WebGL), three.js CodeCity 3D, and Observable Framework + d3 — each
    fed the same subgraph payload from a stubbed HTTP API. Variants are scored on initial-render performance,
    layout stability, interaction richness (selection, lasso, semantic zoom), developer ergonomics, and
    deterministic headless capture (frame-reproducibility under headless Chrome, which gates the timelapse-review-export
    capability). The winning variant is promoted to production; others retained as feature-flagged experimental
    views.
    Semantic coloring by layer (Python / TS / SQL / config / docs), hover tooltips, click selection, lasso
    multi-select, and pan/zoom with semantic zoom levels are required of the production variant. Depends
    on the HTTP API server.
  acceptance_outcomes:
  - Four prototype skeletons MUST exist, each rendering the same 1,471-node fixture from a stub API.
  - A scoring matrix MUST be checked in at openspec/roadmaps/codeviz/render-comparison.md covering performance,
    stability, interactions, ergonomics, and task success on three reviewer scenarios.
  - 'Each variant MUST demonstrate semantic zoom by outcomes: labels remain readable at every zoom level,
    node positions are stable across transitions, detail reveal thresholds are predictable, stroke width
    and label font size are visually constant across at least three zoom decades, mental map is preserved
    between zoom levels.'
  - The selected production variant MUST render the full 1,471-node graph in under 2 seconds on a developer
    laptop.
  - Production layout MUST be deterministic across page reloads given the same data (seeded RNG or persisted
    positions).
  - Selection state MUST be reflected in the URL.
  - 'The variant comparison MUST score prototypes on three reviewer tasks (defined in task-based-ux-study.md):
    (a) find every function that depends on Symbol X, (b) summarize what changed in this PR''s blast radius,
    (c) navigate from a security finding to the responsible commit. Task success rate and time-to-completion
    MUST be reported alongside performance metrics.'
  - 'The variant comparison MUST additionally score deterministic headless capture: whether the renderer
    produces frame-stable, pixel-reproducible output under headless Chrome (Puppeteer), since this supports
    the Action API''s reproducible-headless-screenshot requirement. (timelapse-review-export uses its own
    standalone capture composition and does NOT depend on the production renderer, so this criterion is
    about screenshot reproducibility, not video export.) Canvas2D/SVG renderers (Cytoscape, d3) are expected
    to score higher than WebGL renderers (Sigma, three.js) whose headless-GPU output may vary; the score
    MUST be recorded in render-comparison.md even though it does not by itself decide the winner.'
- item_id: source-viewer-panel
  title: Source viewer panel with deep links
  status: candidate
  priority: 6
  effort: S
  depends_on:
  - spa-scaffold-render
  description: Right-side panel that opens on node selection, showing the source file with the relevant
    symbol highlighted via Shiki syntax highlighting, plus Open-in-VS-Code (vscode://file/...) and View-on-GitHub
    deep links.
  acceptance_outcomes:
  - Selecting a Symbol node MUST display its source within 300 ms.
  - '"Open in VS Code" MUST launch the user''s editor at the correct file:line.'
  - Files larger than 1 MB MUST stream incrementally.
- item_id: filter-query-pane
  title: Filter and query pane
  status: candidate
  priority: 6
  effort: M
  depends_on:
  - spa-scaffold-render
  - http-api-server
  description: Left-side pane with structured filters (repo, layer, node type, has-TODOs, has-security-findings,
    in-parallel-zone, modified-since-commit) plus a free-text Cypher query box. Saved filter presets persist
    in localStorage and are URL-encoded.
  acceptance_outcomes:
  - Each filter change MUST update the canvas in under 200 ms for the local graph.
  - Cypher queries MUST be syntax-validated client-side before submission.
  - A saved filter MUST be restorable from its URL alone.
- item_id: diff-graph-artifact
  title: Diff-graph artifact generator
  status: candidate
  priority: 2
  effort: S
  depends_on:
  - artifact-header-schema
  description: Script that diffs two architecture.graph.json snapshots by commit SHA and emits diff-graph.json
    containing added/removed/modified nodes and edges, parallel_zones_touched, blast_radius_summary, and
    a change_kind classification on every entry (refactoring / micro-change / contract-change / test-impact
    / runtime-risk / ordinary). Invoked by make architecture-diff and by a Git hook on push.
  acceptance_outcomes:
  - Diff between two snapshots of the current repo MUST complete in under 5 seconds.
  - Output JSON MUST conform to a checked-in schema.
  - Blast-radius summary MUST report transitive callers up to depth 3.
  - A no-op commit (no graph change) MUST emit an empty-but-valid diff.
  - Every changed node and edge MUST carry a change_kind tag from {refactoring, micro-change, contract-change,
    test-impact, runtime-risk, ordinary}; entries that match no specific class fall back to ordinary.
  - A fixture commit that renames a private function MUST be classified as refactoring, not contract-change.
- item_id: diff-overlay-render
  title: Diff overlay rendering in SPA
  status: candidate
  priority: 6
  effort: M
  depends_on:
  - spa-scaffold-render
  - diff-graph-artifact
  description: SPA mode (?diff=<commit-sha>) that renders the diff over the current graph color-coded
    by change_kind with an interactive Sankey blast-radius panel. Includes a ghost-overlay mode (?pending=<patch-id>)
    showing agent-proposed pre-commit changes as semi-transparent overlays with attribution badges. Depends
    on diff-graph-artifact.
  acceptance_outcomes:
  - Loading a diff over a 1.5k-node graph MUST add no more than 500 ms to initial render.
  - The Sankey panel MUST be interactive (click a band to filter the canvas).
  - Removed nodes MUST remain visible at low opacity until explicitly dismissed.
- item_id: temporal-snapshot-scrubber
  title: Temporal snapshot store and scrubber
  status: candidate
  priority: 6
  effort: M
  depends_on:
  - spa-scaffold-render
  - ingestion-pipeline
  description: Persist multiple snapshots in FalkorDB keyed by valid_from_commit/valid_to_commit. The
    SPA exposes a horizontal slider scrubber across known commits with a play button; node positions remain
    stable across temporal transitions for symbols that persist across commits.
  acceptance_outcomes:
  - Scrubbing between adjacent commits MUST transition in under 300 ms.
  - Layout positions MUST stay stable across temporal transitions (nodes persisted across commits keep
    their position).
  - The scrubber MUST display commit metadata (author, message, SHA) on hover.
- item_id: subgraph-retrieval
  title: Subgraph retrieval and context assembly
  status: candidate
  priority: 6
  effort: M
  depends_on:
  - http-api-server
  description: Retrieval service that expands a node selection to a configurable N-hop neighborhood, fetches
    source slices for each Symbol, attaches related artifacts (Proposals, comment insights, security findings),
    and returns a token-budgeted context bundle with full provenance per item. Reuses Graphiti-style embedding
    patterns for similarity expansion when structural hops are insufficient. Depends on the HTTP API server.
  acceptance_outcomes:
  - Context assembly for a 1-hop neighborhood of a single symbol MUST complete in under 200 ms.
  - Bundles MUST not exceed a configurable token budget (default 32k).
  - Each context item MUST carry provenance (node ID, file path, line range, commit SHA).
  - Similarity expansion MUST be opt-in via a query parameter.
- item_id: ai-chat-panel
  title: AI chat panel with selection-anchored context
  status: candidate
  priority: 7
  effort: L
  depends_on:
  - spa-scaffold-render
  - subgraph-retrieval
  description: SPA chat UI consuming the streaming /ai/query endpoint. Selected nodes auto-attach as context;
    the model emits Cypher tool-calls and cites specific nodes and source lines. Every citation carries
    a visible evidence_kind badge (static / runtime / historical). Multi-file trajectories render as ordered
    file/symbol lists alongside the answer.
  acceptance_outcomes:
  - First token MUST stream within 1 second of submission for a typical query.
  - Citations in responses MUST be clickable and select/navigate the canvas.
  - Every citation MUST carry a visible evidence_kind badge (static / runtime / historical).
  - The model MUST refuse to make a claim of kind X if no edges of kind X exist in the retrieved subgraph.
  - The model MUST refuse to answer questions whose context exceeds the budget without confirmation.
  - A "show me the Cypher" toggle MUST reveal any tool-call queries the model executed.
- item_id: action-api-for-agents
  title: Action API for headless agent use
  status: candidate
  priority: 7
  effort: S
  depends_on:
  - http-api-server
  description: Stable REST endpoints exposing SPA actions (select, filter, zoom, query, scrub) so external
    agents can drive the visualization headlessly and capture screenshots or subgraph snapshots for reports.
    Every action declares operation_kind via the shared classifier; destructive actions require a consent_token
    header.
  acceptance_outcomes:
  - Action API MUST be documented in `docs/codeviz/agent-api.md` with example invocations.
  - Headless screenshots MUST be reproducible from a URL alone.
  - A sample skill (`codeviz-snapshot`) MUST demonstrate end-to-end agent use.
  - Every action MUST declare an operation_kind via the shared op_reversibility classifier; pure navigation
    actions (select / filter / zoom / scrub) are read.
  - Agents calling the Action API MUST be granted read access by default. Reversible-write actions MUST
    require an X-Scoped-Session header tied to an operator-issued session with a configured operation
    budget; calls without a valid active session MUST be refused with 403.
  - Destructive-write actions MUST require a fresh X-Consent-Token per operation (single-use, signed,
    short TTL) and MUST refuse without one. Reversible-write actions executed under a valid session MUST
    emit an audit event tagged with the calling agent's identifier and current session ID. Rate limiting
    (default 60 ops/hour per agent) applies to reversible writes.
- item_id: multi-repo-federation
  title: Multi-repo ingestion and federated views
  status: candidate
  priority: 7
  effort: M
  depends_on:
  - ingestion-pipeline
  - spa-scaffold-render
  description: Extend ingestion to consume snapshots from multiple repos under distinct repo_ids. The
    SPA gains a repo-picker and a federated view rendering multiple repos as compound clusters; cross-repo
    edges are discovered via shared API contracts, shared schemas, or explicit codeviz.links.yaml manifests.
  acceptance_outcomes:
  - Ingesting two repos MUST namespace cleanly with no node-ID collisions.
  - A federated view of two repos with a shared API edge MUST render the connecting edge.
- item_id: openspec-proposal-linkage
  title: OpenSpec proposal linkage
  status: candidate
  priority: 7
  effort: S
  depends_on:
  - ingestion-pipeline
  description: 'Index every openspec/changes/<id>/ directory as a Proposal node with IMPLEMENTS_PROPOSAL
    edges to the symbols and files touched by its tasks. Source: the existing comment_insights.json node-marker
    map plus task-list parsing. SPA surfaces related proposals in the source viewer.'
  acceptance_outcomes:
  - Every active OpenSpec change MUST appear as a `Proposal` node.
  - Each proposal node MUST have at least one outgoing edge if its tasks reference any committed file.
  - The SPA MUST surface "related proposals" in the source viewer panel.
- item_id: test-symbol-linkage
  title: Test to symbol linkage edges
  status: candidate
  priority: 7
  effort: S
  depends_on:
  - ingestion-pipeline
  description: Add edges connecting Test nodes to the Symbol nodes they exercise, inferred from import
    graphs and naming conventions in python_analysis.json and ts_analysis.json. Surface 'tested by' in
    the source viewer; flag symbols with no TESTS edge on the canvas.
  acceptance_outcomes:
  - Coverage rate of `TESTS` edges across all Symbol nodes MUST be reported in `architecture.diagnostics.json`.
  - A symbol with no `TESTS` edge MUST be visually flagged on the canvas.
- item_id: security-finding-overlay
  title: Security finding overlay
  status: candidate
  priority: 7
  effort: S
  depends_on:
  - ingestion-pipeline
  - artifact-classification
  description: Surface findings from pattern_insights.json and security-review skill output as Finding
