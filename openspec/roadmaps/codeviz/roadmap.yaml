- item_id: saved-views-url-state
  title: Saved views and URL-as-state
  status: candidate
  priority: 8
  effort: S
  depends_on:
  - spa-scaffold-render
  - filter-query-pane
  - diff-overlay-render
  description: Every UI lens combination (filter set + zoom + time + selection + diff overlay) MUST be
    encodable as a URL. A save-view action persists named views to localStorage and optionally to a per-repo
    codeviz.views.yaml for sharing.
  acceptance_outcomes:
  - Every interactive state MUST be restorable from URL alone.
  - Saved views MUST round-trip through the YAML file with no loss.
- item_id: timelapse-review-export
  title: Timelapse and review-walkthrough export (hyperframes)
  status: candidate
  priority: 8
  effort: M
  depends_on:
  - http-api-server
  - temporal-snapshot-scrubber
  - diff-graph-artifact
  - action-api-for-agents
  - saved-views-url-state
  description: 'Render shareable MP4 walkthroughs of code evolution as a standalone capture composition
    fed the same subgraph data the SPA consumes. Adopts hyperframes (heygen-com/hyperframes) — an HTML-native
    deterministic video renderer (seekable frame-accurate animation clock over headless Chrome + FFmpeg,
    non-interactive CLI designed for agent use) — as the export/render layer ONLY; it does NOT replace
    the in-app temporal scrubber, which remains the surface for live interactive review. Rather than embed
    the production SPA renderer, the composition reads at-commit subgraphs from the HTTP API (/repos/{id}/at/{commit_sha}/subgraph)
    plus the diff-graph.json artifact and renders them through its OWN deterministic Canvas2D/SVG path,
    decoupling frame-reproducibility from the production renderer (which may be WebGL and not headless-deterministic);
    it reuses the SPA''s layout seed so node positions match the live view. It binds hyperframes'' seekable
    clock to a sequence of codeviz states: advancing valid_from_commit across a commit range, fading the
    diff classification in by change_kind, materializing ghost nodes, growing the blast-radius Sankey.
    Two render modes: scrub-export (raw timelapse of a commit range or a saved view''s scrub track) and
    review-walkthrough (a templated narrative driven by diff-graph.json for a single PR / OpenSpec change
    — title card with change-id, the call/dataflow network rewiring as edges appear and disappear, contract-changes
    flagged, closing validation-outcome badges). Driven headlessly through the Action API so an agent
    can produce a walkthrough as a review deliverable. Untrusted repo-derived strings (commit messages,
    symbol names, diff text) injected into the headless-Chrome composition MUST be escaped and the render
    context network-isolated (covered by threat-model-artifact). Local-first: hyperframes'' optional AWS
    Lambda cloud render is opt-in and defaults off.'
  acceptance_outcomes:
  - A codeviz-timelapse CLI MUST render an MP4 from a saved-view URL plus a commit range with no interactive
    input, reproducibly (same inputs produce frame-identical output, independent of the production SPA
    renderer).
  - Scrub-export MUST animate across a commit range, applying the SPA's layout seed so positions match
    the live view and stay stable across frames (no relayout jitter for symbols that persist across commits).
  - Review-walkthrough MUST consume a single PR's or OpenSpec change's diff-graph.json and render its
    change_kind classification (refactoring / micro-change / contract-change / test-impact / runtime-risk
    / ordinary) using the same change_kind color mapping as the diff overlay.
  - All repo-derived strings (commit messages, symbol names, diff text) injected into the composition MUST
    be escaped before rendering, and the headless render context MUST be network-isolated; this surface
    MUST be listed in docs/codeviz/threat-model.md.
  - Render cost MUST be bounded for long histories — a configurable max-frame budget (with commit-sampling
    beyond a threshold, mirroring the >50-commit scatterplot mini-map) MUST cap total frames so a wide
    commit range cannot produce an unbounded render.
  - Cloud rendering (hyperframes AWS Lambda) MUST be opt-in behind an explicit flag and default to local
    render; the core render path MUST work offline.
  - The export MUST be classified reversible-write by the shared op_reversibility classifier (it produces
    a deletable artifact) and MUST emit an audit event; it MUST NOT mutate graph state.
  - Rendered MP4s MUST be written to the operational storage tier (a gitignored cache such as .codeviz-cache/walkthroughs/),
    never committed to git, per the storage-tier policy; only a small sidecar JSON carrying the mandatory
    artifact header (source view URL, commit range, renderer version, output digest) is committed as an
    event artifact under docs/codeviz/walkthroughs/<YYYY-MM-DD>/<run-id>.json.
  - The capability MUST document the added toolchain dependency (Node >= 22, FFmpeg, headless Chrome via
    Puppeteer) and MUST fail with an actionable error when FFmpeg or Chrome is missing rather than producing
    a partial render.
- item_id: codecity-3d-view
  title: Optional CodeCity 3D view (experimental)
  status: candidate
  priority: 8
  effort: M
  depends_on:
  - spa-scaffold-render
  description: Feature-flagged three.js CodeCity 3D treemap (buildings as classes/files, districts as
    packages, height as LOC from code-metrics-enrichment, color as complexity or recent-change heat).
    Supports WASDFQ spatial navigation chosen for accessibility (avoids arrow-key conflicts with screen
    readers). Disabled by default.
  acceptance_outcomes:
  - 3D view MUST render the current graph in under 3 seconds.
  - Switching between 2D and 3D MUST preserve selection state.
  - 3D view MUST be feature-flagged and disabled by default.
- item_id: documentation-onboarding
  title: Documentation and onboarding
  status: candidate
  priority: 8
  effort: S
  depends_on:
  - spa-scaffold-render
  - http-api-server
  - ingestion-pipeline
  description: Author docs/codeviz/ covering architecture, schema, API reference, agent API, ingestion
    runbook, troubleshooting. Add a make codeviz-demo target that loads a fixture snapshot and opens the
    SPA at a curated starting view.
  acceptance_outcomes:
  - '`docs/codeviz/README.md` MUST link from the repo root README.'
  - '`make codeviz-demo` MUST work on a fresh clone after `make codeviz-up`.'
  - Schema doc MUST include at least one example Cypher query per node and edge type.
- item_id: architecture-fitness-ci
  title: Architecture fitness CI checks
  status: candidate
  priority: 3
  effort: S
  depends_on:
  - artifact-header-schema
  - artifact-classification
  description: 'Extend make architecture-validate with a fitness-rule engine that enforces structural
    invariants on every PR: no new cross-layer flows beyond an allowlist, no new disconnected endpoints,
    no removal of IMPLEMENTS_PROPOSAL edges for active OpenSpec changes, no new TODO/FIXME markers in
    critical-path nodes. Rules expressed as YAML in architecture-fitness.yaml. Violations emitted as event
    artifacts with mandatory headers.'
  acceptance_outcomes:
  - A fitness-rule engine MUST be invokable via `make architecture-validate --fitness`.
  - At least four rules MUST ship in architecture-fitness.yaml with documented rationale.
  - A CI step MUST fail the build on fitness violations and post a structured PR comment.
  - Fitness reports MUST be written as event artifacts under docs/architecture-analysis/fitness/<YYYY-MM-DD>/<run-id>.json.
- item_id: lens-framework
  title: Lens-switching framework
  status: candidate
  priority: 6
  effort: S
  depends_on:
  - spa-scaffold-render
  description: 'A single switching control on the SPA exposing named lenses, each a saved combination
    of coloring, edge weighting, node filtering, and overlay activation. Built-in lenses: structure, diff,
    ownership, risk, incident, change-set. Existing overlays (diff overlay, security finding overlay,
    test-coverage edges, parallel-zone clustering) register as lenses against the same framework. Lens
    choice is URL-encoded.'
  acceptance_outcomes:
  - A lens registry MUST expose at least six built-in lenses on first load.
  - Switching lenses MUST update the canvas in under 200 ms without re-fetching cached state.
  - A lens MUST be expressible declaratively (YAML schema) for the common cases.
  - Lens choice MUST be URL-encoded and survive page reload.
- item_id: runtime-incident-correlation
  title: Runtime and incident correlation
  status: candidate
  priority: 7
  effort: M
  depends_on:
  - ingestion-pipeline
  - artifact-classification
  description: 'Ingest runtime evidence and link it to the static graph: OpenTelemetry traces produce
    INVOKES_AT_RUNTIME edges between Service/Endpoint nodes; an incidents.yaml file (or connector) produces
    Incident nodes with AFFECTS edges. Surfaces runtime-vs-static discrepancy warnings. Powers the incident
    lens and feeds the AI panel with runtime evidence for confidence-tagged answers.'
  acceptance_outcomes:
  - An ingester MUST consume at least one OpenTelemetry trace format and produce INVOKES_AT_RUNTIME edges.
  - An ingester MUST consume an incidents.yaml schema and produce Incident nodes with AFFECTS edges.
  - Discrepancy detection MUST be queryable via the HTTP API.
  - Runtime evidence MUST be tagged with evidence_kind=runtime for the AI chat panel.
- item_id: ownership-churn-risk
  title: Ownership, churn, and risk scoring
  status: candidate
  priority: 7
  effort: M
  depends_on:
  - ingestion-pipeline
  description: Derive ownership from CODEOWNERS and git blame, churn from commit frequency over a sliding
    window, and a composite risk score per node (function of churn, fan-in, recent findings, absence of
    tests). Stamps File/Symbol nodes with owner_team, churn_30d, risk_score. Powers ownership and risk
    lenses.
  acceptance_outcomes:
  - A CODEOWNERS ingester MUST stamp owner_team on every File node it claims to own.
  - git blame aggregation MUST stamp last_modified_by and last_modified_at on every Symbol node.
  - The risk-score function MUST be documented in docs/codeviz/risk-score.md with inputs and weights.
  - Ownership and risk lenses MUST visibly color nodes by their derived properties.
- item_id: graph-pack-export-import
  title: Graph pack export and import
  status: candidate
  priority: 7
  effort: S
  depends_on:
  - ingestion-pipeline
  - http-api-server
  description: 'Portable graph-pack format: a tarball containing snapshot JSON files for a given commit
    plus a manifest listing repo IDs, schema version, signatures. Export endpoint produces a pack for
    current state or a named commit; import endpoint ingests a pack into a fresh FalkorDB instance. Enables
    offline review, per-branch sharing, and reproducible bug reports.'
  acceptance_outcomes:
  - A graph pack MUST be a single tarball with a manifest at contracts/graph-pack.schema.json.
  - /repos/{id}/export?at={commit_sha} MUST stream a pack in under 30 seconds for a 1.5k-node repo.
  - codeviz-pack import <file> MUST repopulate a fresh FalkorDB instance idempotently.
  - The pack MUST include the mandatory artifact header on every embedded JSON.
- item_id: ast-compressed-bundles
  title: AST-compressed bundles (signatures / skeleton)
  status: candidate
  priority: 2
  effort: S
  depends_on:
  - artifact-header-schema
  description: 'Generate per-file/per-module JSON artifacts capturing the architectural skeleton of source
    code while stripping implementation bodies. Reuses the existing tree-sitter pipeline. Two modes: signatures
    (function/method signatures, types, imports/exports, classes; bodies replaced with {...}) and skeleton
    (signatures plus public docstrings and decorators). Output is committed under docs/architecture-analysis/ast-bundles/<lang>/<module>.json
    with the mandatory artifact header. Feeds both the AI subgraph-retrieval context assembly (cheaper
    than raw source slicing for API-surface queries) and the SPA source viewer overview mode for large
    files.'
  acceptance_outcomes:
  - A bundle generator MUST emit signatures and skeleton modes from python_analysis.json, ts_analysis.json,
    and postgres_analysis.json inputs.
  - The signatures mode MUST reduce per-module token count by at least 50% versus raw source, measured
    on a representative sample of ten modules.
  - Bundles MUST be deterministic — the same input produces byte-identical output.
  - The subgraph-retrieval service MUST be able to substitute a bundle for raw source slices behind a
    prefer_bundle=true query parameter.
- item_id: code-metrics-enrichment
  title: Code metrics enrichment on graph nodes
  status: candidate
  priority: 4
  effort: S
  depends_on:
  - ingestion-pipeline
  description: 'Augment the ingestion pipeline with per-node metric properties: loc (lines of code), cyclomatic_complexity
    (from tree-sitter CST traversal where practical), mutation_flags (does the symbol mutate module-level
    or external state), test_coverage_pct (where coverage reports exist), and last_modified_commit. Metrics
    are substrate for CodeCity 3D height/area encoding, the risk lens, and AI quality queries (show me
    the highest-complexity untested functions).'
  acceptance_outcomes:
  - Every File and Symbol node ingested MUST carry loc and last_modified_commit properties.
  - cyclomatic_complexity MUST be computed and stamped for at least 80% of Python and TypeScript Symbol
    nodes.
  - mutation_flags MUST be a boolean derived from CST analysis and documented in docs/codeviz/metrics.md.
  - test_coverage_pct MUST be optional (present when a coverage report is found, absent otherwise) and
    never block ingestion.
- item_id: mcp-server-interface
  title: MCP server interface over the graph
  status: candidate
  priority: 5
  effort: S
  depends_on:
  - http-api-server
  description: 'Expose the read operations as an MCP server so MCP-aware agents (Claude Desktop, Cursor,
    coordinator-orchestrated agents) can query the codeviz graph using the same state the SPA reads. Tools
    MUST be exposed as user-task-oriented operations rather than raw graph primitives: symbol_lookup,
    neighbors, blast_radius, compare_snapshots, tests_for_symbol, commits_touching_symbol, worktree_variants,
    review_findings_for_entity, explain_lineage. Each tool is a named convenience wrapper over one or
    more primitive subgraph/dependents/at-commit queries. A cypher(query) tool is exposed only when an
    explicit env flag is set. The MCP server is a thin adapter over the FastAPI handlers; it MUST NOT
    duplicate query logic. Aligns with the repo convention MCP for local agents, HTTP for cloud agents
    documented in openspec/project.md.'
  acceptance_outcomes:
  - An MCP server MUST be runnable via make codeviz-mcp and reachable over stdio.
  - Every MCP tool MUST be a thin wrapper around an existing HTTP handler — adding the MCP surface MUST
    NOT introduce new query logic.
  - The nine user-task tools (symbol_lookup, neighbors, blast_radius, compare_snapshots, tests_for_symbol,
    commits_touching_symbol, worktree_variants, review_findings_for_entity, explain_lineage) MUST all
    be implemented and documented with example invocations.
  - The MCP server MUST be discoverable from agent-coordinator's capability registry.
  - Documentation MUST cover Claude Desktop and Cursor configuration snippets at docs/codeviz/mcp.md.
  - Every MCP tool's schema MUST declare an operation_kind annotation inherited from the wrapped HTTP
    handler; clients MUST be able to filter tool listings by operation_kind.
  - Agents connecting via MCP MUST be granted read access by default. To call any reversible-write tool
    an agent MUST hold an active scoped session token (issued by the operator with a configured operation
    count or time window); the MCP server MUST refuse reversible-write calls without an active session
    and surface a visible session-status indicator on the host UI when one is active.
  - Destructive-write tools MUST always trigger the host's per-operation consent flow regardless of session
    state. Reversible-write tools called under a valid session MUST emit audit events and respect a rate
    limit (default 60 operations per hour, configurable).
- item_id: agent-memory-visualization
  title: Agent-memory visualization layer (OpenSpec-as-memory lens)
  status: candidate
  priority: 8
  effort: M
  depends_on:
  - openspec-proposal-linkage
  - spa-scaffold-render
  - lens-framework
  description: Model the existing OpenSpec + session-log + worktree corpus as the agent memory layer and
    visualize it as a first-class lens, rather than introducing a parallel .GCC/-style memory format.
    Each openspec/changes/<id>/ directory is a memory episode (proposal.md = intent, tasks.md = plan,
    session-log.md = execution trace, worktree branch = isolated workspace). Each session-log entry is
    a temporal node. Each worktree branch is a divergent reasoning track. Each merge back is a convergence
    point. Surface these as a dedicated agent-memory lens with timeline scrubber, branch tracks, and per-episode
    detail panel.
  acceptance_outcomes:
  - Every session-log entry under openspec/changes/<id>/session-log.md MUST become a temporal node connected
    to its parent Proposal.
  - Active worktree branches (per .git-worktrees/.registry.json) MUST render as parallel tracks under
    their associated Proposal node.
  - The agent-memory lens MUST visualize multi-agent activity (multiple worktrees + their session-log
    streams simultaneously) without requiring page reload between branches.
  - A timeline scrubber over the agent-memory lens MUST reconstruct the agent's known state at any past
    point.
- item_id: mcp-app-interactive-viz
  title: MCP App for in-conversation visualization
  status: candidate
  priority: 6
  effort: M
  depends_on:
  - spa-scaffold-render
  - mcp-server-interface
  description: In addition to the tools-only MCP server, package the SPA (or a focused subset) as an MCP
    App — an interactive visualization rendered inside the agent conversation (sandboxed iframe with bidirectional
    MCP tool calls). MCP Apps let an agent reason with the visualization in-context rather than asking
    the human to switch to a separate tab; the agent can call MCP tools from within the App and the App
    can request additional tools from the host. First App MVP surfaces the Atlas view + Change lens +
    a search/inspect panel; deeper views added incrementally. The App MUST be a thin wrapper around the
    existing SPA components — no parallel rendering codebase.
  acceptance_outcomes:
  - An MCP App MUST be installable into a Claude Desktop / Cursor / compatible host via a single manifest.
  - The App MUST reuse the SPA's render components — no duplicate rendering implementation.
  - The App MUST be able to call MCP tools (e.g. blast_radius, compare_snapshots) and receive results
    via the MCP App bidirectional channel.
  - Sandboxing MUST follow the MCP App specification — no direct DOM access outside the iframe, no arbitrary
    network calls.
  - Documentation MUST include host-configuration snippets and a screenshot fixture at docs/codeviz/mcp-app.md.
  - Tool calls initiated from inside the App MUST respect the same operation_kind and scoped-session rules
    as direct MCP server calls. Destructive-write tools MUST trigger the host's standard consent UI. Reversible-write
    tools MUST require an active scoped session for agent-initiated calls and MUST surface a visible audit-event
    indicator (small badge with remaining session quota) so the operator sees what the App is doing in-context.
- item_id: version-variant-view
  title: Version & Variant view (side-by-side candidate comparison)
  status: candidate
  priority: 9
  effort: M
  depends_on:
  - agent-memory-visualization
  - temporal-snapshot-scrubber
  - multi-repo-federation
  - spa-scaffold-render
  description: 'A dedicated UX surface answering how did this area evolve across commits, branches, worktrees,
    and prototype variants. Pulls together git commit history per file/symbol, active worktree branches
    from .git-worktrees/.registry.json, prototype variant branches from /prototype-feature runs, and temporal
    snapshots from FalkorDB into a side-by-side comparison surface. Users select 2-N candidates (commits,
    branches, worktree heads, prototype variants) and the view renders a multi-lane comparison: matching
    symbols align across lanes, additions/removals/modifications are color-coded per lane, and validation-outcome
    badges attach to each lane head. EvoScat-style scatterplot mini-map for long histories. Reuses the
    Atlas-view render layer; the lane mechanism is the new piece.'
  acceptance_outcomes:
  - A user MUST be able to select 2-N candidates (commits, branches, worktree heads, prototype variants)
    and see them rendered as parallel lanes against the same architectural region.
  - Matching symbols MUST align across lanes; non-matching symbols MUST be visually distinguished without
    breaking the alignment of matched ones.
  - Each lane head MUST surface validation-outcome badges (test pass/fail count, fitness violations, security
    findings).
  - A scatterplot mini-map MUST provide a global overview for histories longer than 50 commits.
  - The view MUST be addressable via URL parameters encoding the candidate list and the focused architectural
    region.
- item_id: substrate-evaluation
  title: Substrate evaluation (adopt-before-build benchmark)
  status: candidate
  priority: 1
  effort: M
  depends_on: []
  description: 'Before committing to FalkorDB + Graphiti as the graph substrate, run the target repo through
    several existing code-intelligence systems (SCIP, Codebase-Memory, CodeQL, Joern, Semgrep, current
    architecture.graph.json pipeline, FalkorDB+Graphiti) and produce a comparative benchmark on edge coverage,
    precision/recall against gold fixtures, build complexity, offline support, query latency, artifact
    size, and integration cost. Output: decision memo at openspec/roadmaps/codeviz/substrate-evaluation.md
    that either ratifies the proposed combination or recommends a different one. The FalkorDB commitment
    in this proposal is contingent on this evaluation''s outcome.'
  acceptance_outcomes:
  - A benchmark harness MUST run each candidate against this repo and a second representative repo, producing
    per-candidate metrics in a comparable schema.
  - The decision memo MUST be committed at openspec/roadmaps/codeviz/substrate-evaluation.md before any
    downstream Phase 0 ingestion or schema work begins.
  - The memo MUST recommend (a) a code-fact substrate, (b) a graph store, and (c) the temporal-memory
    role for Graphiti, with explicit rationale per choice.
  - If the benchmark contradicts the current proposal, the proposal and roadmap MUST be revised before
    Phase 0 implementation work proceeds.
- item_id: threat-model-artifact
  title: Formal threat-model artifact
  status: candidate
  priority: 3
  effort: S
  depends_on: []
  description: Consolidate scattered security constraints into a single formal threat-model document at
    docs/codeviz/threat-model.md. Covers malicious repo poisoning, path traversal, deep-link leakage,
    graph-pack secret exposure, hostile MCP tools, local HTTP exposure, CORS/CSRF, audit-event flooding,
    namespace-overwrite imports, and FalkorDB-specific behavioral risks (GRAPH.RO_QUERY for read paths;
    LIMIT does not constrain eager mutations). Each threat maps to a mitigation that points to specific
    capability acceptance outcomes. MUST be completed before http-api-server ships in production.
  acceptance_outcomes:
  - docs/codeviz/threat-model.md MUST exist before http-api-server ships in production.
  - Each threat MUST have a checked-in mitigation that points to specific acceptance criteria on at least
    one capability.
  - An 'unmitigated' field MUST be honest — threats accepted as known risk MUST be listed explicitly with
    rationale.
  - The document MUST be reviewable as a single PR artifact, not split across capability sections.
- item_id: graph-quality-ci
  title: Graph-quality CI (precision/recall regression gating)
  status: candidate
  priority: 4
  effort: S
  depends_on:
  - ingestion-pipeline
  description: Fixture-based precision/recall measurement of the extraction pipeline. For each edge type
    (IMPORTS, CALLS, TESTS, WRITES_TO, READS_FROM, IMPLEMENTS_PROPOSAL, INVOKES_AT_RUNTIME, FLAGS), maintain
    a gold fixture with hand-validated expected edges. CI runs the pipeline against fixtures on every
    PR and fails when precision/recall regresses below per-edge-type thresholds. Catches extractor drift,
    version mismatches, silent confidence-calibration regressions. Output is an event-class report under
    docs/codeviz/graph-quality/.
  acceptance_outcomes:
  - A gold fixture set MUST exist for at least six edge types with hand-validated edges; small enough
    to recompute on every PR.
  - The CI job MUST report precision and recall per edge type and fail the build if any falls below its
    configured threshold.
  - Adding a new extractor or upgrading an existing extractor version MUST require a schema migration
    that updates the gold fixture and threshold; the lint MUST refuse silent extractor-version bumps.
  - The graph-quality report MUST link to the failing edge IDs so a reviewer can navigate to the specific
    source-span where the extractor went wrong.
- item_id: sarif-findings-ingestion
  title: SARIF + external findings ingestion
  status: candidate
  priority: 4
  effort: S
  depends_on:
  - graph-schema-migrations
  - ingestion-pipeline
  description: Use SARIF (OASIS standard) as the canonical input for external findings rather than writing
    one parser per tool. Ingester consumes SARIF from CodeQL, Semgrep, SonarQube, Trivy, Bandit, ESLint,
    mapping each finding to a Finding node with FLAGS edge to the affected symbol or file. Each finding
    inherits provenance (tool, version, SARIF run ID, rule ID, severity, source span). Optional Joern-derived
    WRITES_TO/READS_FROM via SARIF taint-tracking. Reports stored under docs/codeviz/findings/<YYYY-MM-DD>/<tool>-<run-id>.sarif.
    Replaces duplicative per-tool parser work.
  acceptance_outcomes:
  - An ingester MUST consume valid SARIF 2.1.0 reports from at least three tools (CodeQL, Semgrep, plus
    one other) and produce Finding nodes with full provenance.
  - Each Finding node MUST carry the source tool, tool version, SARIF run ID, rule ID, severity, and source
    span.
  - 'The pipeline MUST round-trip SARIF: a Finding node MUST be exportable back to a minimal SARIF fragment
    for downstream tooling.'
  - A fixture suite MUST verify ingestion across all supported tools and catch SARIF schema regressions.
