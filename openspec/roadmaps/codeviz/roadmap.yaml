  - The scrubber MUST display commit metadata (author, message, SHA) on hover.
- item_id: subgraph-retrieval
  title: Subgraph retrieval and context assembly
  status: candidate
  priority: 6
  effort: M
  depends_on:
  - http-api-server
  description: A retrieval service that, given a selection (one or more node IDs), expands to a configurable
    N-hop neighborhood, fetches source slices for each Symbol in the neighborhood, attaches related artifacts
    (OpenSpec proposals, comment insights, security findings), and returns a structured context bundle
    bounded by a token budget. Reuses the Graphiti-style embedding patterns from `agentic-content-analyzer`
    for similarity-based expansion when structural hops are insufficient. Depends on the HTTP API ser
  acceptance_outcomes:
  - Context assembly for a 1-hop neighborhood of a single symbol MUST complete in under 200 ms.
  - Bundles MUST not exceed a configurable token budget (default 32k).
  - Each context item MUST carry provenance (node ID, file path, line range, commit SHA).
  - Similarity expansion MUST be opt-in via a query parameter.
- item_id: ai-chat-panel
  title: AI chat panel with selection-anchored context
  status: candidate
  priority: 7
  effort: L
  depends_on:
  - spa-scaffold-render
  - subgraph-retrieval
  description: 'A chat UI in the SPA that consumes the streaming `/ai/query` endpoint. Selected node(s)
