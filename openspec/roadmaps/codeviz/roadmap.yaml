    \ highlights affected edges, and exposes a \"blast radius\" Sankey panel showing transitive impact\
    \ across parallel zones. Depends on diff-graph artifact generator.\n\nAcceptance outcomes:\n- Loading\
    \ a diff over a 1.5k-node graph MUST add no more than 500 ms to initial render.\n- The Sankey panel\
    \ MUST be interactive (click a"
  acceptance_outcomes:
  - Loading a diff over a 1.5k-node graph MUST add no more than 500 ms to initial render.
  - The Sankey panel MUST be interactive (click a band to filter the canvas).
  - Removed nodes MUST remain visible at low opacity until explicitly dismissed.
- item_id: temporal-snapshot-scrubber
  title: Temporal snapshot store and scrubber
  status: candidate
  priority: 6
  effort: M
  depends_on:
  - spa-scaffold-render
  - ingestion-pipeline
  description: 'Persist multiple snapshots in FalkorDB keyed by `valid_from_commit` / `valid_to_commit`.
