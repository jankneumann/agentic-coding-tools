  - A click on a Finding node MUST display the original finding text and severity.
- item_id: saved-views-url-state
  title: Saved views and URL-as-state
  status: candidate
  priority: 8
  effort: S
  depends_on:
  - spa-scaffold-render
  - filter-query-pane
  - diff-overlay-render
  description: 'Every UI lens (filter set + zoom + time + selection + diff overlay)
    MUST be encodable as a URL. A "save view" action persists named views to localStorage
