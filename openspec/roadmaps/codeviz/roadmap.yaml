  - artifact-classification
  description: 'Extend make architecture-validate with a fitness-rule engine that enforces structural
    invariants on every PR: no new cross-layer flows beyond an allowlist, no new disconnected endpoints,
    no removal of IMPLEMENTS_PROPOSAL edges for active OpenSpec changes, no new TODO/FIXME markers in
