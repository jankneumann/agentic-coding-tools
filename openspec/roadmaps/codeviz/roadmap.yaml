  title: AST-compressed bundles (signatures / skeleton)
  status: candidate
  priority: 2
  effort: S
  depends_on:
  - artifact-header-schema
  description: 'Generate per-file/per-module JSON artifacts capturing the architectural
    skeleton of source code while stripping implementation bodies. Reuses the existing
    tree-sitter pipeline. Two modes: signatures (function/method signatures, types,
    imports/exports, classes; bodies replaced with {...}) and skeleton (signatures
    plus public docstrings and decorators). Output is committed under docs/architecture-analysis/ast-bundles/<lang>/<module>.json
    with the mandatory artifact header. Feeds both the AI subgraph-retrieval context
    assembly (cheaper than raw source slicing for API-surface queries) and the SPA
    source viewer overview mode for large files.'
  acceptance_outcomes:
  - A bundle generator MUST emit signatures and skeleton modes from python_analysis.json,
    ts_analysis.json, and postgres_analysis.json inputs.
  - The signatures mode MUST reduce per-module token count by at least 50% versus raw
    source, measured on a representative sample of ten modules.
  - Bundles MUST be deterministic — the same input produces byte-identical output.
  - The subgraph-retrieval service MUST be able to substitute a bundle for raw source
    slices behind a prefer_bundle=true query parameter.
- item_id: code-metrics-enrichment
  title: Code metrics enrichment on graph nodes
  status: candidate
  priority: 4
  effort: S
  depends_on:
  - ingestion-pipeline
  description: 'Augment the ingestion pipeline with per-node metric properties: loc
    (lines of code), cyclomatic_complexity (from tree-sitter CST traversal where practical),
    mutation_flags (does the symbol mutate module-level or external state), test_coverage_pct
    (where coverage reports exist), and last_modified_commit. Metrics are substrate
    for CodeCity 3D height/area encoding, the risk lens, and AI quality queries (show
    me the highest-complexity untested functions).'
  acceptance_outcomes:
  - Every File and Symbol node ingested MUST carry loc and last_modified_commit properties.
  - cyclomatic_complexity MUST be computed and stamped for at least 80% of Python and
    TypeScript Symbol nodes.
  - mutation_flags MUST be a boolean derived from CST analysis and documented in docs/codeviz/metrics.md.
  - test_coverage_pct MUST be optional (present when a coverage report is found, absent
    otherwise) and never block ingestion.
- item_id: mcp-server-interface
  title: MCP server interface over the graph
  status: candidate
  priority: 5
  effort: S
  depends_on:
  - http-api-server
  description: 'Expose the read operations as an MCP server so MCP-aware agents (Claude
    Desktop, Cursor, coordinator-orchestrated agents) can query the codeviz graph using
    the same state the SPA reads. Tools MUST be exposed as user-task-oriented operations
    rather than raw graph primitives: symbol_lookup, neighbors, blast_radius, compare_snapshots,
    tests_for_symbol, commits_touching_symbol, worktree_variants, review_findings_for_entity,
    explain_lineage. Each tool is a named convenience wrapper over one or more primitive
    subgraph/dependents/at-commit queries. A cypher(query) tool is exposed only when
    an explicit env flag is set. The MCP server is a thin adapter over the FastAPI handlers;
    it MUST NOT duplicate query logic. Aligns with the repo convention MCP for local
    agents, HTTP for cloud agents documented in openspec/project.md.'
  acceptance_outcomes:
  - An MCP server MUST be runnable via make codeviz-mcp and reachable over stdio.
  - Every MCP tool MUST be a thin wrapper around an existing HTTP handler — adding the
    MCP surface MUST NOT introduce new query logic.
  - The nine user-task tools (symbol_lookup, neighbors, blast_radius, compare_snapshots,
    tests_for_symbol, commits_touching_symbol, worktree_variants, review_findings_for_entity,
    explain_lineage) MUST all be implemented and documented with example invocations.
  - The MCP server MUST be discoverable from agent-coordinator's capability registry.
  - Documentation MUST cover Claude Desktop and Cursor configuration snippets at docs/codeviz/mcp.md.
- item_id: agent-memory-visualization
  title: Agent-memory visualization layer (OpenSpec-as-memory lens)
  status: candidate
  priority: 8
  effort: M
  depends_on:
  - openspec-proposal-linkage
  - spa-scaffold-render
  - lens-framework
  description: 'Model the existing OpenSpec + session-log + worktree corpus as the agent
    memory layer and visualize it as a first-class lens, rather than introducing a parallel
    .GCC/-style memory format. Each openspec/changes/<id>/ directory is a memory episode
    (proposal.md = intent, tasks.md = plan, session-log.md = execution trace, worktree
    branch = isolated workspace). Each session-log entry is a temporal node. Each worktree
    branch is a divergent reasoning track. Each merge back is a convergence point. Surface
    these as a dedicated agent-memory lens with timeline scrubber, branch tracks, and
    per-episode detail panel.'
  acceptance_outcomes:
  - Every session-log entry under openspec/changes/<id>/session-log.md MUST become a
    temporal node connected to its parent Proposal.
  - Active worktree branches (per .git-worktrees/.registry.json) MUST render as parallel
    tracks under their associated Proposal node.
  - The agent-memory lens MUST visualize multi-agent activity (multiple worktrees +
    their session-log streams simultaneously) without requiring page reload between
    branches.
  - A timeline scrubber over the agent-memory lens MUST reconstruct the agent's known
    state at any past point.
- item_id: mcp-app-interactive-viz
  title: MCP App for in-conversation visualization
  status: candidate
  priority: 6
  effort: M
  depends_on:
  - spa-scaffold-render
  - mcp-server-interface
  description: 'In addition to the tools-only MCP server, package the SPA (or a focused
    subset) as an MCP App — an interactive visualization rendered inside the agent
    conversation (sandboxed iframe with bidirectional MCP tool calls). MCP Apps let
    an agent reason with the visualization in-context rather than asking the human
    to switch to a separate tab; the agent can call MCP tools from within the App and
    the App can request additional tools from the host. First App MVP surfaces the
    Atlas view + Change lens + a search/inspect panel; deeper views added incrementally.
    The App MUST be a thin wrapper around the existing SPA components — no parallel
    rendering codebase.'
  acceptance_outcomes:
  - An MCP App MUST be installable into a Claude Desktop / Cursor / compatible host
    via a single manifest.
  - The App MUST reuse the SPA's render components — no duplicate rendering implementation.
  - The App MUST be able to call MCP tools (e.g. blast_radius, compare_snapshots) and
    receive results via the MCP App bidirectional channel.
  - Sandboxing MUST follow the MCP App specification — no direct DOM access outside
    the iframe, no arbitrary network calls.
  - Documentation MUST include host-configuration snippets and a screenshot fixture
    at docs/codeviz/mcp-app.md.
- item_id: version-variant-view
  title: Version & Variant view (side-by-side candidate comparison)
  status: candidate
  priority: 9
  effort: M
  depends_on:
  - agent-memory-visualization
  - temporal-snapshot-scrubber
  - multi-repo-federation
  - spa-scaffold-render
  description: 'A dedicated UX surface answering how did this area evolve across commits,
    branches, worktrees, and prototype variants. Pulls together git commit history
    per file/symbol, active worktree branches from .git-worktrees/.registry.json, prototype
    variant branches from /prototype-feature runs, and temporal snapshots from FalkorDB
    into a side-by-side comparison surface. Users select 2-N candidates (commits, branches,
    worktree heads, prototype variants) and the view renders a multi-lane comparison:
    matching symbols align across lanes, additions/removals/modifications are color-coded
    per lane, and validation-outcome badges attach to each lane head. EvoScat-style
    scatterplot mini-map for long histories. Reuses the Atlas-view render layer; the
    lane mechanism is the new piece.'
  acceptance_outcomes:
  - A user MUST be able to select 2-N candidates (commits, branches, worktree heads,
    prototype variants) and see them rendered as parallel lanes against the same architectural
    region.
  - Matching symbols MUST align across lanes; non-matching symbols MUST be visually
    distinguished without breaking the alignment of matched ones.
  - Each lane head MUST surface validation-outcome badges (test pass/fail count, fitness
    violations, security findings).
  - A scatterplot mini-map MUST provide a global overview for histories longer than
    50 commits.
  - The view MUST be addressable via URL parameters encoding the candidate list and
    the focused architectural region.
