schema_version: 1
roadmap_id: codeviz
source_proposal: docs/proposals/codebase-visualization-tool.md
status: planning
policy:
  default_action: wait_if_budget_exceeded
  max_switch_attempts_per_item: 2
items:
- item_id: artifact-header-schema
  title: Mandatory artifact header schema
  status: candidate
  priority: 1
  effort: S
  depends_on: []
  description: 'Define and enforce a common header on every generated machine artifact under `docs/architecture-analysis/`,
    `docs/security-review/`, `docs/merge-logs/`, gen-eval reports, validate-feature outputs, and review
    findings. Header fields: `schema_version`, `generated_at` (ISO-8601 UTC), `git_sha`, `generator` (skill
    or script name + version), and (for event artifacts) `run_id` and `event_kind`. Provide a Python helper
    `skills/shared/artifact_header.py` that writes and validates the header. Add a CI li'
  acceptance_outcomes:
  - All current snapshot artifacts MUST be backfilled with the header on first refresh.
  - A CI lint MUST flag any newly-introduced artifact lacking the header.
  - The helper MUST be reused by at least three existing skills (`refresh-architecture`, `validate-feature`,
    `security-review`).
  - Header schema MUST be documented at `docs/codeviz/artifact-header.md`.
- item_id: artifact-classification
  title: Artifact classification and retention policy
  status: candidate
  priority: 2
  effort: M
  depends_on:
  - artifact-header-schema
  description: Document and enforce three artifact classes (snapshot, event, linkage). Snapshots remain
    disposable on disk and committed in place; event artifacts MUST be written to `<dir>/<YYYY-MM-DD>/<run-id>.json`
    and never overwritten; linkage artifacts follow normal source-versioning. Update `docs/architecture-artifacts.md`
    with the classification table and migrate any currently-clobbered event artifacts (notably security-review
    outputs and validate-feature phase results) to dated paths. Provide a small i
  acceptance_outcomes:
  - A classification table MUST be present in `docs/architecture-artifacts.md` listing every generated
    artifact and its class.
  - All event artifacts MUST be written under `<dir>/<YYYY-MM-DD>/<run-id>.json`.
  - A migration script MUST move existing event artifacts into dated paths idempotently.
  - '`codeviz-artifact-inventory` MUST output JSON conforming to a checked-in schema.'
- item_id: falkordb-container
  title: FalkorDB local container + bootstrap
  status: candidate
  priority: 1
  effort: S
  depends_on: []
  description: 'Package a docker-compose service (or `docker run` wrapper) for FalkorDB pinned to a known
    version, with a host-mounted volume for persistence. Provide `make codeviz-up`, `make codeviz-down`,
    `make codeviz-reset` targets. Document required ports, memory budget, and reset semantics. Reuses
    the same compose pattern established for the coordinator Postgres container.


    Acceptance outcomes:

    - `make codeviz-up` MUST start a healthy FalkorDB instance reachable on a configurable port within
    10 seconds.

    -'
  acceptance_outcomes:
  - '`make codeviz-up` MUST start a healthy FalkorDB instance reachable on a configurable port within
    10 seconds.'
  - '`make codeviz-down` MUST stop the container cleanly without data loss.'
  - '`make codeviz-reset` MUST wipe persisted state and reinitialize.'
  - Compose file MUST be checked in under `docker/codeviz/` and referenced from `docs/codeviz/setup.md`.
- item_id: graph-schema-migrations
  title: Temporal graph schema and Cypher migrations
  status: candidate
  priority: 2
  effort: M
  depends_on:
  - falkordb-container
  description: Define the FalkorDB schema as a set of versioned Cypher migration files. Node labels include
    `Repo`, `Service`, `Module`, `File`, `Symbol` (function/class/method), `Test`, `Endpoint`, `Table`,
    `Proposal`, `Finding`, `Commit`. Edge types include `CONTAINS`, `CALLS`, `IMPORTS`, `WRITES_TO`, `READS_FROM`,
    `TESTS`, `IMPLEMENTS_PROPOSAL`, `FLAGS`, `INTRODUCED_IN`, `REMOVED_IN`. Every node and edge carries
    a `repo_id` namespace property and bi-temporal validity (`valid_from_commit`, `valid_to_commit`)
  acceptance_outcomes:
  - Schema MUST be expressed as numbered Cypher migration files under `codeviz/schema/`.
  - A migration runner MUST apply migrations idempotently and record applied versions.
  - All node and edge types MUST be documented in `docs/codeviz/schema.md` with examples.
  - Bi-temporal validity columns MUST be present on every edge.
- item_id: ingestion-pipeline
  title: 'Ingestion pipeline: JSON snapshots to FalkorDB'
  status: candidate
  priority: 3
  effort: M
  depends_on:
  - graph-schema-migrations
  - artifact-header-schema
  description: A Python ingestion script that reads `architecture.graph.json`, `parallel_zones.json`,
    `comment_insights.json`, `pattern_insights.json`, `architecture.diagnostics.json`, `python_analysis.json`,
    `ts_analysis.json`, and `postgres_analysis.json` and writes them into FalkorDB under a given `repo_id`.
    Uses MERGE semantics so re-ingestion is idempotent. Stamps nodes with `valid_from_commit` from the
    snapshot's `git_sha`. Supports `--repo-id`, `--snapshot-dir`, `--commit-sha`, `--full-rebuild`. Depends
  acceptance_outcomes:
  - Full ingestion of the current `docs/architecture-analysis/` snapshot MUST complete in under 60 seconds
    on a developer laptop.
  - Re-ingesting the same snapshot MUST be a no-op (idempotent).
  - A second ingestion with a different `--commit-sha` MUST preserve prior temporal validity and only
    update edges that changed.
  - Ingestion logs MUST report node/edge counts created, updated, deprecated per type.
- item_id: http-api-server
  title: HTTP API server (FastAPI) over FalkorDB
  status: candidate
  priority: 4
  effort: M
  depends_on:
  - ingestion-pipeline
  description: "A FastAPI service exposing read endpoints \u2014 `/repos`, `/repos/{id}/graph?filter=...`,\
    \ `/repos/{id}/symbols/{symbol_id}`, `/repos/{id}/subgraph?seed=...&hops=N`, `/repos/{id}/at/{commit_sha}/subgraph?...`,\
    \ `/cypher` (admin-only) \u2014 plus a streaming `/ai/query` endpoint used by the AI panel. CORS configured\
    \ for the local SPA dev origin. Read-only by default. Reuses FastAPI patterns from `agent-coordinator/`.\
    \ Depends on the ingestion pipeline.\n\nAcceptance outcomes:\n- Subgraph queries with `hops <= 3"
  acceptance_outcomes:
  - Subgraph queries with `hops <= 3` MUST return in under 100 ms at p95 on a 2k-node graph.
  - OpenAPI schema MUST be auto-generated and committed.
  - '`/cypher` MUST be disabled by default and require an explicit env flag.'
  - Server MUST refuse cross-repo queries unless `repo_id` is explicitly specified.
- item_id: spa-scaffold-render
  title: SPA render scaffold (rendering choice via prototype phase)
  status: candidate
  priority: 5
  effort: M
  depends_on:
  - http-api-server
  description: "A TypeScript + Vite SPA. The primary canvas implementation is selected via the /prototype-feature\
    \ skill, which produces competing working skeletons across four candidate render layers \u2014 Cytoscape.js\
    \ 2D (fcose), Sigma.js + graphology (WebGL), three.js CodeCity 3D, and Observable Framework + d3 \u2014\
    \ each fed the same subgraph payload from a stubbed HTTP API. Variants are scored on initial-render\
    \ performance, layout stability, interaction richness (selection, lasso, semantic zoom), and developer\
    \ ergonomics. The winning variant is promoted to production; others retained as feature-flagged experimental\
    \ views. Semantic coloring by layer (Python / TS / SQL / config / docs), hover tooltips, click selection,\
    \ lasso multi-select, and pan/zoom with semantic zoom levels are required of the production variant.\
    \ Depends on the HTTP API server."
  acceptance_outcomes:
  - Four prototype skeletons MUST exist, each rendering the same 1,471-node fixture from a stub API.
  - A scoring matrix MUST be checked in at openspec/roadmaps/codeviz/render-comparison.md covering performance,
    stability, interactions, and ergonomics.
  - The selected production variant MUST render the full 1,471-node graph in under 2 seconds on a developer
    laptop.
  - Production layout MUST be deterministic across page reloads given the same data (seeded RNG or persisted
    positions).
  - Selection state MUST be reflected in the URL.
  - Zoom level changes MUST progressively reveal/hide node detail (label, type badges).
