    Acceptance outcomes:

    - Every interactive state MUST be restorable from URL alone.

    - Saved views MUST round-trip through the YAML file with no loss.'
  acceptance_outcomes:
  - Every interactive state MUST be restorable from URL alone.
  - Saved views MUST round-trip through the YAML file with no loss.
