- item_id: lens-framework
  title: Lens-switching framework
  status: candidate
  priority: 6
  effort: S
  depends_on:
  - spa-scaffold-render
  description: 'A single switching control on the SPA exposing named lenses, each a saved combination
    of coloring, edge weighting, node filtering, and overlay activation. Built-in lenses: structure, diff,
    ownership, risk, incident, change-set. Existing overlays (diff overlay, security finding overlay,
    test-coverage edges, parallel-zone clustering) register as lenses against the same framework. Lens
    choice is URL-encoded.'
  acceptance_outcomes:
  - A lens registry MUST expose at least six built-in lenses on first load.
  - Switching lenses MUST update the canvas in under 200 ms without re-fetching cached state.
  - A lens MUST be expressible declaratively (YAML schema) for the common cases.
  - Lens choice MUST be URL-encoded and survive page reload.
- item_id: runtime-incident-correlation
  title: Runtime and incident correlation
  status: candidate
  priority: 7
  effort: M
  depends_on:
  - ingestion-pipeline
  - artifact-classification
  description: 'Ingest runtime evidence and link it to the static graph: OpenTelemetry traces produce
    INVOKES_AT_RUNTIME edges between Service/Endpoint nodes; an incidents.yaml file (or connector) produces
    Incident nodes with AFFECTS edges. Surfaces runtime-vs-static discrepancy warnings. Powers the incident
    lens and feeds the AI panel with runtime evidence for confidence-tagged answers.'
  acceptance_outcomes:
  - An ingester MUST consume at least one OpenTelemetry trace format and produce INVOKES_AT_RUNTIME edges.
  - An ingester MUST consume an incidents.yaml schema and produce Incident nodes with AFFECTS edges.
  - Discrepancy detection MUST be queryable via the HTTP API.
  - Runtime evidence MUST be tagged with evidence_kind=runtime for the AI chat panel.
- item_id: ownership-churn-risk
  title: Ownership, churn, and risk scoring
  status: candidate
  priority: 7
  effort: M
  depends_on:
  - ingestion-pipeline
  description: Derive ownership from CODEOWNERS and git blame, churn from commit frequency over a sliding
    window, and a composite risk score per node (function of churn, fan-in, recent findings, absence of
    tests). Stamps File/Symbol nodes with owner_team, churn_30d, risk_score. Powers ownership and risk
    lenses.
  acceptance_outcomes:
  - A CODEOWNERS ingester MUST stamp owner_team on every File node it claims to own.
  - git blame aggregation MUST stamp last_modified_by and last_modified_at on every Symbol node.
  - The risk-score function MUST be documented in docs/codeviz/risk-score.md with inputs and weights.
  - Ownership and risk lenses MUST visibly color nodes by their derived properties.
